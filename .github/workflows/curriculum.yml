name: カリキュラム

on:
  push:
    branches: [main]
    paths:
      - "phases/**"
      - "scripts/audit_lessons.py"
      - "scripts/build_catalog.py"
      - "scripts/check_readme_counts.py"
      - "README.md"
      - "ROADMAP.md"
      - "glossary/**"
      - "site/build.js"
      - ".github/workflows/curriculum.yml"
  pull_request:
    branches: [main]
    paths:
      - "phases/**"
      - "scripts/audit_lessons.py"
      - "scripts/build_catalog.py"
      - "scripts/check_readme_counts.py"
      - "README.md"
      - "ROADMAP.md"
      - "glossary/**"
      - "site/build.js"
      - ".github/workflows/curriculum.yml"

permissions:
  contents: read

jobs:
  audit:
    name: 不変条件チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: scripts/audit_lessons.py を実行
        run: python3 scripts/audit_lessons.py

  readme-counts-sync:
    name: README件数の自動修正（mainのみ）
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: 一時catalogを構築
        run: python3 scripts/build_catalog.py
      - name: README件数を同期
        run: python3 scripts/check_readme_counts.py --fix
      - name: READMEが変わったらcommit + push
        env:
          BOT_COMMIT_PREFIX: "chore(readme): sync counts"
        run: |
          if git diff --quiet README.md; then
            echo "README.md は既に同期済み"
            exit 0
          fi
          last_msg=$(git log -1 --pretty=%s)
          if [[ "$last_msg" == "$BOT_COMMIT_PREFIX"* ]]; then
            echo "直前commitは既にbot再生成。loop回避のためpushしない"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "$BOT_COMMIT_PREFIX"
          # Retry on non-fast-forward when another merge to main races us
          branch="${GITHUB_REF#refs/heads/}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "attempt $attempt でpush成功"
              exit 0
            fi
            echo "push attempt $attempt がreject。origin/${branch} にrebase"
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "rebaseでconflict。abortして正常終了"
              git rebase --abort || true
              exit 0
            fi
            sleep "$((attempt * 2))"
          done
          echo "5回試行してpush失敗。mainは次回pushで自己修復する"
          exit 0

  site-rebuild:
    name: site/data.js 自動再構築（mainのみ）
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: readme-counts-sync
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: site/data.js を再構築
        run: node site/build.js
      - name: site/data.jsが変わったらcommit + push
        env:
          BOT_COMMIT_PREFIX: "chore(site): rebuild data.js"
        run: |
          if git diff --quiet site/data.js; then
            echo "site/data.js は既に同期済み"
            exit 0
          fi
          last_msg=$(git log -1 --pretty=%s)
          if [[ "$last_msg" == "$BOT_COMMIT_PREFIX"* ]]; then
            echo "直前commitは既にbot再生成。loop回避のためpushしない"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data.js
          git commit -m "$BOT_COMMIT_PREFIX"
          branch="${GITHUB_REF#refs/heads/}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "attempt $attempt でpush成功"
              exit 0
            fi
            echo "push attempt $attempt がreject。origin/${branch} にrebase"
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "rebaseでconflict。abortして正常終了"
              git rebase --abort || true
              exit 0
            fi
            sleep "$((attempt * 2))"
          done
          echo "5回試行してpush失敗。mainは次回pushで自己修復する"
          exit 0

  readme-counts-drift:
    name: README.md件数driftの通知
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: 一時catalogを構築
        run: python3 scripts/build_catalog.py
      - name: README件数を確認
        run: |
          if ! python3 scripts/check_readme_counts.py; then
            echo "::warning::README.md の件数driftを検出。merge後にmainが自己修復します。"
          fi
