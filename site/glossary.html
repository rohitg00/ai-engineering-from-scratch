<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Glossary - AI Engineering from Scratch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d0d18'/><text x='4' y='23' font-size='18' font-weight='bold' font-family='system-ui' fill='%23ff6b6b'>AI</text></svg>">
  <meta name="description" content="AI glossary: what people say vs what things actually mean. Every term explained without hand-waving.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .glossary-page {
      padding: 100px 0 80px;
      min-height: 100vh;
    }

    .glossary-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .glossary-header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 8px;
    }

    .glossary-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .glossary-search-wrap {
      max-width: 500px;
      margin: 0 auto 40px;
      position: relative;
    }

    .glossary-search {
      width: 100%;
      font-family: var(--font-body);
      font-size: 1.1rem;
      padding: 14px 20px;
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .glossary-search::placeholder {
      color: var(--text-muted);
    }

    .glossary-search:focus {
      border-color: var(--accent);
    }

    .glossary-count {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .glossary-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    .glossary-card {
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      padding: 24px;
      box-shadow: var(--shadow-hard);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .glossary-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hard-lg);
    }

    .glossary-term {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .glossary-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .glossary-col {
      flex: 1;
      min-width: 200px;
    }

    .glossary-col-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .glossary-col-says {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    .glossary-col-means {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .glossary-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .glossary-page {
        padding: 80px 0 48px;
      }

      .glossary-row {
        flex-direction: column;
        gap: 12px;
      }

      .glossary-card {
        padding: 18px 16px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9679;</span> AI from Scratch
      </a>
      <nav class="header-nav">
        <a href="index.html#phases">Phases</a>
        <a href="catalog.html">Catalog</a>
        <a href="prereqs.html">Roadmap</a>
        <a href="glossary.html">Glossary</a>
        <a href="https://github.com/rohitg00/ai-engineering-from-scratch" target="_blank" rel="noopener">GitHub</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon">&#9789;</span>
      </button>
    </div>
  </header>

  <main class="glossary-page">
    <div class="container">
      <div class="glossary-header">
        <h1>AI Glossary</h1>
        <p>What people <em>say</em> vs what things actually <em>mean</em></p>
      </div>
      <div class="glossary-search-wrap">
        <input type="text" class="glossary-search" id="glossarySearch" placeholder="Search terms...">
      </div>
      <div class="glossary-count" id="glossaryCount"></div>
      <div class="glossary-list" id="glossaryList"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>AI Engineering from Scratch &mdash; open source, free forever.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="https://github.com/rohitg00/ai-engineering-from-scratch" target="_blank" rel="noopener">GitHub</a>
        <a href="catalog.html">Catalog</a>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    (function () {
      var root = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) {
        root.setAttribute('data-theme', stored);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        root.setAttribute('data-theme', 'light');
      }

      function updateIcon() {
        var icon = document.getElementById('themeIcon');
        if (!icon) return;
        icon.innerHTML = root.getAttribute('data-theme') === 'light' ? '&#9728;' : '&#9789;';
      }

      updateIcon();

      document.addEventListener('DOMContentLoaded', function () {
        updateIcon();

        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateIcon();
          });
        }

        var searchInput = document.getElementById('glossarySearch');
        var listEl = document.getElementById('glossaryList');
        var countEl = document.getElementById('glossaryCount');

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }

        function renderGlossary(filter) {
          var terms = GLOSSARY;
          if (filter) {
            var q = filter.toLowerCase();
            terms = terms.filter(function (t) {
              return t.term.toLowerCase().indexOf(q) !== -1 ||
                t.says.toLowerCase().indexOf(q) !== -1 ||
                t.means.toLowerCase().indexOf(q) !== -1;
            });
          }

          countEl.textContent = terms.length + ' of ' + GLOSSARY.length + ' terms';

          if (terms.length === 0) {
            listEl.innerHTML = '<div class="glossary-empty">No terms match your search.</div>';
            return;
          }

          var html = '';
          for (var i = 0; i < terms.length; i++) {
            var t = terms[i];
            html += '<div class="glossary-card">';
            html += '<div class="glossary-term">' + escapeHtml(t.term) + '</div>';
            html += '<div class="glossary-row">';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What people say</div>';
            html += '<div class="glossary-col-says">"' + escapeHtml(t.says) + '"</div>';
            html += '</div>';
            html += '<div class="glossary-col">';
            html += '<div class="glossary-col-label">What it actually means</div>';
            html += '<div class="glossary-col-means">' + escapeHtml(t.means) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
          }
          listEl.innerHTML = html;
        }

        renderGlossary('');

        if (searchInput) {
          searchInput.addEventListener('input', function () {
            renderGlossary(searchInput.value.trim());
          });
        }
      });
    })();
  </script>
<script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
</body>
</html>
