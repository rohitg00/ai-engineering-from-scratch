<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cold { fill: #eaf4ff; stroke: #2c5f8c; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; }
      .mono { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="28" text-anchor="middle" class="title">敵対的学習: 2つのネットワーク、1つの損失</text>

  <!-- noise -->
  <rect x="40" y="100" width="80" height="50" class="box"/>
  <text x="80" y="128" text-anchor="middle" class="content">z ~ N(0, I)</text>
  <line x1="120" y1="125" x2="170" y2="125" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- generator -->
  <rect x="170" y="90" width="120" height="70" class="cold"/>
  <text x="230" y="118" text-anchor="middle" class="label">G(z)</text>
  <text x="230" y="138" text-anchor="middle" class="caption">生成器</text>

  <line x1="290" y1="125" x2="340" y2="125" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- fake sample -->
  <rect x="340" y="100" width="80" height="50" class="box"/>
  <text x="380" y="128" text-anchor="middle" class="content">x&#770; (偽物)</text>

  <!-- real data -->
  <rect x="340" y="220" width="80" height="50" class="box"/>
  <text x="380" y="248" text-anchor="middle" class="content">x (本物)</text>

  <!-- discriminator -->
  <line x1="420" y1="125" x2="470" y2="140" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="420" y1="245" x2="470" y2="220" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="470" y="135" width="130" height="90" class="hot"/>
  <text x="535" y="170" text-anchor="middle" class="label">D(x)</text>
  <text x="535" y="195" text-anchor="middle" class="caption">識別器</text>
  <text x="535" y="215" text-anchor="middle" class="caption">本物? 0-1</text>

  <line x1="600" y1="180" x2="660" y2="180" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- loss -->
  <rect x="660" y="150" width="200" height="60" class="box"/>
  <text x="760" y="180" text-anchor="middle" class="label">BCE loss</text>
  <text x="760" y="200" text-anchor="middle" class="caption">本物 -&gt; 1、偽物 -&gt; 0</text>

  <!-- objective -->
  <rect x="40" y="300" width="820" height="50" class="box"/>
  <text x="450" y="320" text-anchor="middle" class="label">minimax:  min_G  max_D  E_real[log D(x)]  +  E_fake[log(1 - D(G(z)))]</text>
  <text x="450" y="340" text-anchor="middle" class="caption">勾配消失を避けるため、非飽和G損失 -log D(G(z)) を使う</text>

  <!-- failures -->
  <rect x="40" y="370" width="400" height="70" class="hot"/>
  <text x="240" y="392" text-anchor="middle" class="label">失敗: Dが勝つ</text>
  <text x="240" y="412" text-anchor="middle" class="caption">D(fake) &#8594; 0、Gへの勾配が消える</text>
  <text x="240" y="428" text-anchor="middle" class="caption">対策: Dのlrを下げる、入力noise、WGAN</text>

  <rect x="460" y="370" width="400" height="70" class="hot"/>
  <text x="660" y="392" text-anchor="middle" class="label">失敗: Gが崩壊</text>
  <text x="660" y="412" text-anchor="middle" class="caption">Gが1モードだけを出し、Dが罰しにくい</text>
  <text x="660" y="428" text-anchor="middle" class="caption">対策: minibatch disc、spectral norm、PacGAN</text>
</svg>
