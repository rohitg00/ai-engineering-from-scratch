<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; }
      .mono { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">生成モデルの5つの系統</text>
  <text x="450" y="50" text-anchor="middle" class="caption">何をモデル化し、どうサンプリングするかで分ける</text>

  <rect x="380" y="70" width="140" height="44" class="box"/>
  <text x="450" y="90" text-anchor="middle" class="label">p_data(x)</text>
  <text x="450" y="106" text-anchor="middle" class="caption">未知。欲しいのはサンプラ</text>

  <line x1="450" y1="114" x2="180" y2="150" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="114" x2="340" y2="150" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="114" x2="500" y2="150" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="114" x2="660" y2="150" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="114" x2="820" y2="150" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="60" y="155" width="230" height="180" class="box"/>
  <text x="175" y="178" text-anchor="middle" class="label">1. 明示的・計算可能</text>
  <text x="175" y="200" text-anchor="middle" class="mono">p(x) = &#8719; p(x_i | x_&lt;i)</text>
  <text x="175" y="225" text-anchor="middle" class="content">自己回帰: GPT, PixelCNN</text>
  <text x="175" y="245" text-anchor="middle" class="content">フロー: Glow, RealNVP</text>
  <text x="175" y="275" text-anchor="middle" class="caption">厳密なlog p(x)</text>
  <text x="175" y="293" text-anchor="middle" class="caption">逐次推論が遅い</text>
  <text x="175" y="311" text-anchor="middle" class="caption">アーキ制約 (フロー)</text>

  <rect x="305" y="155" width="230" height="180" class="hot"/>
  <text x="420" y="178" text-anchor="middle" class="label">2. 明示的・近似</text>
  <text x="420" y="200" text-anchor="middle" class="mono">maximize ELBO &#8804; log p(x)</text>
  <text x="420" y="225" text-anchor="middle" class="content">VAE: encoder + decoder</text>
  <text x="420" y="245" text-anchor="middle" class="content">拡散: DDPM, SD3</text>
  <text x="420" y="275" text-anchor="middle" class="caption">2026年の主流</text>
  <text x="420" y="293" text-anchor="middle" class="caption">反復サンプリング (20-50 steps)</text>
  <text x="420" y="311" text-anchor="middle" class="caption">テキスト、画像、動画、3Dへ拡張</text>

  <rect x="550" y="155" width="230" height="180" class="box"/>
  <text x="665" y="178" text-anchor="middle" class="label">3. 暗黙的密度</text>
  <text x="665" y="200" text-anchor="middle" class="mono">G(z) -> x,  D(x) -> real/fake</text>
  <text x="665" y="225" text-anchor="middle" class="content">GAN, StyleGAN, Pix2Pix</text>
  <text x="665" y="255" text-anchor="middle" class="caption">ワンショット生成</text>
  <text x="665" y="273" text-anchor="middle" class="caption">log p(x)は存在しない</text>
  <text x="665" y="291" text-anchor="middle" class="caption">学習不安定、モード崩壊</text>
  <text x="665" y="309" text-anchor="middle" class="caption">狭い写実領域では今もSOTA</text>

  <rect x="60" y="350" width="350" height="150" class="box"/>
  <text x="235" y="373" text-anchor="middle" class="label">4. スコア / 連続時間</text>
  <text x="235" y="395" text-anchor="middle" class="mono">learn s(x) = &#8711;_x log p(x)</text>
  <text x="235" y="418" text-anchor="middle" class="content">score SDE, flow matching</text>
  <text x="235" y="438" text-anchor="middle" class="content">rectified flow, consistency models</text>
  <text x="235" y="465" text-anchor="middle" class="caption">シミュレーション不要の学習</text>
  <text x="235" y="483" text-anchor="middle" class="caption">直線経路 =&gt; 1-4 step sampling</text>

  <rect x="430" y="350" width="350" height="150" class="box"/>
  <text x="605" y="373" text-anchor="middle" class="label">5. token + AR Transformer</text>
  <text x="605" y="395" text-anchor="middle" class="mono">VQ-VAE  +  transformer over tokens</text>
  <text x="605" y="418" text-anchor="middle" class="content">DALL-E 1, Parti, MuseNet</text>
  <text x="605" y="438" text-anchor="middle" class="content">AudioLM, VALL-E, MusicGen, Sora patches</text>
  <text x="605" y="465" text-anchor="middle" class="caption">LLMスタックを再利用</text>
  <text x="605" y="483" text-anchor="middle" class="caption">品質はtokenizerに制約される</text>
</svg>
