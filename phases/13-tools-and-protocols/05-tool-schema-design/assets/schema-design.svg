<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">一枚岩 vs atomic tools、同じtask surface</text>

  <rect x="40" y="50" width="440" height="450" class="hot"/>
  <text x="260" y="72" text-anchor="middle" class="head">一枚岩（選択精度が落ちる）</text>

  <rect x="60" y="92" width="400" height="80" class="box"/>
  <text x="80" y="114" class="step">notes_do_everything({</text>
  <text x="96" y="132" class="step">  action: "list" | "get" | "search"</text>
  <text x="96" y="148" class="step">         | "create" | "update" | "delete",</text>
  <text x="80" y="164" class="step">  target, options: {...}</text>

  <text x="60" y="200" class="step">  問題:</text>
  <text x="60" y="220" class="small">  - modelがtool名でなく文字列でactionを選ぶ</text>
  <text x="60" y="240" class="small">  - options: {} は型なし -> 幻覚が増える</text>
  <text x="60" y="260" class="small">  - descriptionが6動作を説明する必要</text>
  <text x="60" y="280" class="small">  - 近いケースを曖昧解消できない</text>

  <text x="60" y="320" class="step">  内部registryでのbenchmark:</text>
  <text x="60" y="340" class="small">  - atomic比で選択精度が15-30 pp低い</text>
  <text x="60" y="360" class="small">  - options payloadの幻覚率が高い</text>
  <text x="60" y="380" class="small">  - 再試行復旧が難しい（どのfieldが誤り?）</text>

  <text x="60" y="430" class="step">  目安:</text>
  <text x="60" y="450" class="small">  action enumが&gt; 3値ならtoolを分割。</text>
  <text x="60" y="470" class="small">  optionsが&gt; 2形状ならtoolを分割。</text>

  <rect x="500" y="50" width="420" height="450" class="cool"/>
  <text x="710" y="72" text-anchor="middle" class="head">atomic（各toolは1つの役割）</text>

  <rect x="520" y="92" width="380" height="280" class="box"/>
  <text x="540" y="116" class="step">notes_list(tag?)</text>
  <text x="540" y="134" class="small">  "全件またはtag絞り込みに使う。</text>
  <text x="540" y="150" class="small">   本文読み取りにはnotes_getを使う。"</text>

  <text x="540" y="178" class="step">notes_get(note_id)</text>
  <text x="540" y="196" class="small">  "特定note本文の取得に使う。"</text>

  <text x="540" y="220" class="step">notes_search(query, limit?)</text>
  <text x="540" y="238" class="small">  "本文keyword検索に使う。"</text>

  <text x="540" y="262" class="step">notes_create(title, body, tag?)</text>
  <text x="540" y="280" class="small">  "新しいnote作成に使う。"</text>

  <text x="540" y="304" class="step">notes_update(note_id, title?, body?)</text>
  <text x="540" y="322" class="small">  "既存note編集に使う。"</text>

  <text x="540" y="346" class="step">notes_delete(note_id)</text>
  <text x="540" y="364" class="small">  "明示的な削除時に使う。"</text>

  <text x="520" y="410" class="step">名前空間: notes_*</text>
  <text x="520" y="428" class="small">- 共通prefix = model contextでgroup化</text>
  <text x="520" y="448" class="small">- 短い説明 = 選択が安定</text>
  <text x="520" y="468" class="small">- 型付きschema = 引数の幻覚なし</text>
  <text x="520" y="486" class="small">- 選択精度 +10〜+20 pp</text>
</svg>
