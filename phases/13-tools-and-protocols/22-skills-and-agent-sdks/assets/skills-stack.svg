<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">3層のagent context stack</text>

  <rect x="40" y="60" width="880" height="140" class="cool"/>
  <text x="480" y="84" text-anchor="middle" class="head">AGENTS.md（project level、session開始時）</text>
  <text x="60" y="110" class="small">2026年4月時点で60k+ repoが採用</text>
  <text x="60" y="130" class="step">/repo-root/AGENTS.md</text>
  <text x="60" y="148" class="small"># Project: my-service</text>
  <text x="60" y="164" class="small">## 規約: TypeScript, pnpm, Pydantic models, RFC 2119 MUST</text>
  <text x="60" y="180" class="small">## コマンド: pnpm dev, pnpm build, pnpm test</text>

  <rect x="40" y="220" width="880" height="140" class="cold"/>
  <text x="480" y="244" text-anchor="middle" class="head">SKILL.md（再利用可能なknow-how、invoke時にload）</text>
  <text x="60" y="270" class="small">Anthropic Agent Skills、open standard、2025年12月</text>
  <text x="60" y="290" class="step">/skills/release-notes-writer/SKILL.md</text>
  <text x="60" y="308" class="small">---</text>
  <text x="60" y="324" class="small">name: release-notes-writer</text>
  <text x="60" y="340" class="small">description: 最新PRのchangelog entryを書く。</text>
  <text x="60" y="356" class="small">---</text>

  <rect x="40" y="380" width="880" height="120" class="hot"/>
  <text x="480" y="404" text-anchor="middle" class="head">MCP server（skillが呼び出すtools）</text>
  <text x="60" y="430" class="small">ProtocolはPhase 13 / 06-14で扱う</text>
  <text x="60" y="450" class="step">notes-server  +  github-server  +  gateway</text>
  <text x="60" y="468" class="small">MCP = 「toolsの存在」; Skill = 「使い方」; AGENTS.md = 「project rules」</text>
  <text x="60" y="486" class="small">Apps SDK (OpenAI) = MCP + ChatGPT UI向けwidget metadata</text>
</svg>
