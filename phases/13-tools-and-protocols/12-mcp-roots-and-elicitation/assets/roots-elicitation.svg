<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .edge { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">roots = scope、elicitation = call途中のuser入力</text>

  <rect x="40" y="60" width="440" height="440" class="cool"/>
  <text x="260" y="82" text-anchor="middle" class="head">roots（同意scope）</text>

  <rect x="60" y="100" width="400" height="80" class="box"/>
  <text x="76" y="122" class="step">clientがinitialize時に宣言:</text>
  <text x="76" y="142" class="small">{uri: file:///.../Notes, name: Notes}</text>
  <text x="76" y="160" class="small">{uri: file:///.../Scratch, name: Scratch}</text>

  <rect x="60" y="190" width="400" height="60" class="hot"/>
  <text x="76" y="212" class="step">server rule:</text>
  <text x="76" y="230" class="small">root set外のURI -&gt; operationを拒否</text>

  <rect x="60" y="260" width="400" height="60" class="box"/>
  <text x="76" y="282" class="step">userがscopeを変更 -&gt;</text>
  <text x="76" y="300" class="small">notifications/roots/list_changed</text>

  <rect x="60" y="270" width="0" height="0" />

  <rect x="60" y="330" width="400" height="160" class="box"/>
  <text x="76" y="352" class="step">典型flow:</text>
  <text x="76" y="372" class="small">1. clientがinitでroots設定</text>
  <text x="76" y="388" class="small">2. serverが境界list保存</text>
  <text x="76" y="404" class="small">3. 各tool callでURIがroot内か確認</text>
  <text x="76" y="420" class="small">4. notification -&gt; roots/listを再query</text>
  <text x="76" y="440" class="step">out-of-rootなら:</text>
  <text x="76" y="458" class="small">"outside roots" errorで拒否;</text>
  <text x="76" y="474" class="small">ambient accessへfallbackしない</text>

  <rect x="500" y="60" width="420" height="440" class="cold"/>
  <text x="710" y="82" text-anchor="middle" class="head">elicitation（mid-flight input）</text>

  <rect x="520" y="100" width="380" height="100" class="box"/>
  <text x="536" y="122" class="step">form mode（default）:</text>
  <text x="536" y="142" class="small">server -&gt; elicitation/create {schema,</text>
  <text x="536" y="158" class="small">  message: "Pick one"}</text>
  <text x="536" y="176" class="small">client -&gt; formをrenderし回答を返す</text>
  <text x="536" y="192" class="small">action: accept | decline | cancel</text>

  <rect x="520" y="210" width="380" height="100" class="hot"/>
  <text x="536" y="232" class="step">url mode（SEP-1036, experimental）:</text>
  <text x="536" y="252" class="small">server -&gt; elicitation/create {url,</text>
  <text x="536" y="268" class="small">  message: "Sign in"}</text>
  <text x="536" y="286" class="small">client -&gt; browserを開いて待つ</text>
  <text x="536" y="302" class="small">drift-risk: 形状はまだ流動的</text>

  <rect x="520" y="320" width="380" height="170" class="box"/>
  <text x="536" y="342" class="step">使う場面:</text>
  <text x="536" y="360" class="small">- 曖昧解消（N件一致）</text>
  <text x="536" y="376" class="small">- 破壊的操作の確認</text>
  <text x="536" y="392" class="small">- 初回setup</text>
  <text x="536" y="408" class="small">- OAuth / payment / sign-in (url)</text>
  <text x="536" y="430" class="step">使わない場面:</text>
  <text x="536" y="448" class="small">- modelがproseで聞き直せる</text>
  <text x="536" y="464" class="small">- tight loop内（UXを中断）</text>
  <text x="536" y="480" class="small">- LLMが知るmissing args補填</text>
</svg>
