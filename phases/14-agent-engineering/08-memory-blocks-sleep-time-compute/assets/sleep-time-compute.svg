<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .primary { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .sleep { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .block { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">Letta V1 — memory blocks + sleep-time compute</text>

  <rect x="40" y="50" width="420" height="220" class="primary"/>
  <text x="250" y="72" text-anchor="middle" class="head">primary agent (critical path上)</text>
  <text x="60" y="96" class="small">userへ応答; raw factsを高速write; consolidationなし</text>

  <rect x="60" y="108" width="380" height="46" class="box"/>
  <text x="78" y="130" class="step">turn 1  user: "私はava、Berlin在住"</text>
  <text x="78" y="146" class="small">block_append human "name=ava city=Berlin"</text>

  <rect x="60" y="162" width="380" height="46" class="box"/>
  <text x="78" y="184" class="step">turn 2  user: "senior eng向けcurriculumを計画"</text>
  <text x="78" y="200" class="small">block_append task "audience=senior eng"</text>

  <rect x="60" y="208" width="380" height="46" class="box"/>
  <text x="78" y="230" class="step">turn 3  user: "Lisbonに引っ越した"</text>
  <text x="78" y="246" class="small">block_append human "city=Lisbon" — block内に両cityが残る</text>

  <rect x="500" y="50" width="420" height="220" class="sleep"/>
  <text x="710" y="72" text-anchor="middle" class="head">sleep-time agent (critical path外)</text>
  <text x="520" y="96" class="small">turn間で実行; stronger model可; latency costなし</text>

  <rect x="520" y="108" width="380" height="46" class="box"/>
  <text x="538" y="130" class="step">scan blocks  near_limitならsummarize</text>
  <text x="538" y="146" class="small">human blockをcompact: duplicateを落とし最新値を保持</text>

  <rect x="520" y="162" width="380" height="46" class="box"/>
  <text x="538" y="184" class="step">reconcile archival  stale factsをinvalidate</text>
  <text x="538" y="200" class="small">coreと矛盾したらdeleteでなくinvalidation</text>

  <rect x="520" y="208" width="380" height="46" class="box"/>
  <text x="538" y="230" class="step">learned_contextをshared blocksへwrite</text>
  <text x="538" y="246" class="small">次turn向けのstable factsを生成</text>

  <rect x="40" y="290" width="880" height="220" class="block"/>
  <text x="480" y="312" text-anchor="middle" class="head">Letta memoryの3 tiers</text>

  <rect x="60" y="322" width="280" height="170" class="box"/>
  <text x="200" y="342" text-anchor="middle" class="head">core (常にvisible)</text>
  <text x="78" y="364" class="step">blocks: human, persona, task</text>
  <text x="78" y="382" class="small">editable via block_{append,replace,rewrite}</text>
  <text x="78" y="400" class="small">per-block character limit</text>
  <text x="78" y="418" class="small">near_limitでsleep-time summarization発火</text>
  <text x="78" y="438" class="small">Persona/Safety block writesはreview要</text>
  <text x="78" y="458" class="small">versioned; diffはtraceに出す</text>
  <text x="78" y="478" class="small">毎turn promptにpin</text>

  <rect x="350" y="322" width="280" height="170" class="box"/>
  <text x="490" y="342" text-anchor="middle" class="head">recall (conversation)</text>
  <text x="368" y="364" class="step">turn log, paginated</text>
  <text x="368" y="382" class="small">各turnでauto-written</text>
  <text x="368" y="400" class="small">retrieval via conversation_search</text>
  <text x="368" y="418" class="small">cap到達でtail evict</text>
  <text x="368" y="438" class="small">citation: session_id + turn_id</text>
  <text x="368" y="458" class="small">primaryが読みsleep-timeがsummarize</text>
  <text x="368" y="478" class="small">lossyだが常にaddressable</text>

  <rect x="640" y="322" width="280" height="170" class="box"/>
  <text x="780" y="342" text-anchor="middle" class="head">archival (external)</text>
  <text x="658" y="364" class="step">vector + KV + graph (Lesson 09)</text>
  <text x="658" y="382" class="small">archival_memory_{insert,search}</text>
  <text x="658" y="400" class="small">矛盾時はdeletionでなくinvalidation</text>
  <text x="658" y="418" class="small">tags for scope: user/session/agent</text>
  <text x="658" y="438" class="small">untrusted on retrieval (Lesson 27)</text>
  <text x="658" y="458" class="small">sleep-time dedups on &gt;90% token overlap</text>
  <text x="658" y="478" class="small">context windowを超えてscale</text>

  <text x="480" y="540" text-anchor="middle" class="caption">Letta V1はsend_message+heartbeatをnative reasoningへ置換; loop shapeは不変。</text>
</svg>
