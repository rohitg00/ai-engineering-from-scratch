<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .stage { font-size: 11px; fill: #c0392b; font-style: italic; text-anchor: middle; }
      .line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
      .note { font-size: 11px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect class="box" x="380" y="20" width="140" height="50" rx="4"/>
  <text class="label" x="450" y="50" text-anchor="middle">クエリ</text>

  <path class="line" d="M 420 70 L 200 120" marker-end="url(#arrow)"/>
  <path class="line" d="M 480 70 L 700 120" marker-end="url(#arrow)"/>

  <rect class="box" x="60" y="125" width="280" height="100" rx="4"/>
  <text class="label" x="200" y="150" text-anchor="middle">BM25 (疎)</text>
  <text class="content" x="75" y="175">完全一致キーワード、TF-IDF</text>
  <text class="content" x="75" y="195">転置インデックス、10ms未満</text>
  <text class="note" x="200" y="215" text-anchor="middle">精密だが脆い。OOVに弱い。</text>

  <rect class="box" x="560" y="125" width="280" height="100" rx="4"/>
  <text class="label" x="700" y="150" text-anchor="middle">密検索 (二塔エンコーダ)</text>
  <text class="content" x="575" y="175">意味的類似度</text>
  <text class="content" x="575" y="195">FAISS / ベクトルDB, 50-200ms</text>
  <text class="note" x="700" y="215" text-anchor="middle">言い換えに強く、キーワードに鈍い</text>

  <path class="line" d="M 200 225 L 380 260" marker-end="url(#arrow)"/>
  <path class="line" d="M 700 225 L 520 260" marker-end="url(#arrow)"/>

  <rect class="hot" x="380" y="260" width="140" height="50" rx="4"/>
  <text class="label" x="450" y="282" text-anchor="middle">RRF融合</text>
  <text class="content" x="450" y="300" text-anchor="middle">順位だけで統合</text>

  <path class="line" d="M 450 310 L 450 340" marker-end="url(#arrow)"/>

  <rect class="hot" x="300" y="340" width="300" height="50" rx="4"/>
  <text class="label" x="450" y="362" text-anchor="middle">クロスエンコーダ再ランク</text>
  <text class="content" x="450" y="380" text-anchor="middle">上位30 → 上位5。30-100ms追加。</text>
</svg>
