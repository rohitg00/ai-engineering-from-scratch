<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .stage { font-size: 11px; fill: #c0392b; font-style: italic; text-anchor: middle; }
      .note { font-size: 10px; fill: #666; font-style: italic; }
      .line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect class="box" x="20" y="30" width="200" height="300" rx="4"/>
  <text class="label" x="120" y="55" text-anchor="middle">ルールベース</text>
  <text class="note" x="35" y="78">1960年代→現在も安全重視で</text>
  <text class="content" x="35" y="105">IF 「ほしい」に一致</text>
  <text class="content" x="35" y="125">THEN 「なぜほしいの？」</text>
  <text class="content" x="35" y="165">意図分類器</text>
  <text class="content" x="35" y="183">+ スロット抽出</text>
  <text class="content" x="35" y="201">+ 状態機械</text>
  <text class="note" x="35" y="235">利点: 予測可能、</text>
  <text class="note" x="35" y="250">決定的、</text>
  <text class="note" x="35" y="265">幻覚なし</text>
  <text class="note" x="35" y="290">弱点: 範囲が狭い</text>
  <text class="note" x="35" y="305">新規入力に弱い</text>

  <rect class="box" x="240" y="30" width="200" height="300" rx="4"/>
  <text class="label" x="340" y="55" text-anchor="middle">検索ベース</text>
  <text class="note" x="255" y="78">2010年代。FAQで現役</text>
  <text class="content" x="255" y="105">発話をエンコード、</text>
  <text class="content" x="255" y="123">最近傍を検索、</text>
  <text class="content" x="255" y="141">保存応答を返す</text>
  <text class="content" x="255" y="180">拒否しきい値</text>
  <text class="note" x="255" y="220">利点: 言い換えに強い、</text>
  <text class="note" x="255" y="235">幻覚なし、</text>
  <text class="note" x="255" y="250">低コストに拡張</text>
  <text class="note" x="255" y="280">弱点: 情報統合が苦手、</text>
  <text class="note" x="255" y="295">複数ターン推論が</text>
  <text class="note" x="255" y="310">苦手</text>

  <rect class="box" x="460" y="30" width="200" height="300" rx="4"/>
  <text class="label" x="560" y="55" text-anchor="middle">ニューラル (系列変換)</text>
  <text class="note" x="475" y="78">2014-2019。今は単独少ない</text>
  <text class="content" x="475" y="105">会話ログで学習した</text>
  <text class="content" x="475" y="123">エンコーダ-デコーダ</text>
  <text class="content" x="475" y="141">ゼロから生成</text>
  <text class="note" x="475" y="180">利点: 流暢な表現</text>
  <text class="note" x="475" y="220">弱点: 汎用的な返答</text>
  <text class="note" x="475" y="235">（「わかりません」）、</text>
  <text class="note" x="475" y="250">事実ずれ、根拠なし、</text>
  <text class="note" x="475" y="265">ツール利用なし</text>
  <text class="note" x="475" y="290">現在はハイブリッド内で</text>
  <text class="note" x="475" y="305">使われる</text>

  <rect class="hot" x="680" y="30" width="200" height="300" rx="4"/>
  <text class="label" x="780" y="55" text-anchor="middle">LLM エージェントループ</text>
  <text class="note" x="695" y="78">2023→2026 本番運用</text>
  <text class="content" x="695" y="105">計画 → ツール呼び出し</text>
  <text class="content" x="695" y="123">   → 観察 → 判断</text>
  <text class="content" x="695" y="141">   → ... → 回答</text>
  <text class="content" x="695" y="175">RAG グラウンディング</text>
  <text class="content" x="695" y="195">ツール契約</text>
  <text class="content" x="695" y="215">評価 + 可観測性</text>
  <text class="note" x="695" y="245">利点: 行動できる、</text>
  <text class="note" x="695" y="260">新規入力に強い</text>
  <text class="note" x="695" y="290">弱点: 挙動理解が難しい、</text>
  <text class="note" x="695" y="305">プロンプトインジェクション、</text>
  <text class="note" x="695" y="320">無限ループ</text>
</svg>
