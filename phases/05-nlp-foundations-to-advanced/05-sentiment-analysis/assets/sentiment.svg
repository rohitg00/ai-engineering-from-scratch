<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .pos { fill: #e8f3e0; stroke: #1a1a1a; stroke-width: 1.5; }
      .neg { fill: #f3e0e0; stroke: #1a1a1a; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .stage { font-size: 11px; fill: #c0392b; font-style: italic; text-anchor: middle; }
      .line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect class="box" x="20" y="50" width="200" height="220" rx="4"/>
  <text class="label" x="120" y="75" text-anchor="middle">レビュー原文</text>
  <text class="content" x="35" y="105">"この映画が好き"</text>
  <text class="content" x="35" y="130">"見る価値がない"</text>
  <text class="content" x="35" y="155">"演技がひどい"</text>
  <text class="content" x="35" y="180">"美しい物語"</text>
  <text class="content" x="35" y="225">ラベル: + / - / - / +</text>

  <path class="line" d="M 220 160 L 270 160" marker-end="url(#arrow)"/>
  <text class="stage" x="245" y="150">分かち書き</text>
  <text class="stage" x="245" y="180">+ 否定処理</text>

  <rect class="box" x="270" y="50" width="240" height="220" rx="4"/>
  <text class="label" x="390" y="75" text-anchor="middle">特徴量</text>
  <text class="content" x="285" y="105">[好き, 映画]</text>
  <text class="content" x="285" y="130">[ない, NOT_価値]</text>
  <text class="content" x="285" y="155">[ひどい, 演技]</text>
  <text class="content" x="285" y="180">[美しい, 物語]</text>
  <text class="content" x="285" y="225">+ 2-gram: "価値_ない", ...</text>
  <text class="content" x="285" y="245">+ tf-idf 重み</text>

  <path class="line" d="M 510 160 L 560 160" marker-end="url(#arrow)"/>
  <text class="stage" x="535" y="150">学習</text>

  <rect class="box" x="560" y="50" width="180" height="220" rx="4"/>
  <text class="label" x="650" y="75" text-anchor="middle">分類器</text>
  <text class="content" x="575" y="105">ナイーブベイズ</text>
  <text class="content" x="575" y="130">またはロジ回帰</text>
  <text class="content" x="575" y="165">学習する:</text>
  <text class="content" x="575" y="185">w[ひどい] &lt; 0</text>
  <text class="content" x="575" y="205">w[好き] &gt; 0</text>
  <text class="content" x="575" y="225">w[NOT_価値] &lt; 0</text>

  <path class="line" d="M 740 130 L 790 90" marker-end="url(#arrow)"/>
  <path class="line" d="M 740 190 L 790 230" marker-end="url(#arrow)"/>

  <rect class="pos" x="790" y="60" width="90" height="60" rx="4"/>
  <text class="label" x="835" y="95" text-anchor="middle">+</text>

  <rect class="neg" x="790" y="200" width="90" height="60" rx="4"/>
  <text class="label" x="835" y="235" text-anchor="middle">−</text>

  <text class="stage" x="460" y="305" text-anchor="middle">ストップワードを残す。否定を処理。2-gramで1-gramを補う。</text>
</svg>
