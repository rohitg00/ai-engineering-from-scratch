<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .ent { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1.5; }
      .cont { fill: #fce4ec; stroke: #c0392b; stroke-width: 1.5; }
      .neu { fill: #f5f5f5; stroke: #616161; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">NLI — 1つのタスク、3つの実運用</text>

  <!-- Premise + Hypothesis input -->
  <rect x="60" y="70" width="280" height="60" class="box"/>
  <text x="75" y="92" class="label">前提 (t):</text>
  <text x="75" y="112" class="content">"猫がソファで寝ている。"</text>

  <rect x="60" y="140" width="280" height="60" class="box"/>
  <text x="75" y="162" class="label">仮説 (h):</text>
  <text x="75" y="182" class="content">"部屋に猫がいる。"</text>

  <line x1="340" y1="135" x2="400" y2="135" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Encoder -->
  <rect x="400" y="90" width="220" height="90" class="box"/>
  <text x="510" y="115" text-anchor="middle" class="label">Transformerエンコーダ</text>
  <text x="510" y="138" text-anchor="middle" class="content">[CLS] t [SEP] h [SEP]</text>
  <text x="510" y="160" text-anchor="middle" class="caption">DeBERTa-v3 / RoBERTa / BART</text>

  <line x1="620" y1="135" x2="680" y2="135" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3-way softmax -->
  <rect x="680" y="70" width="180" height="50" class="ent"/>
  <text x="770" y="92" text-anchor="middle" class="label">含意</text>
  <text x="770" y="110" text-anchor="middle" class="content">0.97</text>

  <rect x="680" y="125" width="180" height="50" class="neu"/>
  <text x="770" y="147" text-anchor="middle" class="label">中立</text>
  <text x="770" y="165" text-anchor="middle" class="content">0.02</text>

  <rect x="680" y="180" width="180" height="50" class="cont"/>
  <text x="770" y="202" text-anchor="middle" class="label">矛盾</text>
  <text x="770" y="220" text-anchor="middle" class="content">0.01</text>

  <!-- Three uses below -->
  <text x="450" y="270" text-anchor="middle" class="title">同じモデル、3つの使い道</text>

  <rect x="40" y="290" width="260" height="130" class="ent"/>
  <text x="170" y="315" text-anchor="middle" class="label">1. ゼロショット分類</text>
  <text x="170" y="340" text-anchor="middle" class="content">t = 文書</text>
  <text x="170" y="358" text-anchor="middle" class="content">h = "{ラベル}について"</text>
  <text x="170" y="385" text-anchor="middle" class="caption">含意最大のラベルを選択</text>
  <text x="170" y="402" text-anchor="middle" class="caption">学習データ不要</text>

  <rect x="320" y="290" width="260" height="130" class="ent"/>
  <text x="450" y="315" text-anchor="middle" class="label">2. 忠実性 (RAG)</text>
  <text x="450" y="340" text-anchor="middle" class="content">t = 検索コンテキスト</text>
  <text x="450" y="358" text-anchor="middle" class="content">h = 生成回答の主張</text>
  <text x="450" y="385" text-anchor="middle" class="caption">含意 → 根拠あり</text>
  <text x="450" y="402" text-anchor="middle" class="caption">RAGAS忠実性の中核</text>

  <rect x="600" y="290" width="260" height="130" class="ent"/>
  <text x="730" y="315" text-anchor="middle" class="label">3. 要約の事実確認</text>
  <text x="730" y="340" text-anchor="middle" class="content">t = 元文書</text>
  <text x="730" y="358" text-anchor="middle" class="content">h = 要約文</text>
  <text x="730" y="385" text-anchor="middle" class="caption">矛盾 → ハルシネーション</text>
  <text x="730" y="402" text-anchor="middle" class="caption">中立 → 根拠なしの主張</text>
</svg>
