<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .user { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
      .state { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .slot-filled { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 1; }
      .slot-empty { fill: #f5f5f5; stroke: #aaa; stroke-width: 1; stroke-dasharray: 3 2; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; }
      .mono { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="28" text-anchor="middle" class="title">対話状態追跡 — ターンをまたいでスロットを埋め、更新、訂正</text>

  <!-- Turn 1 -->
  <text x="50" y="65" class="label">ターン1</text>
  <rect x="100" y="50" width="360" height="30" class="user"/>
  <text x="280" y="70" text-anchor="middle" class="content">"北部で安いレストランを探しています。"</text>

  <line x1="465" y1="65" x2="500" y2="65" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="505" y="45" width="100" height="40" class="state"/>
  <text x="555" y="60" text-anchor="middle" class="mono">料理: —</text>
  <text x="555" y="78" text-anchor="middle" class="mono">地域: 北部</text>

  <rect x="610" y="45" width="100" height="40" class="state"/>
  <text x="660" y="60" text-anchor="middle" class="mono">価格: 安い</text>
  <text x="660" y="78" text-anchor="middle" class="mono">人数: —</text>

  <!-- Turn 2 -->
  <text x="50" y="130" class="label">ターン2</text>
  <rect x="100" y="115" width="360" height="30" class="user"/>
  <text x="280" y="135" text-anchor="middle" class="content">"イタリア料理でお願いします。"</text>

  <line x1="465" y1="130" x2="500" y2="130" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="505" y="110" width="100" height="40" class="slot-filled"/>
  <text x="555" y="125" text-anchor="middle" class="mono">料理: イタリア</text>
  <text x="555" y="143" text-anchor="middle" class="mono">地域: 北部</text>

  <rect x="610" y="110" width="100" height="40" class="state"/>
  <text x="660" y="125" text-anchor="middle" class="mono">価格: 安い</text>
  <text x="660" y="143" text-anchor="middle" class="mono">人数: —</text>

  <!-- Turn 3 -->
  <text x="50" y="195" class="label">ターン3</text>
  <rect x="100" y="180" width="360" height="30" class="user"/>
  <text x="280" y="200" text-anchor="middle" class="content">"やはり中価格帯にしてください。"</text>

  <line x1="465" y1="195" x2="500" y2="195" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="505" y="175" width="100" height="40" class="state"/>
  <text x="555" y="190" text-anchor="middle" class="mono">料理: イタリア</text>
  <text x="555" y="208" text-anchor="middle" class="mono">地域: 北部</text>

  <rect x="610" y="175" width="100" height="40" class="slot-filled"/>
  <text x="660" y="190" text-anchor="middle" class="mono">価格: 中</text>
  <text x="660" y="208" text-anchor="middle" class="mono">人数: —</text>

  <!-- Turn 4 -->
  <text x="50" y="260" class="label">ターン4</text>
  <rect x="100" y="245" width="360" height="30" class="user"/>
  <text x="280" y="265" text-anchor="middle" class="content">"4人です。"</text>

  <line x1="465" y1="260" x2="500" y2="260" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="505" y="240" width="100" height="40" class="state"/>
  <text x="555" y="255" text-anchor="middle" class="mono">料理: イタリア</text>
  <text x="555" y="273" text-anchor="middle" class="mono">地域: 北部</text>

  <rect x="610" y="240" width="100" height="40" class="slot-filled"/>
  <text x="660" y="255" text-anchor="middle" class="mono">価格: 中</text>
  <text x="660" y="273" text-anchor="middle" class="mono">人数: 4</text>

  <!-- Final state -->
  <rect x="100" y="320" width="700" height="70" class="box"/>
  <text x="450" y="345" text-anchor="middle" class="label">最終状態（全スロットが正解と一致した時だけJGAで正解）</text>
  <text x="450" y="370" text-anchor="middle" class="mono">{cuisine: italian, area: north, price: moderate, people: 4}</text>
  <text x="450" y="385" text-anchor="middle" class="caption">→ バックエンドへ渡す: book_restaurant(cuisine=italian, area=north, price=moderate, people=4)</text>

  <text x="450" y="425" text-anchor="middle" class="caption">不変条件 — 訂正は上書き（ターン3）; 明示的な否定は消去; 未変更スロットは保持</text>
</svg>
