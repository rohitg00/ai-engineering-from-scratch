<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .stage { font-size: 11px; fill: #c0392b; font-style: italic; text-anchor: middle; }
      .line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
      .note { font-size: 11px; fill: #666; font-style: italic; }
    </style>
  </defs>

  <rect class="box" x="20" y="20" width="280" height="380" rx="4"/>
  <text class="label" x="160" y="45" text-anchor="middle">抽出型QA</text>
  <text class="note" x="35" y="65">与えた文章から回答範囲を探す</text>

  <rect class="box" x="35" y="85" width="240" height="70" rx="3"/>
  <text class="content" x="45" y="105">質問:</text>
  <text class="content" x="45" y="125">"iPhoneの発売日は?"</text>
  <text class="content" x="45" y="145">文脈: [長い文章]</text>

  <path class="line" d="M 155 155 L 155 180" marker-end="url(#arrow)"/>

  <rect class="hot" x="35" y="180" width="240" height="50" rx="3"/>
  <text class="content" x="155" y="205" text-anchor="middle">BERT / RoBERTa + スパンヘッド</text>
  <text class="content" x="155" y="220" text-anchor="middle">予測 (start_idx, end_idx)</text>

  <path class="line" d="M 155 230 L 155 255" marker-end="url(#arrow)"/>

  <rect class="box" x="35" y="255" width="240" height="50" rx="3"/>
  <text class="content" x="155" y="280" text-anchor="middle">"2007年6月29日"</text>
  <text class="content" x="155" y="295" text-anchor="middle">本文中の範囲。捏造しない</text>

  <text class="stage" x="160" y="340">SQuAD形式。幻覚しない。</text>
  <text class="note" x="160" y="360" text-anchor="middle">文章と質問を一緒に入力。</text>
  <text class="note" x="160" y="378" text-anchor="middle">回答不能な質問に弱い</text>
  <text class="note" x="160" y="392" text-anchor="middle">SQuAD 2.0学習なら対応。</text>

  <rect class="box" x="320" y="20" width="280" height="380" rx="4"/>
  <text class="label" x="460" y="45" text-anchor="middle">RAG</text>
  <text class="note" x="335" y="65">文章を検索してから回答</text>

  <rect class="box" x="335" y="85" width="240" height="40" rx="3"/>
  <text class="content" x="455" y="110" text-anchor="middle">質問のみ</text>

  <path class="line" d="M 455 125 L 455 145" marker-end="url(#arrow)"/>

  <rect class="hot" x="335" y="145" width="240" height="50" rx="3"/>
  <text class="content" x="455" y="170" text-anchor="middle">検索器</text>
  <text class="content" x="455" y="185" text-anchor="middle">BM25 + 密ベクトル + 再ランク</text>

  <path class="line" d="M 455 195 L 455 215" marker-end="url(#arrow)"/>

  <rect class="box" x="335" y="215" width="240" height="50" rx="3"/>
  <text class="content" x="455" y="240" text-anchor="middle">上位k件の文章</text>
  <text class="content" x="455" y="255" text-anchor="middle">(根拠文脈)</text>

  <path class="line" d="M 455 265 L 455 285" marker-end="url(#arrow)"/>

  <rect class="hot" x="335" y="285" width="240" height="50" rx="3"/>
  <text class="content" x="455" y="310" text-anchor="middle">読解器 (LLMまたは抽出型)</text>

  <path class="line" d="M 455 335 L 455 355" marker-end="url(#arrow)"/>

  <rect class="box" x="335" y="355" width="240" height="35" rx="3"/>
  <text class="content" x="455" y="377" text-anchor="middle">根拠つき回答 + 引用</text>

  <rect class="box" x="620" y="20" width="260" height="380" rx="4"/>
  <text class="label" x="750" y="45" text-anchor="middle">生成型 (クローズドブック)</text>
  <text class="note" x="635" y="65">モデル重みから回答</text>

  <rect class="box" x="635" y="85" width="230" height="40" rx="3"/>
  <text class="content" x="750" y="110" text-anchor="middle">質問</text>

  <path class="line" d="M 750 125 L 750 145" marker-end="url(#arrow)"/>

  <rect class="hot" x="635" y="145" width="230" height="90" rx="3"/>
  <text class="content" x="750" y="170" text-anchor="middle">デコーダ専用LLM</text>
  <text class="content" x="750" y="190" text-anchor="middle">(GPT, Claude, Llama)</text>
  <text class="content" x="750" y="215" text-anchor="middle">パラメトリック記憶のみ</text>

  <path class="line" d="M 750 235 L 750 255" marker-end="url(#arrow)"/>

  <rect class="box" x="635" y="255" width="230" height="50" rx="3"/>
  <text class="content" x="750" y="280" text-anchor="middle">自由形式の回答</text>
  <text class="content" x="750" y="295" text-anchor="middle">(幻覚の可能性)</text>

  <text class="note" x="750" y="350" text-anchor="middle">一般知識に強い。</text>
  <text class="note" x="750" y="370" text-anchor="middle">希少・最新事実に弱い。</text>
  <text class="note" x="750" y="390" text-anchor="middle">信頼性にはRAGが必要。</text>
</svg>
