<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .stage { font-size: 11px; fill: #c0392b; font-style: italic; text-anchor: middle; }
      .note { font-size: 11px; fill: #666; font-style: italic; }
      .line { stroke: #1a1a1a; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect class="box" x="20" y="30" width="200" height="260" rx="4"/>
  <text class="label" x="120" y="55" text-anchor="middle">1. 数える</text>
  <text class="content" x="35" y="90">学習コーパス</text>
  <text class="content" x="35" y="115">  "猫 が 座った"</text>
  <text class="content" x="35" y="135">  "猫 が 走った"</text>
  <text class="content" x="35" y="155">  "犬 が 座った"</text>
  <text class="content" x="35" y="190">3-gram カウント:</text>
  <text class="content" x="35" y="210">  (猫, が, 座った): 1</text>
  <text class="content" x="35" y="230">  (猫, が, 走った): 1</text>
  <text class="content" x="35" y="250">  (犬, が, 座った): 1</text>
  <text class="content" x="35" y="275">  (猫, が, *): 2</text>

  <path class="line" d="M 220 160 L 260 160" marker-end="url(#arrow)"/>

  <rect class="hot" x="260" y="30" width="220" height="260" rx="4"/>
  <text class="label" x="370" y="55" text-anchor="middle">2. 平滑化</text>
  <text class="content" x="275" y="90">生カウントでは</text>
  <text class="content" x="275" y="110">未知 n-gram がゼロ。</text>
  <text class="content" x="275" y="145">Kneser-Ney は再配分:</text>
  <text class="content" x="275" y="170">  既知カウントを割引</text>
  <text class="content" x="275" y="190">  継続確率を使う</text>
  <text class="content" x="275" y="210">  未知語に備える</text>
  <text class="content" x="275" y="245">P(w | prev) = max(c-D, 0)/N</text>
  <text class="content" x="275" y="265">        + λ · P_cont(w)</text>

  <path class="line" d="M 480 160 L 520 160" marker-end="url(#arrow)"/>

  <rect class="box" x="520" y="30" width="180" height="260" rx="4"/>
  <text class="label" x="610" y="55" text-anchor="middle">3. 生成</text>
  <text class="content" x="535" y="90">次からサンプル</text>
  <text class="content" x="535" y="110">P(w | prev):</text>
  <text class="content" x="535" y="145">"猫" (開始)</text>
  <text class="content" x="535" y="165">  -> "が" (p=0.6)</text>
  <text class="content" x="535" y="185">     -> "座った" (p=0.4)</text>
  <text class="content" x="535" y="205">        -> "上"</text>
  <text class="content" x="535" y="225">           -> "に"</text>
  <text class="content" x="535" y="250">局所的には自然、</text>
  <text class="content" x="535" y="270">全体では不整合。</text>

  <path class="line" d="M 700 160 L 740 160" marker-end="url(#arrow)"/>

  <rect class="box" x="740" y="30" width="140" height="260" rx="4"/>
  <text class="label" x="810" y="55" text-anchor="middle">4. 評価</text>
  <text class="content" x="755" y="100">困惑度</text>
  <text class="content" x="755" y="125">= exp(- (1/N) Σ</text>
  <text class="content" x="755" y="145">   log P(w_i | ctx))</text>
  <text class="content" x="755" y="180">低いほど良い</text>
  <text class="content" x="755" y="220">Brown コーパス:</text>
  <text class="content" x="755" y="240">  KN 4-gram ~140</text>
  <text class="content" x="755" y="260">  Transformer ~20</text>

  <text class="stage" x="450" y="330" text-anchor="middle">Kneser-Ney は20年間、最良級の n-gram 平滑化だった。</text>
  <text class="stage" x="450" y="350" text-anchor="middle">Transformer は平滑化改良ではなく、困惑度差を約10倍縮めた。</text>
</svg>
