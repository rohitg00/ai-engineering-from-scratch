<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .metric { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .judge { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; }
      .mono { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="28" text-anchor="middle" class="title">RAG評価 — 4指標とLLM-as-judgeバックエンド</text>

  <!-- Inputs: question, context, answer -->
  <rect x="40" y="55" width="250" height="30" class="box"/>
  <text x="165" y="75" text-anchor="middle" class="content">質問: "iPhoneはいつ発売？"</text>

  <rect x="40" y="95" width="250" height="55" class="box"/>
  <text x="165" y="114" text-anchor="middle" class="content">検索コンテキスト:</text>
  <text x="165" y="132" text-anchor="middle" class="mono">"Appleは初代iPhoneを</text>
  <text x="165" y="145" text-anchor="middle" class="mono">2007年6月29日に発売。"</text>

  <rect x="40" y="160" width="250" height="30" class="box"/>
  <text x="165" y="180" text-anchor="middle" class="content">回答: "2007年6月29日。"</text>

  <line x1="290" y1="125" x2="330" y2="125" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Judge -->
  <rect x="330" y="80" width="220" height="130" class="judge"/>
  <text x="440" y="105" text-anchor="middle" class="label">LLM判定器</text>
  <text x="440" y="128" text-anchor="middle" class="caption">(GPT-4o-mini, Haiku, Mistral-small)</text>
  <text x="440" y="155" text-anchor="middle" class="mono">スコア(q, ctx, ans) → 0..1</text>
  <text x="440" y="180" text-anchor="middle" class="caption">採点基準 + CoT</text>
  <text x="440" y="198" text-anchor="middle" class="caption">人手評価に合わせて校正</text>

  <line x1="550" y1="125" x2="590" y2="125" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Metrics panel -->
  <rect x="590" y="55" width="270" height="250" class="box"/>
  <text x="725" y="80" text-anchor="middle" class="label">4つのRAG指標</text>

  <rect x="605" y="95" width="240" height="45" class="metric"/>
  <text x="615" y="115" class="label">忠実性</text>
  <text x="615" y="132" class="caption">回答の主張は文脈から導ける？</text>

  <rect x="605" y="145" width="240" height="45" class="metric"/>
  <text x="615" y="165" class="label">回答関連性</text>
  <text x="615" y="182" class="caption">回答は質問に答えている？</text>

  <rect x="605" y="195" width="240" height="45" class="metric"/>
  <text x="615" y="215" class="label">文脈適合率</text>
  <text x="615" y="232" class="caption">検索チャンク中の関連割合</text>

  <rect x="605" y="245" width="240" height="45" class="metric"/>
  <text x="615" y="265" class="label">文脈再現率</text>
  <text x="615" y="282" class="caption">検索結果は正解を含む？</text>

  <!-- Bottom -->
  <rect x="40" y="335" width="820" height="95" class="box"/>
  <text x="55" y="358" class="label">コスト / 校正 / CI</text>
  <text x="55" y="378" class="content">GPT-4o-miniで1判定 $0.001 – $0.003  —  1000件回帰テストで &lt;$5</text>
  <text x="55" y="396" class="content">必須: 信頼前に人手ラベル50件とのSpearman ρ &gt; 0.7を確認</text>
  <text x="55" y="414" class="content">ゲート: pytest + DeepEvalしきい値; 判定モデル+版を固定; 下位10%を可視化</text>
</svg>
