<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Document AI — OCR パイプラインからVLM-nativeまでの3時代</text>

  <rect x="30" y="50" width="900" height="210" class="box"/>

  <rect x="50" y="80" width="280" height="160" class="hot"/>
  <text x="190" y="102" text-anchor="middle" class="step">時代1: OCRパイプライン</text>
  <text x="190" y="124" text-anchor="middle" class="small">Tesseract / TrOCR検出</text>
  <text x="190" y="140" text-anchor="middle" class="small">LayoutLMv3レイアウト</text>
  <text x="190" y="156" text-anchor="middle" class="small">表認識器</text>
  <text x="190" y="172" text-anchor="middle" class="small">regex + ドメインルール</text>
  <text x="190" y="196" text-anchor="middle" class="step">利点: 安価で決定的</text>
  <text x="190" y="216" text-anchor="middle" class="small">欠点: 新形式に脆い</text>

  <rect x="340" y="80" width="280" height="160" class="cool"/>
  <text x="480" y="102" text-anchor="middle" class="step">時代2: OCRなし専門モデル</text>
  <text x="480" y="124" text-anchor="middle" class="small">Donut: image -&gt; JSON</text>
  <text x="480" y="140" text-anchor="middle" class="small">Nougat: paper -&gt; LaTeX</text>
  <text x="480" y="156" text-anchor="middle" class="small">DocLLM: レイアウト考慮生成</text>
  <text x="480" y="172" text-anchor="middle" class="small">swin / ViT エンコーダ</text>
  <text x="480" y="196" text-anchor="middle" class="step">利点: 単一モデル</text>
  <text x="480" y="216" text-anchor="middle" class="small">欠点: ドメイン特化</text>

  <rect x="630" y="80" width="280" height="160" class="cold"/>
  <text x="770" y="102" text-anchor="middle" class="step">時代3: VLM-native</text>
  <text x="770" y="124" text-anchor="middle" class="small">Qwen2.5-VL native解像度</text>
  <text x="770" y="140" text-anchor="middle" class="small">PaliGemma 2 文書学習</text>
  <text x="770" y="156" text-anchor="middle" class="small">Claude 4.7 at 2576px</text>
  <text x="770" y="172" text-anchor="middle" class="small">最前線の商用モデル</text>
  <text x="770" y="196" text-anchor="middle" class="step">利点: パイプライン不要</text>
  <text x="770" y="216" text-anchor="middle" class="small">欠点: コスト + 幻覚</text>

  <rect x="30" y="280" width="900" height="230" class="box"/>
  <text x="480" y="302" text-anchor="middle" class="head">ベンチマーク + 2026年レシピ選択器</text>

  <g transform="translate(60, 320)">
    <text x="0" y="15" class="step">評価</text>
    <text x="200" y="15" class="step">OCR+LLMv3</text>
    <text x="320" y="15" class="step">Nougat</text>
    <text x="420" y="15" class="step">PaliGemma 2</text>
    <text x="560" y="15" class="step">Claude 4.7</text>

    <text x="0" y="40" class="small">DocVQA</text>
    <text x="200" y="40" class="small">83.0</text>
    <text x="320" y="40" class="small">77.3</text>
    <text x="420" y="40" class="small">88.4</text>
    <text x="560" y="40" class="small">95.1</text>

    <text x="0" y="60" class="small">ChartQA</text>
    <text x="200" y="60" class="small">-</text>
    <text x="320" y="60" class="small">-</text>
    <text x="420" y="60" class="small">85.1</text>
    <text x="560" y="60" class="small">92.2</text>

    <text x="0" y="80" class="small">Math LaTeX</text>
    <text x="200" y="80" class="small">-</text>
    <text x="320" y="80" class="small">90.5</text>
    <text x="420" y="80" class="small">82.0</text>
    <text x="560" y="80" class="small">94.3</text>

    <text x="0" y="100" class="small">手書き</text>
    <text x="200" y="100" class="small">65</text>
    <text x="320" y="100" class="small">-</text>
    <text x="420" y="100" class="small">80</text>
    <text x="560" y="100" class="small">92</text>
  </g>

  <rect x="620" y="320" width="290" height="170" class="reg"/>
  <text x="765" y="342" text-anchor="middle" class="step">2026年選択器</text>
  <text x="765" y="362" text-anchor="middle" class="small">請求書1000万/日 -&gt; Era 1</text>
  <text x="765" y="378" text-anchor="middle" class="small">科学論文 -&gt; Nougat + VLM</text>
  <text x="765" y="394" text-anchor="middle" class="small">手書き混在 -&gt; VLM-native</text>
  <text x="765" y="410" text-anchor="middle" class="small">規制領域 -&gt; ハイブリッド照合</text>
  <text x="765" y="436" text-anchor="middle" class="step">最前線との差分</text>
  <text x="765" y="456" text-anchor="middle" class="small">open 7B VLM: DocVQA ~88</text>
  <text x="765" y="472" text-anchor="middle" class="small">Claude 4.7: ~95、人間並み</text>
</svg>
