<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Thinker-Talker — リアルタイム音声向けストリーミングパイプライン</text>

  <rect x="30" y="50" width="900" height="230" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">並列ストリーミング: ThinkerとTalkerが同時に走る</text>

  <rect x="60" y="90" width="140" height="170" class="hot"/>
  <text x="130" y="112" text-anchor="middle" class="step">ユーザー音声</text>
  <text x="130" y="130" text-anchor="middle" class="small">マイク 16 kHz</text>
  <text x="130" y="146" text-anchor="middle" class="small">+ Webカメラ 4 fps</text>
  <text x="130" y="166" text-anchor="middle" class="small">ストリーミング</text>
  <text x="130" y="186" text-anchor="middle" class="small">トークン入力</text>
  <text x="130" y="212" text-anchor="middle" class="caption">話者交替用VAD</text>

  <path d="M 205 170 L 245 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="90" width="210" height="170" class="cool"/>
  <text x="355" y="112" text-anchor="middle" class="step">Thinker (7-80B)</text>
  <text x="355" y="130" text-anchor="middle" class="small">テキスト生成担当</text>
  <text x="355" y="146" text-anchor="middle" class="small">大規模LLM推論</text>
  <text x="355" y="162" text-anchor="middle" class="small">TMRoPEタイムスタンプ</text>
  <text x="355" y="180" text-anchor="middle" class="small">テキストトークンを出力</text>
  <text x="355" y="202" text-anchor="middle" class="step">初回トークン ~40ms</text>
  <text x="355" y="224" text-anchor="middle" class="caption">トークンごとにストリーム</text>
  <text x="355" y="240" text-anchor="middle" class="caption">Talkerへ渡す</text>

  <path d="M 465 170 L 505 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="90" width="210" height="170" class="cold"/>
  <text x="615" y="112" text-anchor="middle" class="step">Talker (200M-1B)</text>
  <text x="615" y="130" text-anchor="middle" class="small">音声生成担当</text>
  <text x="615" y="146" text-anchor="middle" class="small">小型 + 高速</text>
  <text x="615" y="162" text-anchor="middle" class="small">残差-VQ出力</text>
  <text x="615" y="180" text-anchor="middle" class="small">8コードブック</text>
  <text x="615" y="202" text-anchor="middle" class="step">50 tok/s スループット</text>
  <text x="615" y="224" text-anchor="middle" class="caption">音声速度に追従</text>

  <path d="M 725 170 L 765 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="770" y="90" width="140" height="170" class="reg"/>
  <text x="840" y="112" text-anchor="middle" class="step">波形</text>
  <text x="840" y="130" text-anchor="middle" class="small">SNACデコーダ</text>
  <text x="840" y="146" text-anchor="middle" class="small">16 kHzサンプル</text>
  <text x="840" y="162" text-anchor="middle" class="small">スピーカー出力</text>
  <text x="840" y="182" text-anchor="middle" class="step">~70 msデコード</text>
  <text x="840" y="206" text-anchor="middle" class="caption">ストリーミング</text>

  <rect x="30" y="300" width="900" height="220" class="box"/>
  <text x="480" y="322" text-anchor="middle" class="head">TTFAB予算とオープン実装</text>

  <g transform="translate(60, 350)">
    <text x="0" y="15" class="step">マイク -&gt; 音声トークン</text>
    <rect x="200" y="2" width="50" height="16" class="hot"/>
    <text x="260" y="15" class="small">40 ms</text>

    <text x="0" y="40" class="step">Thinkerプリフィル</text>
    <rect x="200" y="27" width="120" height="16" class="cool"/>
    <text x="330" y="40" class="small">7Bで100 ms</text>

    <text x="0" y="65" class="step">初回テキストトークン</text>
    <rect x="200" y="52" width="45" height="16" class="cool"/>
    <text x="255" y="65" class="small">40 ms</text>

    <text x="0" y="90" class="step">Talker初回トークン</text>
    <rect x="200" y="77" width="20" height="16" class="cold"/>
    <text x="230" y="90" class="small">20 ms</text>

    <text x="0" y="115" class="step">RVQ + 波形</text>
    <rect x="200" y="102" width="100" height="16" class="reg"/>
    <text x="310" y="115" class="small">100 ms</text>
  </g>

  <rect x="590" y="340" width="320" height="160" class="reg"/>
  <text x="750" y="362" text-anchor="middle" class="step">オープン実装</text>
  <text x="750" y="384" text-anchor="middle" class="small">Mini-Omni : 最初のオープンストリーミング</text>
  <text x="750" y="402" text-anchor="middle" class="small">Moshi     : 160 ms, 内的独白</text>
  <text x="750" y="420" text-anchor="middle" class="small">Qwen2.5-Omni : ~350 ms, TMRoPE</text>
  <text x="750" y="438" text-anchor="middle" class="small">Qwen3-Omni   : GPT-4oに近い</text>
  <text x="750" y="456" text-anchor="middle" class="small">GLM-4-Voice  : 中国語優先</text>
  <text x="750" y="480" text-anchor="middle" class="caption">GPT-4o参考値: ~250 ms</text>
</svg>
