      <text x="360" y="14" class="small">すべて埋め済み</text>
    </g>
  </g>

  <text x="480" y="250" text-anchor="middle" class="small">各ステップで全maskを並列予測し、信頼度上位Kを確定</text>

  <rect x="30" y="290" width="900" height="230" class="box"/>
  <text x="480" y="312" text-anchor="middle" class="head">Show-oと代替手法</text>

  <rect x="50" y="330" width="210" height="180" class="hot"/>
  <text x="155" y="352" text-anchor="middle" class="step">Chameleon / Emu3</text>
  <text x="155" y="372" text-anchor="middle" class="small">離散 + NTP</text>
  <text x="155" y="390" text-anchor="middle" class="small">1024回のforward pass</text>
  <text x="155" y="406" text-anchor="middle" class="small">~2 min / 512x512</text>
  <text x="155" y="430" text-anchor="middle" class="small">最も単純な学習</text>
  <text x="155" y="448" text-anchor="middle" class="small">品質はトークナイザ上限</text>

  <rect x="280" y="330" width="210" height="180" class="cool"/>
  <text x="385" y="352" text-anchor="middle" class="step">Show-o / MaskGIT</text>
  <text x="385" y="372" text-anchor="middle" class="small">離散 + マスク拡散</text>
  <text x="385" y="390" text-anchor="middle" class="small">~16回のforward pass</text>
  <text x="385" y="406" text-anchor="middle" class="small">~4-8s / 512x512</text>
  <text x="385" y="430" text-anchor="middle" class="small">単一損失で単純</text>
  <text x="385" y="448" text-anchor="middle" class="small">インペイントも自然</text>

  <rect x="510" y="330" width="210" height="180" class="cold"/>
  <text x="615" y="352" text-anchor="middle" class="step">Transfusion / MMDiT</text>
  <text x="615" y="372" text-anchor="middle" class="small">連続 + 拡散</text>
  <text x="615" y="390" text-anchor="middle" class="small">~20回のforward pass</text>
  <text x="615" y="406" text-anchor="middle" class="small">~5-10s / 512x512</text>
  <text x="615" y="430" text-anchor="middle" class="small">最高品質</text>
  <text x="615" y="448" text-anchor="middle" class="small">二重損失の調整が必要</text>

  <rect x="740" y="330" width="180" height="180" class="reg"/>
  <text x="830" y="352" text-anchor="middle" class="step">Stable Diffusion</text>
  <text x="830" y="372" text-anchor="middle" class="small">連続latent</text>
  <text x="830" y="390" text-anchor="middle" class="small">~20回pass</text>
  <text x="830" y="406" text-anchor="middle" class="small">~2-5s / 512x512</text>
  <text x="830" y="430" text-anchor="middle" class="small">専門モデル</text>
  <text x="830" y="448" text-anchor="middle" class="small">VQA/推論なし</text>
</svg>
