<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Audio-LLMの流れ: Whisper (2022) から Audio Flamingo 3 (2025)へ</text>

  <rect x="30" y="50" width="900" height="230" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">パイプライン: スペクトログラム -&gt; エンコーダ -&gt; Q-former -&gt; LLM</text>

  <rect x="50" y="90" width="180" height="170" class="hot"/>
  <text x="140" y="110" text-anchor="middle" class="step">1. 波形</text>
  <text x="140" y="128" text-anchor="middle" class="small">16 kHzモノラル</text>
  <text x="140" y="150" text-anchor="middle" class="step">2. log-Melスペクトログラム</text>
  <text x="140" y="168" text-anchor="middle" class="small">25ms窓, 10msホップ</text>
  <text x="140" y="184" text-anchor="middle" class="small">80 Melビン</text>
  <text x="140" y="200" text-anchor="middle" class="small">log圧縮</text>
  <text x="140" y="222" text-anchor="middle" class="small">30s = 3000フレーム</text>

  <path d="M 235 170 L 275 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="90" width="200" height="170" class="cool"/>
  <text x="380" y="110" text-anchor="middle" class="step">3. 音声 エンコーダ</text>
  <text x="380" y="132" text-anchor="middle" class="small">Whisper: 音声に強い</text>
  <text x="380" y="148" text-anchor="middle" class="small">BEATs: 音楽に強い</text>
  <text x="380" y="164" text-anchor="middle" class="small">AF-Whisper: 連結</text>
  <text x="380" y="186" text-anchor="middle" class="small">10msあたり1フレーム</text>
  <text x="380" y="210" text-anchor="middle" class="small">12層transformer</text>
  <text x="380" y="230" text-anchor="middle" class="caption">bridge学習時は固定</text>

  <path d="M 485 170 L 525 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="530" y="90" width="200" height="170" class="cold"/>
  <text x="630" y="110" text-anchor="middle" class="step">4. 音声 Q-former</text>
  <text x="630" y="132" text-anchor="middle" class="small">32-64学習可能クエリ</text>
  <text x="630" y="148" text-anchor="middle" class="small">フレームへcross-参照</text>
  <text x="630" y="164" text-anchor="middle" class="small">固定長トークンを出力</text>
  <text x="630" y="186" text-anchor="middle" class="step">学習</text>
  <text x="630" y="202" text-anchor="middle" class="small">stage 1: ITM + ITC + ITG</text>
  <text x="630" y="218" text-anchor="middle" class="small">stage 2: 指示チューニング</text>

  <path d="M 735 170 L 775 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="780" y="90" width="140" height="170" class="reg"/>
  <text x="850" y="110" text-anchor="middle" class="step">5. LLM</text>
  <text x="850" y="128" text-anchor="middle" class="small">Qwen2.5-7B</text>
  <text x="850" y="144" text-anchor="middle" class="small">または Llama 3.1</text>
  <text x="850" y="166" text-anchor="middle" class="step">出力</text>
  <text x="850" y="184" text-anchor="middle" class="small">キャプション</text>
  <text x="850" y="200" text-anchor="middle" class="small">QA回答</text>
  <text x="850" y="216" text-anchor="middle" class="small">CoT付き</text>

  <rect x="30" y="300" width="900" height="210" class="box"/>
  <text x="480" y="322" text-anchor="middle" class="head">カスケード vs end-to-end のタスク範囲</text>

  <rect x="50" y="340" width="400" height="160" class="hot"/>
  <text x="250" y="362" text-anchor="middle" class="step">カスケード (Whisper -&gt; LLM)</text>
  <text x="250" y="384" text-anchor="middle" class="small">文字起こし: はい</text>
  <text x="250" y="400" text-anchor="middle" class="small">要約: はい</text>
  <text x="250" y="416" text-anchor="middle" class="small">感情: いいえ</text>
  <text x="250" y="432" text-anchor="middle" class="small">音楽ジャンル: いいえ</text>
  <text x="250" y="448" text-anchor="middle" class="small">環境音: いいえ</text>
  <text x="250" y="464" text-anchor="middle" class="small">deepfake: いいえ</text>
  <text x="250" y="488" text-anchor="middle" class="caption">MMAU ~0.50</text>

  <rect x="470" y="340" width="440" height="160" class="cool"/>
  <text x="690" y="362" text-anchor="middle" class="step">end-to-end音声LLM (AF3)</text>
  <text x="690" y="384" text-anchor="middle" class="small">カスケードタスク全部: はい</text>
  <text x="690" y="400" text-anchor="middle" class="small">感情 / 気分: はい</text>
  <text x="690" y="416" text-anchor="middle" class="small">音楽 / 楽器: はい</text>
  <text x="690" y="432" text-anchor="middle" class="small">環境音: はい</text>
  <text x="690" y="448" text-anchor="middle" class="small">時間接地: はい</text>
  <text x="690" y="464" text-anchor="middle" class="small">オンデマンドCoT: +3-5 pts</text>
  <text x="690" y="488" text-anchor="middle" class="caption">MMAU 0.72 (open SOTA 2025)</text>
</svg>
