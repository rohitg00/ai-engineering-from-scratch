<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Janus-Pro — 入力エンコーダ分離、共有Transformer本体</text>

  <rect x="30" y="50" width="900" height="270" class="box"/>

  <rect x="60" y="80" width="180" height="100" class="hot"/>
  <text x="150" y="102" text-anchor="middle" class="step">入力: 画像</text>
  <text x="150" y="124" text-anchor="middle" class="small">視覚信号のソース</text>
  <text x="150" y="146" text-anchor="middle" class="small">理解: 説明</text>
  <text x="150" y="162" text-anchor="middle" class="small">生成: 条件付け</text>

  <path d="M 245 110 L 285 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 245 150 L 285 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="290" y="70" width="170" height="60" class="cool"/>
  <text x="375" y="92" text-anchor="middle" class="step">SigLIP エンコーダ</text>
  <text x="375" y="108" text-anchor="middle" class="small">理解経路</text>
  <text x="375" y="122" text-anchor="middle" class="small">意味特徴</text>

  <rect x="290" y="140" width="170" height="60" class="cold"/>
  <text x="375" y="162" text-anchor="middle" class="step">VQ エンコーダ</text>
  <text x="375" y="178" text-anchor="middle" class="small">生成経路</text>
  <text x="375" y="192" text-anchor="middle" class="small">再構成コード</text>

  <path d="M 465 100 L 505 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 465 170 L 505 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="100" width="180" height="100" class="reg"/>
  <text x="600" y="122" text-anchor="middle" class="step">共有transformer</text>
  <text x="600" y="142" text-anchor="middle" class="small">本体も重みセットも1つ</text>
  <text x="600" y="158" text-anchor="middle" class="small">DeepSeek-7Bから初期化</text>
  <text x="600" y="174" text-anchor="middle" class="small">両エンコーダを受け止める</text>
  <text x="600" y="190" text-anchor="middle" class="small">自己回帰デコード</text>

  <path d="M 695 120 L 745 90" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 695 170 L 745 200" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="750" y="70" width="160" height="60" class="cool"/>
  <text x="830" y="92" text-anchor="middle" class="step">テキスト出力</text>
  <text x="830" y="108" text-anchor="middle" class="small">NTP, 語彙logits</text>
  <text x="830" y="122" text-anchor="middle" class="small">VQA, キャプション</text>

  <rect x="750" y="180" width="160" height="60" class="cold"/>
  <text x="830" y="202" text-anchor="middle" class="step">画像VQ -&gt; ピクセル</text>
  <text x="830" y="218" text-anchor="middle" class="small">VQトークンを出力</text>
  <text x="830" y="232" text-anchor="middle" class="small">デコーダ -&gt; ピクセル</text>

  <rect x="60" y="230" width="850" height="70" class="box"/>
  <text x="485" y="252" text-anchor="middle" class="step">routingタグがエンコーダと出力ヘッドを選ぶ</text>
  <text x="485" y="272" text-anchor="middle" class="small">&lt;understand&gt; image -&gt; SigLIP -&gt; 本体 -&gt; テキスト</text>
  <text x="485" y="288" text-anchor="middle" class="small">&lt;generate&gt; テキスト -&gt; 本体 -&gt; VQ トークン -&gt; ピクセル</text>

  <rect x="30" y="340" width="900" height="160" class="box"/>
  <text x="480" y="362" text-anchor="middle" class="head">Janus-Proデータ + スケール スコアカード</text>

  <g transform="translate(60, 380)">
    <text x="0" y="15" class="step">軸</text>
    <text x="200" y="15" class="step">Janus (Oct 2024)</text>
    <text x="450" y="15" class="step">Janus-Pro (Jan 2025)</text>
    <text x="710" y="15" class="step">差分</text>

    <text x="0" y="40" class="small">モデルパラメータ</text>
    <text x="200" y="40" class="small">1.3B</text>
    <text x="450" y="40" class="small">7B</text>
    <text x="710" y="40" class="small">5.4x</text>

    <text x="0" y="60" class="small">stage-2データ</text>
    <text x="200" y="60" class="small">26M ペア</text>
    <text x="450" y="60" class="small">72M ペア</text>
    <text x="710" y="60" class="small">+176%</text>

    <text x="0" y="80" class="small">MMMU</text>
    <text x="200" y="80" class="small">30.5</text>
    <text x="450" y="80" class="small">60.3</text>
    <text x="710" y="80" class="small">+29.8</text>

    <text x="0" y="100" class="small">GenEval</text>
    <text x="200" y="100" class="small">0.61</text>
    <text x="450" y="100" class="small">0.80 (DALL-E 3超え)</text>
    <text x="710" y="100" class="small">+0.19</text>
  </g>
</svg>
