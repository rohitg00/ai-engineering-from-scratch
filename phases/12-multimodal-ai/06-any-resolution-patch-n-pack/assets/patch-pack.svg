<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Patch-n'-pack: 可変解像度画像を1つの系列へ</text>

  <rect x="30" y="50" width="200" height="200" class="box"/>
  <text x="130" y="70" text-anchor="middle" class="head">3枚の画像、3つの形</text>
  <rect x="50" y="85" width="60" height="120" class="hot"/>
  <text x="80" y="95" text-anchor="middle" class="small">レシート</text>
  <text x="80" y="225" text-anchor="middle" class="small">600x1500</text>
  <rect x="125" y="105" width="90" height="50" class="cool"/>
  <text x="170" y="100" text-anchor="middle" class="small">チャート 1280x720</text>
  <text x="170" y="175" text-anchor="middle" class="small">16:9</text>
  <rect x="125" y="165" width="50" height="80" class="cold"/>
  <text x="150" y="160" text-anchor="middle" class="small">画面</text>
  <rect x="180" y="165" width="40" height="80" class="cold"/>
  <text x="200" y="160" text-anchor="middle" class="small">スマホ</text>
  <text x="130" y="245" text-anchor="middle" class="caption">native解像度、patch 14</text>

  <path d="M 235 150 L 295 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="140" text-anchor="middle" class="small">各画像をpatch化</text>

  <rect x="300" y="50" width="320" height="200" class="reg"/>
  <text x="460" y="70" text-anchor="middle" class="head">packed sequence（詰め込み系列）</text>
  <text x="460" y="88" text-anchor="middle" class="small">全画像のpatchを連結</text>
  <g>
    <rect x="315" y="100" width="120" height="20" class="hot"/>
    <text x="375" y="114" text-anchor="middle" class="small">レシートトークン (n_0)</text>
    <rect x="315" y="125" width="150" height="20" class="cool"/>
    <text x="390" y="139" text-anchor="middle" class="small">チャートトークン (n_1)</text>
    <rect x="315" y="150" width="200" height="20" class="cold"/>
    <text x="415" y="164" text-anchor="middle" class="small">スマホトークン (n_2)</text>
  </g>
  <text x="460" y="200" text-anchor="middle" class="step">cu_seqlens = [0, n_0, n_0+n_1, N]</text>
  <text x="460" y="222" text-anchor="middle" class="small">FlashAttn varlen: paddingなし、dense maskなし</text>
  <text x="460" y="240" text-anchor="middle" class="small">N = n_0 + n_1 + n_2  (無駄ゼロ)</text>

  <path d="M 625 150 L 685 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="655" y="140" text-anchor="middle" class="small">ブロック対角</text>

  <rect x="690" y="50" width="240" height="200" class="cool"/>
  <text x="810" y="70" text-anchor="middle" class="head">ブロック対角mask（ブロック対角）</text>
  <g transform="translate(730,90)">
    <rect x="0" y="0" width="30" height="30" class="hot"/>
    <rect x="30" y="30" width="60" height="60" class="cool"/>
    <rect x="90" y="90" width="80" height="80" class="cold"/>
  </g>
  <text x="810" y="230" text-anchor="middle" class="small">各画像は自分の内側だけを見る</text>

  <rect x="30" y="280" width="900" height="240" class="box"/>
  <text x="480" y="302" text-anchor="middle" class="head">any-resolution visionの4戦略</text>

  <rect x="50" y="320" width="200" height="180" class="hot"/>
  <text x="150" y="342" text-anchor="middle" class="step">正方形resize</text>
  <text x="150" y="364" text-anchor="middle" class="small">336x336へresize</text>
  <text x="150" y="380" text-anchor="middle" class="small">固定576トークン</text>
  <text x="150" y="398" text-anchor="middle" class="small">OCRが落ち、文字が潰れ</text>
  <text x="150" y="416" text-anchor="middle" class="small">padも無駄になる</text>
  <text x="150" y="440" text-anchor="middle" class="step">ベースライン、2024以前</text>
  <text x="150" y="458" text-anchor="middle" class="small">LLaVA-1.5が採用</text>

  <rect x="260" y="320" width="200" height="180" class="cool"/>
  <text x="360" y="342" text-anchor="middle" class="step">AnyRes タイリング</text>
  <text x="360" y="364" text-anchor="middle" class="small">タイル MxN + サムネイル</text>
  <text x="360" y="380" text-anchor="middle" class="small">336の固定エンコーダ</text>
  <text x="360" y="398" text-anchor="middle" class="small">忠実度 + global コンテキスト</text>
  <text x="360" y="416" text-anchor="middle" class="small">3x3超えは高コスト</text>
  <text x="360" y="440" text-anchor="middle" class="step">LLaVA-NeXT (2024)</text>

  <rect x="470" y="320" width="200" height="180" class="cold"/>
  <text x="570" y="342" text-anchor="middle" class="step">M-RoPE + native</text>
  <text x="570" y="364" text-anchor="middle" class="small">3D 位置 (t, r, c)</text>
  <text x="570" y="380" text-anchor="middle" class="small">任意のHxWxT</text>
  <text x="570" y="398" text-anchor="middle" class="small">位置table不要</text>
  <text x="570" y="416" text-anchor="middle" class="small">min/max pixel capで制御</text>
  <text x="570" y="440" text-anchor="middle" class="step">Qwen2-VL / Qwen3-VL</text>

  <rect x="680" y="320" width="210" height="180" class="reg"/>
  <text x="785" y="342" text-anchor="middle" class="step">NaFlex単一checkpoint</text>
  <text x="785" y="364" text-anchor="middle" class="small">256/729/1024を選ぶ</text>
  <text x="785" y="380" text-anchor="middle" class="small">推論時にタスク別</text>
  <text x="785" y="398" text-anchor="middle" class="small">patch-n'-packで学習</text>
  <text x="785" y="416" text-anchor="middle" class="small">fractional 位置埋め込み</text>
  <text x="785" y="440" text-anchor="middle" class="step">SigLIP 2 (2025)</text>
  <text x="785" y="458" text-anchor="middle" class="small">2026年open-VLM default</text>
</svg>
