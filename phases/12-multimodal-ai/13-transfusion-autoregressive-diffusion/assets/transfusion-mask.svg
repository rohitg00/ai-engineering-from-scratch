<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Transfusion — 1つのTransformer、2つの損失、hybrid attention mask</text>

  <rect x="30" y="50" width="900" height="240" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">forward pass、2つの損失ヘッド</text>

  <rect x="60" y="90" width="260" height="180" class="hot"/>
  <text x="190" y="112" text-anchor="middle" class="step">テキストトークン</text>
  <text x="190" y="132" text-anchor="middle" class="small">離散BPE語彙</text>
  <text x="190" y="150" text-anchor="middle" class="small">causal attention</text>
  <text x="190" y="168" text-anchor="middle" class="small">teacher forcing</text>
  <text x="190" y="194" text-anchor="middle" class="step">損失: 交差エントロピー</text>
  <text x="190" y="216" text-anchor="middle" class="small">次トークン予測</text>
  <text x="190" y="232" text-anchor="middle" class="small">語彙logits ヘッド</text>
  <text x="190" y="258" text-anchor="middle" class="caption">通常のLLMと同じ</text>

  <rect x="350" y="90" width="260" height="180" class="cool"/>
  <text x="480" y="112" text-anchor="middle" class="step">共有Transformer本体</text>
  <text x="480" y="132" text-anchor="middle" class="small">重みセットは1つ</text>
  <text x="480" y="150" text-anchor="middle" class="small">block-triangular mask</text>
  <text x="480" y="168" text-anchor="middle" class="small">両モダリティを入力</text>
  <text x="480" y="186" text-anchor="middle" class="small">1回のforward passで</text>
  <text x="480" y="218" text-anchor="middle" class="step">勾配が混ざる</text>
  <text x="480" y="236" text-anchor="middle" class="small">テキスト/画像目的関数</text>
  <text x="480" y="254" text-anchor="middle" class="caption">共有本体、2つのヘッド</text>

  <rect x="640" y="90" width="260" height="180" class="cold"/>
  <text x="770" y="112" text-anchor="middle" class="step">画像patch</text>
  <text x="770" y="132" text-anchor="middle" class="small">連続ベクトル</text>
  <text x="770" y="150" text-anchor="middle" class="small">双方向attention</text>
  <text x="770" y="168" text-anchor="middle" class="small">画像ブロック内で</text>
  <text x="770" y="194" text-anchor="middle" class="step">損失: 速度のMSE</text>
  <text x="770" y="216" text-anchor="middle" class="small">flow-matching 拡散</text>
  <text x="770" y="232" text-anchor="middle" class="small">noise -&gt; データを予測</text>
  <text x="770" y="258" text-anchor="middle" class="caption">SD3 MMDiT 近縁</text>

  <rect x="30" y="310" width="900" height="200" class="box"/>
  <text x="480" y="332" text-anchor="middle" class="head">[T T &lt;image&gt; P P P P &lt;/image&gt; T T] 用hybrid attention mask</text>

  <g transform="translate(200, 350)">
    <rect x="0" y="0" width="18" height="18" class="hot"/>
    <rect x="20" y="0" width="18" height="18" class="hot"/>
    <rect x="40" y="0" width="18" height="18" class="box"/>
    <rect x="60" y="0" width="18" height="18" class="cold"/>
    <rect x="80" y="0" width="18" height="18" class="cold"/>
    <rect x="100" y="0" width="18" height="18" class="cold"/>
    <rect x="120" y="0" width="18" height="18" class="cold"/>
    <rect x="140" y="0" width="18" height="18" class="box"/>
    <rect x="160" y="0" width="18" height="18" class="hot"/>
    <rect x="180" y="0" width="18" height="18" class="hot"/>

    <text x="9" y="35" text-anchor="middle" class="small">T</text>
    <text x="29" y="35" text-anchor="middle" class="small">T</text>
    <text x="49" y="35" text-anchor="middle" class="small">&lt;I&gt;</text>
    <text x="69" y="35" text-anchor="middle" class="small">P</text>
    <text x="89" y="35" text-anchor="middle" class="small">P</text>
    <text x="109" y="35" text-anchor="middle" class="small">P</text>
    <text x="129" y="35" text-anchor="middle" class="small">P</text>
    <text x="149" y="35" text-anchor="middle" class="small">&lt;/I&gt;</text>
    <text x="169" y="35" text-anchor="middle" class="small">T</text>
    <text x="189" y="35" text-anchor="middle" class="small">T</text>
  </g>

  <rect x="420" y="340" width="490" height="160" class="reg"/>
  <text x="665" y="362" text-anchor="middle" class="step">mask規則</text>
  <text x="665" y="384" text-anchor="middle" class="small">1. text-to-text: causal（三角）</text>
  <text x="665" y="402" text-anchor="middle" class="small">2. patch-to-patch: 画像内は完全双方向</text>
  <text x="665" y="420" text-anchor="middle" class="small">3. text-to-prior-image: 全部参照</text>
  <text x="665" y="438" text-anchor="middle" class="small">4. image-to-prior-text: 全部参照</text>
  <text x="665" y="460" text-anchor="middle" class="small">5. image-to-later-textは禁止 (causal block)</text>
  <text x="665" y="480" text-anchor="middle" class="caption">単一block-triangular maskとして実装</text>
</svg>
