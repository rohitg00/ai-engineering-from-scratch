<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Video VLMs — フレームサンプリング、時間トークン、接地出力</text>

  <rect x="30" y="50" width="900" height="220" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">2023から2025の3つのアーキテクチャパターン</text>

  <rect x="50" y="90" width="280" height="160" class="hot"/>
  <text x="190" y="110" text-anchor="middle" class="step">Video-LLaMA (2023)</text>
  <text x="190" y="128" text-anchor="middle" class="small">Q-former + 音声ブランチ</text>
  <text x="190" y="144" text-anchor="middle" class="small">16フレーム @ 2 FPS固定</text>
  <text x="190" y="160" text-anchor="middle" class="small">32動画クエリ, 32音声</text>
  <text x="190" y="184" text-anchor="middle" class="step">強み: 音声接地</text>
  <text x="190" y="204" text-anchor="middle" class="small">弱み: 8s固定クリップ</text>
  <text x="190" y="220" text-anchor="middle" class="small">イベント時刻localizationなし</text>

  <rect x="340" y="90" width="280" height="160" class="cool"/>
  <text x="480" y="110" text-anchor="middle" class="step">Video-LLaVA (2023)</text>
  <text x="480" y="128" text-anchor="middle" class="small">MLP + 共有エンコーダ</text>
  <text x="480" y="144" text-anchor="middle" class="small">8フレーム @ 1-2 FPS</text>
  <text x="480" y="160" text-anchor="middle" class="small">射影前に整列</text>
  <text x="480" y="184" text-anchor="middle" class="step">強み: 単純 + 有効</text>
  <text x="480" y="204" text-anchor="middle" class="small">弱み: 短いクリップのみ</text>
  <text x="480" y="220" text-anchor="middle" class="small">dynamic FPSなし</text>

  <rect x="630" y="90" width="280" height="160" class="cold"/>
  <text x="770" y="110" text-anchor="middle" class="step">Qwen2.5-VL (2025)</text>
  <text x="770" y="128" text-anchor="middle" class="small">TMRoPE + dynamic FPS</text>
  <text x="770" y="144" text-anchor="middle" class="small">任意の長さ</text>
  <text x="770" y="160" text-anchor="middle" class="small">絶対時刻トークン</text>
  <text x="770" y="184" text-anchor="middle" class="step">強み: イベント接地</text>
  <text x="770" y="204" text-anchor="middle" class="small">JSON出力形式</text>
  <text x="770" y="220" text-anchor="middle" class="small">open SOTA 2026</text>

  <rect x="30" y="290" width="900" height="230" class="box"/>
  <text x="480" y="312" text-anchor="middle" class="head">フレームサンプリング + 出力形式</text>

  <rect x="60" y="330" width="260" height="170" class="reg"/>
  <text x="190" y="352" text-anchor="middle" class="step">フレームサンプリング戦略</text>
  <text x="190" y="372" text-anchor="middle" class="small">uniform: Nフレーム / 長さ</text>
  <text x="190" y="388" text-anchor="middle" class="small">- 単純だが動きのピークを逃す</text>
  <text x="190" y="408" text-anchor="middle" class="small">dynamic FPS: 動きで重み付け</text>
  <text x="190" y="424" text-anchor="middle" class="small">- 高動き区間を密にする</text>
  <text x="190" y="444" text-anchor="middle" class="small">event-driven: detector + sample</text>
  <text x="190" y="460" text-anchor="middle" class="small">- 行動認識に最適</text>
  <text x="190" y="480" text-anchor="middle" class="caption">frameごとに3x3 プーリングと併用</text>

  <rect x="340" y="330" width="280" height="170" class="hot"/>
  <text x="480" y="352" text-anchor="middle" class="step">接地出力形式</text>
  <text x="480" y="372" text-anchor="middle" class="small">自由テキスト:</text>
  <text x="480" y="388" text-anchor="middle" class="small">"The cat jumps around 4s"</text>
  <text x="480" y="412" text-anchor="middle" class="small">JSON:</text>
  <text x="480" y="428" text-anchor="middle" class="small">{"event":"jump","start":4.1,"end":4.3}</text>
  <text x="480" y="452" text-anchor="middle" class="small">token:</text>
  <text x="480" y="468" text-anchor="middle" class="small">"&lt;time&gt;4.1&lt;/time&gt; jump"</text>
  <text x="480" y="488" text-anchor="middle" class="caption">下流でparseしやすいのはJSON</text>

  <rect x="640" y="330" width="280" height="170" class="cool"/>
  <text x="780" y="352" text-anchor="middle" class="step">ベンチマーク</text>
  <text x="780" y="372" text-anchor="middle" class="small">VideoMME: 汎用, 2500サンプル</text>
  <text x="780" y="388" text-anchor="middle" class="small">TempCompass: 前後関係</text>
  <text x="780" y="404" text-anchor="middle" class="small">EgoSchema: 3分の一人称</text>
  <text x="780" y="420" text-anchor="middle" class="small">Video-MMMU: 複数分野</text>
  <text x="780" y="446" text-anchor="middle" class="step">open SOTA 2026</text>
  <text x="780" y="462" text-anchor="middle" class="small">Qwen2.5-VL-72B</text>
  <text x="780" y="478" text-anchor="middle" class="small">差別化要因はTMRoPE</text>
</svg>
