<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">長時間動画理解 — 4つのスケール戦略</text>

  <rect x="30" y="50" width="440" height="210" class="hot"/>
  <text x="250" y="72" text-anchor="middle" class="head">Path 1: brute コンテキスト（巨大コンテキスト）</text>
  <text x="250" y="96" text-anchor="middle" class="small">Gemini 1.5 Pro: 1M トークン</text>
  <text x="250" y="114" text-anchor="middle" class="small">Gemini 2.5 Pro: 10M+ トークン</text>
  <text x="250" y="132" text-anchor="middle" class="small">Claude Opus 4.7: 1M トークン</text>
  <text x="250" y="160" text-anchor="middle" class="step">実装要点</text>
  <text x="250" y="180" text-anchor="middle" class="small">custom attention階層</text>
  <text x="250" y="196" text-anchor="middle" class="small">MoE expert routing</text>
  <text x="250" y="212" text-anchor="middle" class="small">非公開</text>
  <text x="250" y="240" text-anchor="middle" class="caption">再現率最強、非公開のみ</text>

  <rect x="490" y="50" width="440" height="210" class="cool"/>
  <text x="710" y="72" text-anchor="middle" class="head">Path 2: ring attention</text>
  <text x="710" y="96" text-anchor="middle" class="small">LWM: 1Mトークン学習</text>
  <text x="710" y="114" text-anchor="middle" class="small">LongVILA: 1400フレーム動画</text>
  <text x="710" y="132" text-anchor="middle" class="small">分散ringパターン</text>
  <text x="710" y="160" text-anchor="middle" class="step">実装要点</text>
  <text x="710" y="180" text-anchor="middle" class="small">各デバイスがチャンクを保持</text>
  <text x="710" y="196" text-anchor="middle" class="small">attention passで回転</text>
  <text x="710" y="212" text-anchor="middle" class="small">オープンソース</text>
  <text x="710" y="240" text-anchor="middle" class="caption">オープンなスケールは良いが計算が重い</text>

  <rect x="30" y="280" width="440" height="230" class="cold"/>
  <text x="250" y="302" text-anchor="middle" class="head">Path 3: トークン圧縮</text>
  <text x="250" y="326" text-anchor="middle" class="small">Video-XL: 要約トークン 1個</text>
  <text x="250" y="344" text-anchor="middle" class="small">クリップごと (数百frames -&gt; 1)</text>
  <text x="250" y="362" text-anchor="middle" class="small">LongVA: 長コンテキスト転移</text>
  <text x="250" y="380" text-anchor="middle" class="small">VideoChat2: 階層プール</text>
  <text x="250" y="410" text-anchor="middle" class="step">実装要点</text>
  <text x="250" y="430" text-anchor="middle" class="small">LLM前の学習済み圧縮器</text>
  <text x="250" y="446" text-anchor="middle" class="small">再現率をスケールと交換</text>
  <text x="250" y="462" text-anchor="middle" class="small">~32k コンテキストで足りる</text>
  <text x="250" y="490" text-anchor="middle" class="caption">推論最安、接地最弱</text>

  <rect x="490" y="280" width="440" height="230" class="reg"/>
  <text x="710" y="302" text-anchor="middle" class="head">Path 4: エージェント検索</text>
  <text x="710" y="326" text-anchor="middle" class="small">VideoAgent: LLMがクエリ計画器</text>
  <text x="710" y="344" text-anchor="middle" class="small">ツール: find_clips(keyword)</text>
  <text x="710" y="362" text-anchor="middle" class="small">VLMは一致部分だけ読む</text>
  <text x="710" y="380" text-anchor="middle" class="small">LLMが最終回答を構成</text>
  <text x="710" y="410" text-anchor="middle" class="step">実装要点</text>
  <text x="710" y="430" text-anchor="middle" class="small">検索品質がボトルネック</text>
  <text x="710" y="446" text-anchor="middle" class="small">単一イベントクエリは99%安い</text>
  <text x="710" y="462" text-anchor="middle" class="small">全体理解には弱い</text>
  <text x="710" y="490" text-anchor="middle" class="caption">2h+の具体クエリに最適</text>
</svg>
