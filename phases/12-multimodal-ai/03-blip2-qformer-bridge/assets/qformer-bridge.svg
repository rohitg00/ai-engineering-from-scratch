<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .frozen { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .train { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">BLIP-2 Q-Former bridge — 32クエリで固定LLM向けにViTを圧縮</text>

  <rect x="40" y="60" width="180" height="200" class="frozen"/>
  <text x="130" y="82" text-anchor="middle" class="head">固定 ViT（固定）</text>
  <text x="130" y="102" text-anchor="middle" class="small">ViT-g/14, 1.1B</text>
  <text x="130" y="120" text-anchor="middle" class="small">224x224入力</text>
  <text x="130" y="138" text-anchor="middle" class="small">16x16 patch格子</text>
  <text x="130" y="156" text-anchor="middle" class="small">-&gt; 256 patch トークン</text>
  <text x="130" y="174" text-anchor="middle" class="small">次元1408</text>
  <text x="130" y="202" text-anchor="middle" class="caption">学習しない</text>
  <text x="130" y="220" text-anchor="middle" class="caption">固定特徴を出力</text>
  <text x="130" y="240" text-anchor="middle" class="caption">画像あたり256 x 1408</text>

  <path d="M 225 160 L 290 160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="258" y="150" text-anchor="middle" class="small">K, V</text>

  <rect x="295" y="60" width="250" height="300" class="train"/>
  <text x="420" y="82" text-anchor="middle" class="head">Q-Former (学習)</text>
  <text x="420" y="100" text-anchor="middle" class="small">12層, BERT-base初期化</text>

  <rect x="315" y="110" width="210" height="60" class="cool"/>
  <text x="420" y="128" text-anchor="middle" class="step">32個の学習可能クエリ</text>
  <text x="420" y="146" text-anchor="middle" class="small">bridgeのパラメータ</text>
  <text x="420" y="162" text-anchor="middle" class="small">全画像で同じ32 ベクトル</text>

  <rect x="315" y="178" width="210" height="60" class="box"/>
  <text x="420" y="196" text-anchor="middle" class="step">self-attention (クエリのみ)</text>
  <text x="420" y="214" text-anchor="middle" class="small">クエリ同士が相互作用</text>
  <text x="420" y="230" text-anchor="middle" class="small">stage 1ではテキストとも相互作用</text>

  <rect x="315" y="244" width="210" height="60" class="box"/>
  <text x="420" y="262" text-anchor="middle" class="step">cross-attention</text>
  <text x="420" y="280" text-anchor="middle" class="small">Qはクエリ、K/Vはpatch由来</text>
  <text x="420" y="296" text-anchor="middle" class="small">32 x 256 attention map</text>

  <rect x="315" y="312" width="210" height="40" class="box"/>
  <text x="420" y="338" text-anchor="middle" class="step">FFN + LN（テキスト 経路と共有）</text>

  <path d="M 550 160 L 620 160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="585" y="150" text-anchor="middle" class="small">32トークン</text>

  <rect x="625" y="60" width="140" height="120" class="train"/>
  <text x="695" y="82" text-anchor="middle" class="head">線形射影</text>
  <text x="695" y="100" text-anchor="middle" class="small">768 -&gt; 4096 (LLM次元)</text>
  <text x="695" y="118" text-anchor="middle" class="small">stage 2で学習</text>
  <text x="695" y="138" text-anchor="middle" class="small">~3Mパラメータ</text>
  <text x="695" y="158" text-anchor="middle" class="small">32 x LLM_dim出力</text>

  <path d="M 770 120 L 830 120" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="835" y="60" width="100" height="240" class="frozen"/>
  <text x="885" y="82" text-anchor="middle" class="head">固定LLM（固定）</text>
  <text x="885" y="102" text-anchor="middle" class="small">OPT-6.7Bまたは</text>
  <text x="885" y="120" text-anchor="middle" class="small">Flan-T5-XXL</text>
  <text x="885" y="148" text-anchor="middle" class="small">32視覚トークン</text>
  <text x="885" y="164" text-anchor="middle" class="small">+ テキストプロンプト</text>
  <text x="885" y="182" text-anchor="middle" class="small">-&gt; キャプション / VQA</text>
  <text x="885" y="212" text-anchor="middle" class="caption">学習しない</text>
  <text x="885" y="230" text-anchor="middle" class="caption">LM生成</text>
  <text x="885" y="248" text-anchor="middle" class="caption">キャプションまたは回答</text>

  <rect x="40" y="380" width="880" height="130" class="box"/>
  <text x="480" y="402" text-anchor="middle" class="head">2段階学習</text>

  <rect x="60" y="420" width="415" height="75" class="cool"/>
  <text x="80" y="440" class="step">Stage 1: 表現学習 (LLMなし)</text>
  <text x="80" y="458" class="small">Q-Formerだけを学習:</text>
  <text x="80" y="474" class="small">ITC (画像-テキストcontrastive)</text>
  <text x="80" y="488" class="small">+ ITM (画像-テキストmatching)</text>
  <text x="250" y="458" class="small">+ ITG (画像接地テキスト生成)</text>
  <text x="250" y="474" class="small">クエリがエンコードする</text>
  <text x="250" y="488" class="small">意味 + テキストでデコード可能な情報</text>

  <rect x="490" y="420" width="415" height="75" class="train"/>
  <text x="510" y="440" class="step">Stage 2: 生成学習 (固定LLMあり)</text>
  <text x="510" y="458" class="small">32 クエリをLLM次元へ射影</text>
  <text x="510" y="474" class="small">テキストの前に前置</text>
  <text x="510" y="488" class="small">LM損失でend-to-end学習</text>
  <text x="680" y="458" class="small">bridge + プロジェクタが学習</text>
  <text x="680" y="474" class="small">LLMへきれいに渡す</text>
  <text x="680" y="488" class="small">合計188Mパラメータ</text>
</svg>
