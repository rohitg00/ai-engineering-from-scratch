<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .frozen { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .train { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .gate { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Flamingo — 固定70B Chinchilla LLM内のgated cross-attention</text>

  <rect x="40" y="50" width="220" height="480" class="box"/>
  <text x="150" y="72" text-anchor="middle" class="head">画像/動画パイプライン</text>

  <rect x="60" y="92" width="180" height="50" class="frozen"/>
  <text x="150" y="114" text-anchor="middle" class="step">固定 ViT（固定）</text>
  <text x="150" y="130" text-anchor="middle" class="small">画像あたり196-900 patch</text>

  <path d="M 150 148 L 150 172" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="180" width="180" height="100" class="train"/>
  <text x="150" y="202" text-anchor="middle" class="step">Perceiver リサンプラ</text>
  <text x="150" y="220" text-anchor="middle" class="small">K=64学習可能潜在</text>
  <text x="150" y="238" text-anchor="middle" class="small">patch上でcross-attn</text>
  <text x="150" y="256" text-anchor="middle" class="small">6 ブロック, 64Mパラメータ</text>
  <text x="150" y="272" text-anchor="middle" class="small">固定64トークンを出力</text>

  <path d="M 150 288 L 150 318" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="328" width="180" height="60" class="cool"/>
  <text x="150" y="350" text-anchor="middle" class="step">64視覚トークン</text>
  <text x="150" y="368" text-anchor="middle" class="small">画像ごと (または動画ごと)</text>

  <rect x="60" y="408" width="180" height="110" class="box"/>
  <text x="150" y="428" text-anchor="middle" class="head">可変入力</text>
  <text x="150" y="448" text-anchor="middle" class="small">画像: 196 patch -&gt; 64</text>
  <text x="150" y="464" text-anchor="middle" class="small">高解像度: 900 patch -&gt; 64</text>
  <text x="150" y="482" text-anchor="middle" class="small">動画: T * 64</text>
  <text x="150" y="500" text-anchor="middle" class="small">出力形状: 常にK=64</text>

  <path d="M 265 350 L 340 350" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="345" y="50" width="570" height="480" class="box"/>
  <text x="630" y="72" text-anchor="middle" class="head">gated cross-attnを挿入した固定LLM</text>

  <rect x="365" y="92" width="530" height="52" class="frozen"/>
  <text x="630" y="114" text-anchor="middle" class="step">LLM self-attn + FFN (ブロック 1-4)</text>
  <text x="630" y="132" text-anchor="middle" class="small">固定 Chinchilla 70B 層</text>

  <rect x="365" y="154" width="530" height="80" class="gate"/>
  <text x="630" y="176" text-anchor="middle" class="step">gated cross-attn（学習）</text>
  <text x="390" y="200" class="small">y = tanh(alpha) * cross_attn(テキスト, visual_tokens) + x</text>
  <text x="390" y="218" class="small">alpha初期値0 -&gt; tanh(0) = 0 -&gt; 出力 == 入力</text>
  <text x="390" y="234" class="small">-&gt; ステップ 0ではLLMのテキスト能力を維持</text>

  <rect x="365" y="244" width="530" height="52" class="frozen"/>
  <text x="630" y="266" text-anchor="middle" class="step">LLM self-attn + FFN (ブロック 5-8)</text>
  <text x="630" y="284" text-anchor="middle" class="small">テキストトークンはcausal self-attentionを継続</text>

  <rect x="365" y="306" width="530" height="80" class="gate"/>
  <text x="630" y="328" text-anchor="middle" class="step">gated cross-attn（学習）</text>
  <text x="390" y="352" class="small">alphaが増えるほど視覚寄与が混ざる</text>
  <text x="390" y="370" class="small">学習終了時はalpha O(1-2), tanh ~0.8</text>
  <text x="390" y="386" class="caption">LLM層M=4ごとに挿入</text>

  <rect x="365" y="396" width="530" height="52" class="frozen"/>
  <text x="630" y="418" text-anchor="middle" class="step">LLM self-attn + FFN (ブロック 9-12, ..., N)</text>

  <rect x="365" y="458" width="530" height="60" class="cool"/>
  <text x="630" y="478" text-anchor="middle" class="step">cross-attn層合計: N/4</text>
  <text x="630" y="496" text-anchor="middle" class="small">80層の70B LLM -&gt; 20 gated bridge</text>
  <text x="630" y="510" text-anchor="middle" class="small">学習パラメータ: ~10B / 合計80B</text>
</svg>
