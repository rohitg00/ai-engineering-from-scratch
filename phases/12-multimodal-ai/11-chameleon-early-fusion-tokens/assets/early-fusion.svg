<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Chameleon — 画像を共有語彙内の離散トークンとして扱う</text>

  <rect x="30" y="50" width="900" height="230" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">学習: 1つの系列、1つの損失</text>

  <rect x="60" y="90" width="180" height="150" class="hot"/>
  <text x="150" y="110" text-anchor="middle" class="step">1. 画像</text>
  <text x="150" y="128" text-anchor="middle" class="small">生RGBピクセル</text>
  <g stroke="#888" stroke-width="0.5">
    <rect x="80" y="140" width="140" height="80" fill="#f8e5ba" stroke="#c0392b"/>
    <line x1="115" y1="140" x2="115" y2="220"/>
    <line x1="150" y1="140" x2="150" y2="220"/>
    <line x1="185" y1="140" x2="185" y2="220"/>
    <line x1="80" y1="170" x2="220" y2="170"/>
    <line x1="80" y1="200" x2="220" y2="200"/>
  </g>

  <path d="M 245 160 L 305 160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="150" text-anchor="middle" class="small">VQ-VAE</text>

  <rect x="310" y="90" width="180" height="150" class="cool"/>
  <text x="400" y="110" text-anchor="middle" class="step">2. 量子化</text>
  <text x="400" y="128" text-anchor="middle" class="small">コードブック K=8192</text>
  <text x="400" y="146" text-anchor="middle" class="small">32x32 = 1024整数</text>
  <text x="400" y="170" text-anchor="middle" class="step">[4821, 1029, 2891, ...]</text>
  <text x="400" y="196" text-anchor="middle" class="small">patchごとに1トークン</text>
  <text x="400" y="214" text-anchor="middle" class="small">再構成は非可逆</text>

  <path d="M 495 160 L 555 160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="90" width="350" height="150" class="cold"/>
  <text x="735" y="110" text-anchor="middle" class="step">3. 共有語彙</text>
  <text x="735" y="128" text-anchor="middle" class="small">テキストID 0..31999</text>
  <text x="735" y="146" text-anchor="middle" class="small">画像ID 32000..40191</text>
  <text x="735" y="164" text-anchor="middle" class="small">&lt;image&gt; / &lt;/image&gt; 区切り</text>
  <text x="735" y="190" text-anchor="middle" class="step">単一埋め込み層</text>
  <text x="735" y="208" text-anchor="middle" class="small">単一次トークン CE損失</text>

  <rect x="30" y="300" width="900" height="220" class="box"/>
  <text x="480" y="322" text-anchor="middle" class="head">推論: 1回のforward passで混合モダリティ生成</text>

  <rect x="60" y="340" width="300" height="160" class="reg"/>
  <text x="210" y="360" text-anchor="middle" class="step">プロンプト: "猫を描いて"</text>
  <text x="210" y="382" text-anchor="middle" class="small">テキストトークンが入力される</text>
  <text x="210" y="400" text-anchor="middle" class="small">モデルが自己回帰に出力</text>
  <text x="210" y="418" text-anchor="middle" class="small">&lt;image&gt; code code code ... &lt;/image&gt;</text>
  <text x="210" y="436" text-anchor="middle" class="small">続けてキャプション テキストを出力</text>
  <text x="210" y="462" text-anchor="middle" class="caption">表示時にVQ デコーダがピクセルを描画</text>

  <rect x="380" y="340" width="250" height="160" class="cool"/>
  <text x="505" y="360" text-anchor="middle" class="step">安定化工夫</text>
  <text x="505" y="382" text-anchor="middle" class="small">QK-Norm 内積前</text>
  <text x="505" y="400" text-anchor="middle" class="small">全残差後にdropout</text>
  <text x="505" y="418" text-anchor="middle" class="small">最終ブロック スキップ LN</text>
  <text x="505" y="442" text-anchor="middle" class="small">これがないと34Bは発散</text>
  <text x="505" y="462" text-anchor="middle" class="caption">学習レシピが論文の半分</text>

  <rect x="650" y="340" width="270" height="160" class="hot"/>
  <text x="785" y="360" text-anchor="middle" class="step">トレードオフ</text>
  <text x="785" y="382" text-anchor="middle" class="small">+ 同じモデルで画像生成</text>
  <text x="785" y="400" text-anchor="middle" class="small">+ 混合モダリティ出力が自然</text>
  <text x="785" y="418" text-anchor="middle" class="small">- トークナイザが画像品質を制限</text>
  <text x="785" y="436" text-anchor="middle" class="small">- 推論が高コスト (VQ デコード)</text>
  <text x="785" y="454" text-anchor="middle" class="small">- LLM再利用なし</text>
  <text x="785" y="478" text-anchor="middle" class="caption">Emu3 + Transfusionがこの道を拡張</text>
</svg>
