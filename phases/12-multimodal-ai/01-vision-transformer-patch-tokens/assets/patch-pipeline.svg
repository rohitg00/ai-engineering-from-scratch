<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">ViT patch-token パイプライン — 画像からTransformer入力へ</text>

  <rect x="40" y="50" width="180" height="180" class="box"/>
  <text x="130" y="70" text-anchor="middle" class="head">1. 画像</text>
  <text x="130" y="88" text-anchor="middle" class="small">H x W x 3ピクセル</text>
  <g stroke="#888" stroke-width="0.5">
    <line x1="70" y1="100" x2="70" y2="220"/>
    <line x1="100" y1="100" x2="100" y2="220"/>
    <line x1="130" y1="100" x2="130" y2="220"/>
    <line x1="160" y1="100" x2="160" y2="220"/>
    <line x1="190" y1="100" x2="190" y2="220"/>
    <line x1="40" y1="130" x2="220" y2="130"/>
    <line x1="40" y1="160" x2="220" y2="160"/>
    <line x1="40" y1="190" x2="220" y2="190"/>
  </g>
  <rect x="70" y="100" width="30" height="30" class="hot"/>
  <rect x="160" y="160" width="30" height="30" class="hot"/>

  <path d="M 225 140 L 290 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="258" y="130" text-anchor="middle" class="small">格子 HxW / P^2</text>

  <rect x="295" y="60" width="180" height="170" class="cool"/>
  <text x="385" y="80" text-anchor="middle" class="head">2. patch化</text>
  <text x="385" y="100" text-anchor="middle" class="small">N = (H/P)(W/P) patch</text>
  <text x="385" y="120" text-anchor="middle" class="small">各patchはP x P x 3ピクセル</text>
  <text x="385" y="140" text-anchor="middle" class="small">flatten -> 3P^2ベクトル</text>
  <text x="385" y="166" text-anchor="middle" class="step">ViT-B/16 @ 224:</text>
  <text x="385" y="184" text-anchor="middle" class="small">14 x 14格子 = 196 patch</text>
  <text x="385" y="200" text-anchor="middle" class="small">16 x 16 x 3 = 768ピクセル</text>
  <text x="385" y="216" text-anchor="middle" class="small">patchごとに平坦化</text>

  <path d="M 480 140 L 545 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="513" y="130" text-anchor="middle" class="small">射影</text>

  <rect x="550" y="60" width="180" height="170" class="cold"/>
  <text x="640" y="80" text-anchor="middle" class="head">3. 線形射影</text>
  <text x="640" y="100" text-anchor="middle" class="small">共有 W_E (3P^2 x D)</text>
  <text x="640" y="120" text-anchor="middle" class="small">= Conv2d(3, D, k=P, s=P)</text>
  <text x="640" y="146" text-anchor="middle" class="step">各patch -> D次元</text>
  <text x="640" y="168" text-anchor="middle" class="small">D = 768 (B), 1024 (L)</text>
  <text x="640" y="184" text-anchor="middle" class="small">1152 (SO400m), 1536 (g)</text>
  <text x="640" y="210" text-anchor="middle" class="small">196 patchトークン x D</text>

  <path d="M 735 140 L 800 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="767" y="130" text-anchor="middle" class="small">+ 位置</text>

  <rect x="805" y="60" width="120" height="170" class="reg"/>
  <text x="865" y="80" text-anchor="middle" class="head">4. + 位置/CLS</text>
  <text x="865" y="104" text-anchor="middle" class="small">[CLS] + patch</text>
  <text x="865" y="120" text-anchor="middle" class="small">+ 4 レジスタ (DINOv2)</text>
  <text x="865" y="146" text-anchor="middle" class="small">Qwen2-VLの2D-RoPE</text>
  <text x="865" y="162" text-anchor="middle" class="small">ViT-Bでは学習位置</text>
  <text x="865" y="190" text-anchor="middle" class="step">系列長</text>
  <text x="865" y="206" text-anchor="middle" class="small">197 (B), 257 (L)</text>
  <text x="865" y="220" text-anchor="middle" class="small">729 (SO400m @384)</text>

  <rect x="40" y="260" width="885" height="240" class="box"/>
  <text x="482" y="282" text-anchor="middle" class="head">後段: Transformer ブロック x L、その後プール</text>

  <rect x="60" y="300" width="260" height="180" class="box"/>
  <text x="190" y="322" text-anchor="middle" class="step">Transformer ブロック</text>
  <text x="190" y="344" text-anchor="middle" class="small">attention + MLPがL ブロック</text>
  <text x="190" y="362" text-anchor="middle" class="small">B: L=12, D=768 -> 86M</text>
  <text x="190" y="380" text-anchor="middle" class="small">L: L=24, D=1024 -> 303M</text>
  <text x="190" y="398" text-anchor="middle" class="small">g: L=40, D=1536 -> 1.1B</text>
  <text x="190" y="424" text-anchor="middle" class="step">事前学習</text>
  <text x="190" y="442" text-anchor="middle" class="small">教師あり | MAE | DINO</text>
  <text x="190" y="460" text-anchor="middle" class="small">CLIP | SigLIP (2026候補)</text>

  <rect x="340" y="300" width="260" height="180" class="cool"/>
  <text x="470" y="322" text-anchor="middle" class="step">プーリング</text>
  <text x="470" y="344" text-anchor="middle" class="small">CLSトークン (ViT-B, CLIP)</text>
  <text x="470" y="362" text-anchor="middle" class="small">patch平均 (DINOv2, SigLIP)</text>
  <text x="470" y="380" text-anchor="middle" class="small">レジスタトークン (sink)</text>
  <text x="470" y="406" text-anchor="middle" class="step">VLMでは:</text>
  <text x="470" y="424" text-anchor="middle" class="small">プーリングを完全にスキップ</text>
  <text x="470" y="442" text-anchor="middle" class="small">全patchをLLMへ入力</text>
  <text x="470" y="460" text-anchor="middle" class="small">レジスタは捨てる</text>

  <rect x="620" y="300" width="285" height="180" class="reg"/>
  <text x="762" y="322" text-anchor="middle" class="step">2026年本番候補</text>
  <text x="762" y="346" text-anchor="middle" class="small">SigLIP 2 SO400m/14 @ 384</text>
  <text x="762" y="362" text-anchor="middle" class="small">400Mパラメータ</text>
  <text x="762" y="378" text-anchor="middle" class="small">画像あたり729 patchトークン</text>
  <text x="762" y="394" text-anchor="middle" class="small">4 レジスタトークン</text>
  <text x="762" y="410" text-anchor="middle" class="small">NaFlex native縦横比</text>
  <text x="762" y="434" text-anchor="middle" class="step">採用例</text>
  <text x="762" y="452" text-anchor="middle" class="small">Qwen2.5-VL, Idefics2</text>
  <text x="762" y="468" text-anchor="middle" class="small">LLaVA-OneVision, InternVL3</text>
</svg>
