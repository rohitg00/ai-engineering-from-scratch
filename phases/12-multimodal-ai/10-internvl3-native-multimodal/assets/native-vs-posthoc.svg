<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .reg { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">InternVL3 — native multimodal事前学習とpost-hoc適応</text>

  <rect x="30" y="50" width="440" height="210" class="hot"/>
  <text x="250" y="72" text-anchor="middle" class="head">post-hoc (LLaVA, Qwen-VL v1, Idefics)</text>

  <rect x="60" y="90" width="160" height="40" class="cold"/>
  <text x="140" y="115" text-anchor="middle" class="small">事前学習済みLLM (固定)</text>
  <rect x="240" y="90" width="130" height="40" class="cool"/>
  <text x="305" y="115" text-anchor="middle" class="small">視覚エンコーダ</text>
  <rect x="385" y="90" width="60" height="40" class="reg"/>
  <text x="415" y="115" text-anchor="middle" class="small">プロジェクタ</text>

  <text x="250" y="150" text-anchor="middle" class="small">1. キャプションペアでプロジェクタ学習 (LLM固定)</text>
  <text x="250" y="168" text-anchor="middle" class="small">2. LLMを固定解除しLLaVA-Instructで調整</text>
  <text x="250" y="186" text-anchor="middle" class="small">3. 任意でタスク 微調整</text>

  <text x="250" y="212" text-anchor="middle" class="step">コスト: ~30k GPU-hours, LLMを再利用</text>
  <text x="250" y="232" text-anchor="middle" class="caption">整列負債: MMLU -2〜-8, 回答drift</text>

  <rect x="490" y="50" width="440" height="210" class="cool"/>
  <text x="710" y="72" text-anchor="middle" class="head">native (InternVL3, Chameleon, GPT-4o)</text>

  <rect x="520" y="90" width="380" height="40" class="reg"/>
  <text x="710" y="115" text-anchor="middle" class="small">単一transformer、ステップ 1からテキスト + 視覚native</text>

  <text x="710" y="150" text-anchor="middle" class="small">1回の事前学習実行、1つの損失</text>
  <text x="710" y="168" text-anchor="middle" class="small">40% テキスト + 35% interleaved + 20% cap + 5% video</text>
  <text x="710" y="186" text-anchor="middle" class="small">後段は指示チューニング、multi-stage 整列ではない</text>

  <text x="710" y="212" text-anchor="middle" class="step">コスト: ~300k GPU-hours, LLM再利用なし</text>
  <text x="710" y="232" text-anchor="middle" class="caption">整列負債なし、78BでGemini 2.5 Pro級</text>

  <rect x="30" y="280" width="900" height="230" class="box"/>
  <text x="480" y="302" text-anchor="middle" class="head">デプロイ最適化: ViR + DvD</text>

  <rect x="60" y="320" width="400" height="180" class="cold"/>
  <text x="260" y="342" text-anchor="middle" class="step">Visual Resolution Router (ViR)</text>
  <text x="260" y="362" text-anchor="middle" class="small">小型分類器がクエリ別に最小解像度を選ぶ</text>
  <text x="260" y="380" text-anchor="middle" class="small">低 / 中 / 高tier</text>
  <text x="260" y="396" text-anchor="middle" class="small">実クエリの50%は低解像度候補</text>
  <text x="260" y="412" text-anchor="middle" class="small">平均トークンは2048からクエリあたり~590へ</text>
  <text x="260" y="438" text-anchor="middle" class="step">効果: 推論スループット2-3x</text>
  <text x="260" y="462" text-anchor="middle" class="caption">失敗: OCRが必要なタスクを低へ振り分け</text>

  <rect x="490" y="320" width="400" height="180" class="reg"/>
  <text x="690" y="342" text-anchor="middle" class="step">Decoupled Vision-Language (DvD)</text>
  <text x="690" y="362" text-anchor="middle" class="small">エンコーダはGPU-A、LLMはGPU-B</text>
  <text x="690" y="380" text-anchor="middle" class="small">patchトークンをNCCLでA -&gt; Bへストリーム</text>
  <text x="690" y="396" text-anchor="middle" class="small">エンコーダは1回、LLMは多数ステップ</text>
  <text x="690" y="412" text-anchor="middle" class="small">ボトルネック = max(enc, llm * 出力_len)</text>
  <text x="690" y="438" text-anchor="middle" class="step">同一配置比でスループット~2x</text>
  <text x="690" y="462" text-anchor="middle" class="caption">低トラフィックの単発レイテンシには不利</text>
</svg>
