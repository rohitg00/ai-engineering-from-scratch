<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .host { fill: #e8f0ff; stroke: #0f3460; stroke-width: 1.5; }
      .server { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .primitive { fill: #e8f7e8; stroke: #2d7a2d; stroke-width: 1.2; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 12px; fill: #333; }
      .tag { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">1つのホスト、1つのJSON-RPCセッション、3つのprimitive</text>

  <!-- Host -->
  <rect x="40" y="70" width="240" height="300" class="host"/>
  <text x="160" y="95" text-anchor="middle" class="label">Host (LLMアプリ)</text>
  <text x="160" y="113" text-anchor="middle" class="tag">Claude Desktop / Claude Code / ChatGPT</text>

  <rect x="70" y="135" width="180" height="55" class="box"/>
  <text x="160" y="155" text-anchor="middle" class="sub">LLMランタイム</text>
  <text x="160" y="175" text-anchor="middle" class="tag">モデル + プロンプト + コンテキスト</text>

  <rect x="70" y="205" width="180" height="55" class="box"/>
  <text x="160" y="225" text-anchor="middle" class="sub">MCPクライアント</text>
  <text x="160" y="245" text-anchor="middle" class="tag">mountされたサーバごとに1つ</text>

  <rect x="70" y="275" width="180" height="55" class="box"/>
  <text x="160" y="295" text-anchor="middle" class="sub">ユーザーUI / 承認</text>
  <text x="160" y="315" text-anchor="middle" class="tag">slash command、確認</text>

  <!-- Wire -->
  <path d="M280 235 L500 235" class="line" marker-end="url(#arrow)"/>
  <text x="390" y="220" text-anchor="middle" class="tag">JSON-RPC 2.0 (stdio / HTTP)</text>
  <text x="390" y="252" text-anchor="middle" class="tag">initialize &#x2192; list &#x2192; call</text>

  <!-- Server -->
  <rect x="500" y="70" width="360" height="300" class="server"/>
  <text x="680" y="95" text-anchor="middle" class="label">サーバ</text>
  <text x="680" y="113" text-anchor="middle" class="tag">あなたのコード: FastMCP / SDK / custom</text>

  <rect x="525" y="140" width="310" height="60" class="primitive"/>
  <text x="680" y="161" text-anchor="middle" class="sub">ツール</text>
  <text x="680" y="181" text-anchor="middle" class="tag">モデルが呼ぶ関数。JSON Schema入力</text>

  <rect x="525" y="215" width="310" height="60" class="primitive"/>
  <text x="680" y="236" text-anchor="middle" class="sub">リソース</text>
  <text x="680" y="256" text-anchor="middle" class="tag">URIで指定する読み取り専用コンテンツ</text>

  <rect x="525" y="290" width="310" height="60" class="primitive"/>
  <text x="680" y="311" text-anchor="middle" class="sub">プロンプト</text>
  <text x="680" y="331" text-anchor="middle" class="tag">ユーザーが起動するテンプレート (slash commands)</text>

  <!-- Caption -->
  <text x="450" y="410" text-anchor="middle" class="tag">
    2025-06-18仕様改訂でstreamable HTTP transportが追加。host/serverはinitializeでprotocol versionを固定する。
  </text>
  <text x="450" y="435" text-anchor="middle" class="tag">
    破壊的toolはdestructiveHint: trueを設定し、hostが人間承認でgateできるようにする。
  </text>
</svg>
