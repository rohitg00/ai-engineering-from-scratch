<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .write { fill: #ffe0cc; stroke: #c0392b; stroke-width: 1.5; }
      .read { fill: #e0f2e0; stroke: #2d7a2d; stroke-width: 1.5; }
      .miss { fill: #eee; stroke: #666; stroke-width: 1.2; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .sub { font-size: 12px; fill: #333; }
      .mono { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .tag { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
      .dash { stroke: #666; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">プロンプトキャッシュ: 1回書き込み、多数の読み取り</text>

  <!-- Request 1 -->
  <text x="60" y="80" class="label">リクエスト1</text>
  <rect x="60" y="95" width="500" height="40" class="write"/>
  <text x="310" y="120" text-anchor="middle" class="sub">[system + ツール + few-shot]  15,000 tok  (CACHE書き込み)</text>
  <rect x="560" y="95" width="140" height="40" class="box"/>
  <text x="630" y="120" text-anchor="middle" class="sub">[ユーザーmsg] 400 tok</text>
  <text x="720" y="120" class="mono">課金: 15,000 * 1.25x + 400 * 1x</text>

  <!-- Request 2 -->
  <text x="60" y="170" class="label">リクエスト2</text>
  <rect x="60" y="185" width="500" height="40" class="read"/>
  <text x="310" y="210" text-anchor="middle" class="sub">[同じprefix]  15,000 tok  (CACHE読み取り)</text>
  <rect x="560" y="185" width="140" height="40" class="box"/>
  <text x="630" y="210" text-anchor="middle" class="sub">[ユーザーmsg] 400 tok</text>
  <text x="720" y="210" class="mono">課金: 15,000 * 0.1x + 400 * 1x</text>

  <!-- Request N -->
  <text x="60" y="260" class="label">リクエストN</text>
  <rect x="60" y="275" width="500" height="40" class="read"/>
  <text x="310" y="300" text-anchor="middle" class="sub">[同じprefix]  15,000 tok  (CACHE読み取り)</text>
  <rect x="560" y="275" width="140" height="40" class="box"/>
  <text x="630" y="300" text-anchor="middle" class="sub">[ユーザーmsg] 400 tok</text>
  <text x="720" y="300" class="mono">課金: 15,000 * 0.1x + 400 * 1x</text>

  <!-- BAD example -->
  <path d="M60 340 L840 340" class="dash"/>
  <text x="60" y="370" class="label">アンチパターン: 先頭にタイムスタンプ</text>
  <rect x="60" y="385" width="140" height="40" class="miss"/>
  <text x="130" y="410" text-anchor="middle" class="mono">"15:30:02"</text>
  <rect x="200" y="385" width="360" height="40" class="miss"/>
  <text x="380" y="410" text-anchor="middle" class="sub">[残りのprefix]  まだ15,000 tok</text>
  <rect x="560" y="385" width="140" height="40" class="box"/>
  <text x="630" y="410" text-anchor="middle" class="sub">[ユーザーmsg]</text>
  <text x="720" y="410" class="mono">毎リクエストがMISS: 共有prefixなし</text>

  <text x="450" y="460" text-anchor="middle" class="tag">
    損益分岐: Anthropicは2回目のread後に回収。1h TTLはwrite 2倍だが12倍長く再利用。
  </text>
</svg>
