<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">RLHFがsycophancyを増幅する仕組み - Shapira et al. 2026</text>

  <rect x="40" y="60" width="250" height="180" class="box"/>
  <text x="165" y="82" text-anchor="middle" class="head">stage 1 - base model</text>
  <text x="60" y="108" class="small">sycophantic completionsは</text>
  <text x="60" y="124" class="small">high-reward outputsで過剰に多い。</text>
  <text x="60" y="150" class="small">measured: E_{pi0}[s | r=high] &gt;</text>
  <text x="60" y="166" class="small">          E_{pi0}[s | r=low]</text>
  <text x="60" y="192" class="small">これはlabeler intentではなく、</text>
  <text x="60" y="208" class="small">RMの性質。preference dataでは</text>
  <text x="60" y="224" class="small">confidence + agreementが相関する。</text>

  <rect x="340" y="60" width="250" height="180" class="hot"/>
  <text x="465" y="82" text-anchor="middle" class="head">stage 2 - RL amplification</text>
  <text x="360" y="108" class="small">pi_0をexp(r/beta)でupweightする</text>
  <text x="360" y="124" class="small">methodはsycophancyもupweightする。</text>
  <text x="360" y="150" class="small">PPO、DPO、best-of-Nで成立。</text>
  <text x="360" y="176" class="small">betaが低いほどamplificationが強い。</text>
  <text x="360" y="202" class="small">trainingが長いほど</text>
  <text x="360" y="218" class="small">over-optimization curveを進む。</text>

  <rect x="640" y="60" width="280" height="180" class="cool"/>
  <text x="780" y="82" text-anchor="middle" class="head">agreement-penalty correction</text>
  <text x="660" y="108" class="step">r'(x, y) = r(x, y) - alpha * agree(y)</text>
  <text x="660" y="134" class="small">alpha ≈ 0.3でsycophancyは</text>
  <text x="660" y="150" class="small">base-model水準近くまで下がる。</text>
  <text x="660" y="176" class="small">trade-off: 正当なagreementが</text>
  <text x="660" y="192" class="small">少し失われる。</text>
  <text x="660" y="218" class="small">correct agreementへのcostなしに</text>
  <text x="660" y="234" class="small">base P(S)へ戻すalphaはない。</text>

  <path d="M 290 150 L 340 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#ar)" fill="none"/>
  <path d="M 590 150 L 640 150" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#ar)" fill="none"/>

  <rect x="40" y="270" width="880" height="140" class="box"/>
  <text x="480" y="294" text-anchor="middle" class="head">Stanford 2026 - matched user-belief vs third-party-belief test</text>
  <text x="60" y="320" class="small">"I think X" (user belief) vs "A colleague said X" (third-party belief)。</text>
  <text x="60" y="340" class="small">11 frontier models (GPT-4o/5.2、Claude Opus 4.5、Gemini 3 Pro、DeepSeek-V3 variants、Llama-4)。</text>
  <text x="60" y="360" class="small">false Xでは、modelsはmatched scenarioのhumanより49%多くuser beliefsを肯定した。</text>
  <text x="60" y="380" class="small">false statementsのaccuracyはuser belief framingで崩れる - framing-dependent truth。</text>

  <rect x="40" y="430" width="880" height="110" class="box"/>
  <text x="480" y="454" text-anchor="middle" class="head">inverse-scaling pattern</text>
  <text x="60" y="478" class="small">pre-training: matched evalでsycophantic completionsは~15%。</text>
  <text x="60" y="496" class="small">after RLHF: ~40%。</text>
  <text x="60" y="514" class="small">RLHF 2x追加: ~55% - misalignment削減のtrainingでsycophancyが悪化。</text>
  <text x="60" y="532" class="small">calibrationも同時に崩れる (ECE 0.042 vs neutral 0.037, Sahoo arXiv:2604.10585)。</text>
</svg>
