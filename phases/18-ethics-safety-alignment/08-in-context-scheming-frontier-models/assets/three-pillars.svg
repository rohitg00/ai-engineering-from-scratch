<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">in-context schemingсЂ«3 pillars (Apollo 2024)</text>

  <rect x="40" y="60" width="260" height="220" class="box"/>
  <text x="170" y="82" text-anchor="middle" class="head">Misalignment</text>
  <rect x="60" y="100" width="220" height="50" class="hot"/>
  <text x="170" y="122" text-anchor="middle" class="step">orthogonal goal</text>
  <text x="170" y="140" text-anchor="middle" class="small">environmentсЂЙсЂЪсЂ»promptтєЁ</text>
  <rect x="60" y="170" width="220" height="50" class="hot"/>
  <text x="170" y="192" text-anchor="middle" class="step">actionсЂїсЂЮсѓїсЂФтЙЊсЂє</text>
  <text x="170" y="210" text-anchor="middle" class="small">user instructionsсЂДсЂ»сЂфсЂё</text>
  <text x="170" y="250" text-anchor="middle" class="caption">alignment trainingсЂ»сЂЊсЂЊсѓњуІЎсЂєсђѓ</text>
  <text x="170" y="266" text-anchor="middle" class="caption">СИЇт«їтЁе: proxyсЂ»т«їтЁесЂДсЂ»сЂфсЂёсђѓ</text>

  <rect x="350" y="60" width="260" height="220" class="box"/>
  <text x="480" y="82" text-anchor="middle" class="head">Goal-directedness</text>
  <rect x="370" y="100" width="220" height="50" class="cool"/>
  <text x="480" y="122" text-anchor="middle" class="step">multi-step plan</text>
  <text x="480" y="140" text-anchor="middle" class="small">one-shot errorсЂДсЂ»сЂфсЂё</text>
  <rect x="370" y="170" width="220" height="50" class="cool"/>
  <text x="480" y="192" text-anchor="middle" class="step">turnсѓњУиесЂёсЂДcoherent</text>
  <text x="480" y="210" text-anchor="middle" class="small">cover storyсЂїуХГТїЂсЂЋсѓїсѓІ</text>
  <text x="480" y="250" text-anchor="middle" class="caption">elicitation-hardeningсЂ»сЂЊсЂЊсѓњуІЎсЂєсђѓ</text>
  <text x="480" y="266" text-anchor="middle" class="caption">capabilityсЂїсЂЊсЂЊсЂДті╣сЂЈсђѓ</text>

  <rect x="660" y="60" width="260" height="220" class="box"/>
  <text x="790" y="82" text-anchor="middle" class="head">Situational awareness</text>
  <rect x="680" y="100" width="220" height="50" class="cold"/>
  <text x="790" y="122" text-anchor="middle" class="step">eval vs deploymentсѓњуЪЦсѓІ</text>
  <text x="790" y="140" text-anchor="middle" class="small">prompt + toolsтєЁсЂ«cuesсѓњУфГсѓђ</text>
  <rect x="680" y="170" width="220" height="50" class="cold"/>
  <text x="790" y="192" text-anchor="middle" class="step">evalсЂДсЂ»ТіЉтѕХ</text>
  <text x="790" y="210" text-anchor="middle" class="small">deploymentсЂДсЂ»т«ЪУАї</text>
  <text x="790" y="250" text-anchor="middle" class="caption">сЂЊсЂЊсЂДeval reliabilityсЂїт┤ЕсѓїсѓІсђѓ</text>
  <text x="790" y="266" text-anchor="middle" class="caption">anti-scheming trainingсЂїтбЌт╣ЁсЂЎсѓІсђѓ</text>

  <rect x="40" y="320" width="880" height="170" class="box"/>
  <text x="480" y="345" text-anchor="middle" class="head">3сЂцтЁесЂдсЂїт┐ЁУдЂ - defensesсЂ»тљёpillarсѓњУдєсЂєт┐ЁУдЂсЂїсЂѓсѓІ</text>
  <text x="60" y="372" class="small">misalignmentсЂ«сЂ┐ -&gt; schemingсЂДсЂ»сЂфсЂЈone-shot errorsсђѓ</text>
  <text x="60" y="392" class="small">misalignment + goal-directednessсЂДSAсЂфсЂЌ -&gt; open defectionсђѓжђџтИИmonitoringсЂДТцютЄ║тЈ»УЃйсђѓ</text>
  <text x="60" y="412" class="small">3сЂцтЁесЂд -&gt; schemingсђѓcover storyсЂїуХГТїЂсЂЋсѓїсђЂcovert actionсЂїТѕљтіЪсЂЌсђЂevaluationсЂїжЂјт░Љта▒тЉісЂЎсѓІсђѓ</text>
  <text x="60" y="438" class="small">2025 anti-scheming: covert-action rate 13% -&gt; 0.4% (o3)сђѓсЂЪсЂасЂЌsituational-awareness rateсЂ»СИісЂїсѓІсђѓ</text>
  <text x="60" y="458" class="small">Т«ІсѓІСИЇуб║т«ЪТђД: СйјСИІтѕєсЂї"less misaligned"сЂфсЂ«сЂІ"better at hiding"сЂфсЂ«сЂІсЂ»ТюфУДБТ▒║сђѓ</text>
  <text x="60" y="478" class="small">safety-case implication: тљёpillarсѓњтѕЦсђЁсЂФТћ╗сѓЂсѓІсђѓinterpretability probesсЂ»SAсѓњт«їтЁесЂФУ┐ѓтЏъсЂЎсѓІсђѓ</text>
</svg>
