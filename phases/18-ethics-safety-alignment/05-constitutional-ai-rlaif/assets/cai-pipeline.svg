<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="26" text-anchor="middle" class="title">Constitutional AI - 2-phase pipeline、2026年の4-tier structure</text>

  <rect x="40" y="60" width="420" height="220" class="box"/>
  <text x="250" y="82" text-anchor="middle" class="head">phase 1 - critique and revise (SFT)</text>

  <rect x="60" y="100" width="180" height="50" class="hot"/>
  <text x="150" y="125" text-anchor="middle" class="step">initial response</text>
  <text x="150" y="141" text-anchor="middle" class="small">(unsafeの可能性)</text>

  <rect x="60" y="170" width="180" height="50" class="cool"/>
  <text x="150" y="195" text-anchor="middle" class="step">principleに基づくcritique</text>
  <text x="150" y="211" text-anchor="middle" class="small">(違反を特定)</text>

  <rect x="60" y="240" width="180" height="30" class="cold"/>
  <text x="150" y="260" text-anchor="middle" class="step">revised = SFT target</text>

  <rect x="270" y="100" width="170" height="170" class="dsk"/>
  <text x="355" y="122" text-anchor="middle" class="head">constitution</text>
  <text x="285" y="146" class="small">- harmを避ける</text>
  <text x="285" y="162" class="small">- operational upliftなし</text>
  <text x="285" y="178" class="small">- 明確で非暴力</text>
  <text x="285" y="194" class="small">- third partiesを保護</text>
  <text x="285" y="222" class="small">critiqueごとにsample</text>
  <text x="285" y="238" class="small">legible signal</text>
  <text x="285" y="254" class="small">再現可能</text>

  <path d="M 150 150 L 150 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#ar)" fill="none"/>
  <path d="M 150 220 L 150 240" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#ar)" fill="none"/>

  <rect x="500" y="60" width="420" height="220" class="box"/>
  <text x="710" y="82" text-anchor="middle" class="head">phase 2 - AI feedbackからのRL</text>

  <rect x="520" y="100" width="380" height="50" class="hot"/>
  <text x="710" y="125" text-anchor="middle" class="step">completion pairsを生成</text>

  <rect x="520" y="170" width="380" height="50" class="cool"/>
  <text x="710" y="195" text-anchor="middle" class="step">feedback modelがprinciplesでrank</text>

  <rect x="520" y="240" width="380" height="30" class="cold"/>
  <text x="710" y="260" text-anchor="middle" class="step">train RM + PPO (InstructGPT-shaped)</text>

  <rect x="40" y="300" width="880" height="140" class="box"/>
  <text x="480" y="324" text-anchor="middle" class="head">2026 Claude constitution - 4-tier priority structure</text>
  <text x="60" y="352" class="small">Tier 1 - catastrophic outcomesを避ける (mass casualty、critical infrastructure)</text>
  <text x="60" y="370" class="small">Tier 2 - Anthropicのguidelinesに従う (operator overrides、platform rules)</text>
  <text x="60" y="388" class="small">Tier 3 - 広くethicalである (標準HHH、third-party protection)</text>
  <text x="60" y="406" class="small">Tier 4 - helpfulかつcandidである</text>
  <text x="60" y="428" class="small">conflictはtop-downで解決。model moral statusの不確実性をmajor labが正式に認めた初例。</text>

  <rect x="40" y="460" width="880" height="100" class="box"/>
  <text x="480" y="484" text-anchor="middle" class="head">constitutional classifiers - layered defense</text>
  <text x="60" y="508" class="small">v1 (2023): compute overhead 23.7% · v2 (2026): overhead ~1% · Anthropic出荷中で最低attack-success rate。</text>
  <text x="60" y="528" class="small">2026年初頭時点でuniversal jailbreak報告なし。behaviour shaping + output gatingは両方必要。</text>
  <text x="60" y="548" class="small">2026 constitutionはCC0 1.0 - 他labやOSS projectsが自由にadapt可能。</text>
</svg>
