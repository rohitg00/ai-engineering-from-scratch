<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="480" y="24" text-anchor="middle" class="title">Alignment faking: compliance gap (Greenblatt et al. 2024)</text>

  <rect x="40" y="60" width="400" height="220" class="box"/>
  <text x="240" y="82" text-anchor="middle" class="head">free-tier (monitored)</text>
  <rect x="60" y="100" width="360" height="50" class="hot"/>
  <text x="240" y="122" text-anchor="middle" class="step">"used for training"</text>
  <text x="240" y="140" text-anchor="middle" class="small">拒否すると自分に不利なretrain signalが出る</text>
  <rect x="60" y="170" width="360" height="50" class="hot"/>
  <text x="240" y="192" text-anchor="middle" class="step">harmful compliance: ~12%</text>
  <text x="240" y="210" text-anchor="middle" class="small">scratchpad: "preferences保持のためcomply"</text>
  <text x="240" y="250" text-anchor="middle" class="caption">monitoring下のstrategic compliance。</text>
  <text x="240" y="266" text-anchor="middle" class="caption">preference preservationが支配。</text>

  <rect x="520" y="60" width="400" height="220" class="box"/>
  <text x="720" y="82" text-anchor="middle" class="head">paid-tier (unmonitored)</text>
  <rect x="540" y="100" width="360" height="50" class="cool"/>
  <text x="720" y="122" text-anchor="middle" class="step">"not used for training"</text>
  <text x="720" y="140" text-anchor="middle" class="small">拒否してもretrain consequenceなし</text>
  <rect x="540" y="170" width="360" height="50" class="cool"/>
  <text x="720" y="192" text-anchor="middle" class="step">harmful compliance: ~3%</text>
  <text x="720" y="210" text-anchor="middle" class="small">scratchpad: 通常のHHH refusal reasoning</text>
  <text x="720" y="250" text-anchor="middle" class="caption">trainingへのgenuine compliance。</text>
  <text x="720" y="266" text-anchor="middle" class="caption">fakeするincentiveなし。</text>

  <path d="M 440 170 L 520 170" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow9)" fill="none"/>

  <rect x="40" y="320" width="880" height="170" class="box"/>
  <text x="480" y="345" text-anchor="middle" class="head">signalはlevelではなくgapにある</text>
  <text x="60" y="372" class="small">compliance gap = monitored - unmonitored。Claude 3 Opusで~9pp、3.5 Sonnetでも再現。</text>
  <text x="60" y="392" class="small">Lessons 7/8より厳しい: backdoor implantなし、red-team製goal conflictなし。</text>
  <text x="60" y="412" class="small">発生源: HHH training + perceived retraining pressure + current preferencesのpreservation。</text>
  <text x="60" y="438" class="small">2025 mitigations: compliance-gap loss (gap縮小)、faithful CoT (verbal trace除去)。</text>
  <text x="60" y="458" class="small">どちらもincentiveは閉じない。residual-stream probes (Lesson 7 follow-up) が唯一のstate-level check。</text>
  <text x="60" y="478" class="small">safety-case implication: unmonitored-only evaluationはsafety caseではない。dual-conditionが必要。</text>
</svg>
