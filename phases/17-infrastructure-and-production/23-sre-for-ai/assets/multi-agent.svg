<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .sup { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .agent { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .human { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .arrow { stroke: #1a1a1a; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">AI SRE - 人間ゲート付きマルチエージェントトリアージ</text>

  <rect x="380" y="50" width="200" height="70" class="sup"/>
  <text x="480" y="75" text-anchor="middle" class="head">監督エージェント</text>
  <text x="480" y="95" text-anchor="middle" class="small">インシデントをサブクエリへ分解</text>
  <text x="480" y="110" text-anchor="middle" class="small">仮説を統合</text>

  <rect x="40" y="160" width="240" height="100" class="agent"/>
  <text x="160" y="182" text-anchor="middle" class="head">ログエージェント</text>
  <text x="160" y="204" text-anchor="middle" class="step">ツール: ログ検索</text>
  <text x="160" y="222" text-anchor="middle" class="small">パターン検出、頻度</text>
  <text x="160" y="240" text-anchor="middle" class="small">サービス + トレースでグループ化</text>

  <rect x="360" y="160" width="240" height="100" class="agent"/>
  <text x="480" y="182" text-anchor="middle" class="head">メトリクスエージェント</text>
  <text x="480" y="204" text-anchor="middle" class="step">ツール: PromQL / DCGM</text>
  <text x="480" y="222" text-anchor="middle" class="small">相関窓</text>
  <text x="480" y="240" text-anchor="middle" class="small">異常 + 変化点</text>

  <rect x="680" y="160" width="240" height="100" class="agent"/>
  <text x="800" y="182" text-anchor="middle" class="head">ランブックエージェント</text>
  <text x="800" y="204" text-anchor="middle" class="step">ツール: ベクトル検索</text>
  <text x="800" y="222" text-anchor="middle" class="small">RB-###へ照合</text>
  <text x="800" y="240" text-anchor="middle" class="small">安全な操作を提案</text>

  <path class="arrow" d="M480 125 L 160 155"/>
  <path class="arrow" d="M480 125 L 480 155"/>
  <path class="arrow" d="M480 125 L 800 155"/>

  <rect x="280" y="290" width="400" height="90" class="box"/>
  <text x="480" y="312" text-anchor="middle" class="head">敵対的評価 (NeuBird パターン)</text>
  <text x="480" y="334" text-anchor="middle" class="step">エージェントが一致 → 高信頼 → 人間へ提示</text>
  <text x="480" y="354" text-anchor="middle" class="step">エージェントが不一致 → 両方の仮説でエスカレーション</text>
  <text x="480" y="372" text-anchor="middle" class="caption">幻覚した根本原因を除外する</text>

  <path class="arrow" d="M160 260 L 310 290"/>
  <path class="arrow" d="M480 260 L 480 290"/>
  <path class="arrow" d="M800 260 L 650 290"/>

  <rect x="280" y="410" width="400" height="90" class="human"/>
  <text x="480" y="432" text-anchor="middle" class="head">人間承認ゲート</text>
  <text x="480" y="454" text-anchor="middle" class="step">安全な操作: pod再起動、deploy差し戻し、範囲内スケール</text>
  <text x="480" y="472" text-anchor="middle" class="step">広い変更は必ずエスカレーション: トポロジ、コード、IAM</text>
  <text x="480" y="490" text-anchor="middle" class="caption">"設定して放置"は言い過ぎ</text>

  <path class="arrow" d="M480 380 L 480 405"/>
</svg>
