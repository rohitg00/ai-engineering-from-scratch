<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .dev { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .gw { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .scale { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .otel { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">LLM 可観測性 — 2 分類, 1 OpenTelemetry 接着剤</text>

  <rect x="40" y="50" width="280" height="210" class="dev"/>
  <text x="180" y="72" text-anchor="middle" class="head">開発基盤</text>
  <text x="180" y="92" text-anchor="middle" class="small">トレース + 評価 + プロンプト + セッション</text>
  <rect x="60" y="110" width="240" height="35" class="box"/>
  <text x="180" y="132" text-anchor="middle" class="step">LangSmith ($39/user/mo)</text>
  <rect x="60" y="150" width="240" height="35" class="box"/>
  <text x="180" y="172" text-anchor="middle" class="step">Langfuse (MIT + 50K free)</text>
  <rect x="60" y="190" width="240" height="35" class="box"/>
  <text x="180" y="212" text-anchor="middle" class="step">Opik (Apache 2.0)</text>
  <text x="180" y="245" text-anchor="middle" class="caption">同梱 — 開発ループに最適</text>

  <rect x="340" y="50" width="280" height="210" class="gw"/>
  <text x="480" y="72" text-anchor="middle" class="head">ゲートウェイ / テレメトリ</text>
  <text x="480" y="92" text-anchor="middle" class="small">トレース+メトリクス + ゲートウェイ 機能</text>
  <rect x="360" y="110" width="240" height="35" class="box"/>
  <text x="480" y="132" text-anchor="middle" class="step">Helicone (proxy, MIT)</text>
  <rect x="360" y="150" width="240" height="35" class="box"/>
  <text x="480" y="172" text-anchor="middle" class="step">SigNoz (Apache 2.0)</text>
  <rect x="360" y="190" width="240" height="35" class="box"/>
  <text x="480" y="212" text-anchor="middle" class="step">OpenLLMetry (OSS)</text>
  <text x="480" y="245" text-anchor="middle" class="caption">ミニマル — 開発基盤と併用</text>

  <rect x="640" y="50" width="280" height="210" class="scale"/>
  <text x="780" y="72" text-anchor="middle" class="head">スケール / dev / lake</text>
  <text x="780" y="92" text-anchor="middle" class="small">RAGドリフト, ゼロコピー, 長期</text>
  <rect x="660" y="110" width="240" height="35" class="box"/>
  <text x="780" y="132" text-anchor="middle" class="step">Phoenix (Elastic L2.0)</text>
  <rect x="660" y="150" width="240" height="35" class="box"/>
  <text x="780" y="172" text-anchor="middle" class="step">Arize AX (ゼロコピー)</text>
  <rect x="660" y="190" width="240" height="35" class="box"/>
  <text x="780" y="212" text-anchor="middle" class="step">TruLens (OSS 評価)</text>
  <text x="780" y="245" text-anchor="middle" class="caption">RAG + 長期 分析</text>

  <rect x="40" y="280" width="880" height="100" class="otel"/>
  <text x="480" y="302" text-anchor="middle" class="head">OpenTelemetry GenAI 規約 — 接着剤</text>
  <text x="480" y="325" text-anchor="middle" class="step">gen_ai.system · gen_ai.リクエスト.モデル · gen_ai.usage.入力_トークン · gen_ai.usage.出力_トークン</text>
  <text x="480" y="345" text-anchor="middle" class="small">2025 提供. 2026 本番 パターン:</text>
  <text x="480" y="363" text-anchor="middle" class="step">ゲートウェイ (Helicone) + eval (Phoenix) + lake (Iceberg / Arize AX)</text>

  <rect x="40" y="400" width="880" height="100" class="box"/>
  <text x="480" y="422" text-anchor="middle" class="head">スケール時のサンプリング — 1M トレース/dayを生データ保持はできない</text>
  <text x="480" y="444" text-anchor="middle" class="step">エラーは100%保持 · high-コストも100%保持 · 成功は5% サンプル</text>
  <text x="480" y="462" text-anchor="middle" class="step">集計sは常時 · 生データはlong-テール デバッグ用</text>
  <text x="480" y="482" text-anchor="middle" class="caption">Arize AX 主張: スケール時に一体型 APM比~100x安 — 自分のデータレイク上でゼロコピー</text>
</svg>
