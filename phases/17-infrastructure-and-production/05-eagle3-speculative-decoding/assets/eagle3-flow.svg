<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">EAGLE-3投機デコード — alphaだけが指標</text>

  <rect x="40" y="50" width="420" height="240" class="box"/>
  <text x="250" y="72" text-anchor="middle" class="head">流れ (K=5)</text>
  <rect x="60" y="90" width="120" height="40" class="cool"/>
  <text x="120" y="114" text-anchor="middle" class="step">ドラフトヘッド</text>
  <rect x="200" y="90" width="240" height="40" class="cold"/>
  <text x="320" y="114" text-anchor="middle" class="step">5つの候補トークン</text>
  <line x1="180" y1="110" x2="198" y2="110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="200" y="140" width="240" height="40" class="hot"/>
  <text x="320" y="164" text-anchor="middle" class="step">ターゲット検証 (1回forward)</text>
  <line x1="320" y1="132" x2="320" y2="139" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="200" y="190" width="240" height="40" class="cool"/>
  <text x="320" y="214" text-anchor="middle" class="step">K * alpha が採択</text>
  <line x1="320" y1="182" x2="320" y2="189" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="200" y="240" width="240" height="40" class="old" fill="#eeeeee" stroke="#888"/>
  <text x="320" y="264" text-anchor="middle" class="step">残りは再試行 (2回目パス)</text>

  <rect x="480" y="50" width="440" height="240" class="box"/>
  <text x="700" y="72" text-anchor="middle" class="head">ワークロード別alpha</text>
  <rect x="500" y="90" width="400" height="30" class="cool"/>
  <text x="510" y="110" class="small">一般チャット + ShareGPTで学習済みEAGLE-3 : alpha 0.60 - 0.80</text>
  <rect x="500" y="125" width="400" height="30" class="cold"/>
  <text x="510" y="145" class="small">専門領域 (コード、法務、医療) : alpha 0.40 - 0.60</text>
  <rect x="500" y="160" width="400" height="30" class="hot"/>
  <text x="510" y="180" class="small">ドラフト未再学習のドメイン不一致 : alpha 0.30 - 0.45</text>
  <rect x="500" y="195" width="400" height="30" class="dsk"/>
  <text x="510" y="215" class="small">従来draftモデル (Llama 3.2 1B for 70B) : alpha 0.30 - 0.50</text>
  <rect x="500" y="230" width="400" height="50" class="box"/>
  <text x="510" y="250" class="small">256 同時実行での損益分岐 alpha : ~0.55</text>
  <text x="510" y="268" class="small">それ未満: 平均が改善してもP99 テールは悪化</text>

  <rect x="40" y="310" width="880" height="100" class="box"/>
  <text x="480" y="332" text-anchor="middle" class="head">世代</text>
  <text x="60" y="356" class="step">従来draftモデル</text>
  <text x="60" y="374" class="small">2モデルをロード; 目標ごとにK回forward; alpha 0.3-0.5</text>
  <text x="280" y="356" class="step">EAGLE-1</text>
  <text x="280" y="374" class="small">最終目標層上のドラフトヘッド; alpha ~0.5-0.6</text>
  <text x="500" y="356" class="step">EAGLE-2</text>
  <text x="500" y="374" class="small">ツリーdraft, 適応K; alpha ~0.6-0.7</text>
  <text x="720" y="356" class="step">EAGLE-3 (2025-2026)</text>
  <text x="720" y="374" class="small">多層ドラフトヘッド; alpha ~0.6-0.8</text>
  <text x="60" y="396" class="caption">全EAGLE variantsはtrainが速く、目標へのパラメータオーバーヘッドは小さい</text>

  <rect x="40" y="430" width="880" height="110" class="hot"/>
  <text x="480" y="452" text-anchor="middle" class="head">本番チェックリスト</text>
  <text x="60" y="474" class="small">1. ターゲットモデル単体を基準化 : ターゲット同時実行でTTFT, ITL, スループット</text>
  <text x="60" y="490" class="small">2. EAGLE-3 draftでspeculative_configを有効化 ; ベンチマーク再実行</text>
  <text x="60" y="506" class="small">3. alphaをログ (vLLM V1はリクエストごとの採択トークンを報告) ; alpha &gt;= 0.55でゲート</text>
  <text x="60" y="522" class="small">4. P50でなくP99 ITLを見る — rejectされたdraftの2パスがテールを押し上げる</text>
  <text x="60" y="538" class="small">5. vLLM v0.18.0 : draftモデル投機デコードはchunked prefill非互換 ; V1のN-gramが例外</text>
</svg>
