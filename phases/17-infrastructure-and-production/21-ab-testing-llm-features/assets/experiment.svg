<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .eval { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .ab { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .method { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">LLM機能のA/Bテスト - 評価 + オンライン、勘に頼らない</text>

  <rect x="40" y="50" width="440" height="120" class="eval"/>
  <text x="260" y="72" text-anchor="middle" class="head">評価 (オフライン, ラベル付き)</text>
  <text x="260" y="92" text-anchor="middle" class="step">"モデルは仕事をこなせるか?"</text>
  <text x="60" y="116" class="small">· 人手ラベルまたはLLM-as-judge</text>
  <text x="60" y="134" class="small">· 固定分布 (ユーザートラフィックではない)</text>
  <text x="60" y="152" class="small">· 公開前に回帰を捕捉</text>

  <rect x="500" y="50" width="440" height="120" class="ab"/>
  <text x="720" y="72" text-anchor="middle" class="head">A/B テスト (オンライン, ランダム)</text>
  <text x="720" y="92" text-anchor="middle" class="step">"ユーザーは気にするか?"</text>
  <text x="520" y="116" class="small">· ライブトラフィック、ランダム割当</text>
  <text x="520" y="134" class="small">· 重要なユーザー単位 指標 (継続率, CTR)</text>
  <text x="520" y="152" class="small">· 製品影響を確認</text>

  <rect x="40" y="190" width="280" height="120" class="method"/>
  <text x="180" y="212" text-anchor="middle" class="head">test対象</text>
  <text x="60" y="236" class="step">· プロンプト 文言</text>
  <text x="60" y="254" class="step">· モデル選択 (GPT vs OSS)</text>
  <text x="60" y="272" class="step">· 生成パラメータ (temp, top-p)</text>
  <text x="60" y="290" class="step">· 報酬関数 / ルータ</text>

  <rect x="340" y="190" width="280" height="120" class="method"/>
  <text x="480" y="212" text-anchor="middle" class="head">手法の厳密さ</text>
  <text x="360" y="236" class="step">· CUPED (ばらつきを30-70%削減)</text>
  <text x="360" y="254" class="step">· sequential (常時有効な覗き見)</text>
  <text x="360" y="272" class="step">· Bonferroni / Benjamini-Hochberg</text>
  <text x="360" y="290" class="step">· SRM check (サンプル比)</text>

  <rect x="640" y="190" width="280" height="120" class="method"/>
  <text x="780" y="212" text-anchor="middle" class="head">基盤</text>
  <text x="660" y="236" class="step">Statsig (OpenAI-owned, $1.1B)</text>
  <text x="660" y="254" class="step">GrowthBook (MIT, warehouse-ネイティブ)</text>
  <text x="660" y="272" class="step">Eppo, Optimizely Experiments</text>
  <text x="660" y="290" class="step">LaunchDarkly Experiments</text>

  <rect x="40" y="330" width="880" height="140" class="box"/>
  <text x="480" y="352" text-anchor="middle" class="head">LLM 非決定性が検出力を複雑にする</text>
  <text x="480" y="374" text-anchor="middle" class="step">同一入力でも実行ごと ばらつきは最大15%</text>
  <text x="480" y="394" text-anchor="middle" class="step">サンプルサイズを従来の検出力計算より×1.3-1.5積む</text>
  <text x="480" y="416" text-anchor="middle" class="caption">実例: chatbot +70% 会話長 · Next入口 +1% CTR · Khanmigo レイテンシ-vs-精度 ループ</text>
  <text x="480" y="438" text-anchor="middle" class="caption">評価は回帰を捕捉し、A/Bは影響を確認する; 勘だけで提供しない</text>
</svg>
