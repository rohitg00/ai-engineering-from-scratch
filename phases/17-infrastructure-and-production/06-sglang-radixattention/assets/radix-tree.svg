<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">RadixAttention — treeとしてのKVキャッシュ、ホットbranchを固定するスケジューラ</text>

  <rect x="40" y="50" width="460" height="490" class="box"/>
  <text x="270" y="72" text-anchor="middle" class="head">radix tree</text>
  <rect x="210" y="90" width="120" height="30" class="cool"/>
  <text x="270" y="110" text-anchor="middle" class="step">SYSTEM (2000 tok)</text>
  <rect x="210" y="140" width="120" height="30" class="cool"/>
  <text x="270" y="160" text-anchor="middle" class="step">TOOLS (300 tok)</text>
  <line x1="270" y1="120" x2="270" y2="140" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="80" y="200" width="110" height="30" class="cold"/>
  <text x="135" y="220" text-anchor="middle" class="step">DOC_A (500)</text>
  <rect x="220" y="200" width="110" height="30" class="cold"/>
  <text x="275" y="220" text-anchor="middle" class="step">DOC_B (500)</text>
  <rect x="360" y="200" width="110" height="30" class="cold"/>
  <text x="415" y="220" text-anchor="middle" class="step">DOC_C (500)</text>
  <line x1="270" y1="170" x2="135" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="270" y1="170" x2="275" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="270" y1="170" x2="415" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <rect x="60" y="260" width="60" height="22" class="hot"/>
  <text x="90" y="276" text-anchor="middle" class="small">Q_1</text>
  <rect x="130" y="260" width="60" height="22" class="hot"/>
  <text x="160" y="276" text-anchor="middle" class="small">Q_2</text>
  <rect x="200" y="260" width="60" height="22" class="hot"/>
  <text x="230" y="276" text-anchor="middle" class="small">Q_3</text>
  <rect x="270" y="260" width="60" height="22" class="hot"/>
  <text x="300" y="276" text-anchor="middle" class="small">Q_4</text>
  <rect x="340" y="260" width="60" height="22" class="hot"/>
  <text x="370" y="276" text-anchor="middle" class="small">Q_5</text>
  <rect x="410" y="260" width="60" height="22" class="hot"/>
  <text x="440" y="276" text-anchor="middle" class="small">Q_6</text>

  <rect x="60" y="310" width="420" height="70" class="box"/>
  <text x="270" y="330" text-anchor="middle" class="step">新規リクエスト: SYSTEM + TOOLS + DOC_B + Q_7</text>
  <text x="270" y="350" text-anchor="middle" class="small">treeを走査 : SYSTEM 再利用, TOOLS 再利用, DOC_B 再利用</text>
  <text x="270" y="366" text-anchor="middle" class="small">Q_7分だけブロックを割当 (60 トークン, 4 blocks)</text>

  <rect x="60" y="390" width="420" height="60" class="cool"/>
  <text x="270" y="414" text-anchor="middle" class="step">prefill コスト : 2860でなく60 トークン</text>
  <text x="270" y="432" text-anchor="middle" class="small">prefix多用 RAG : SGLangはvLLM比最大6.4x</text>

  <rect x="60" y="460" width="420" height="70" class="hot"/>
  <text x="270" y="482" text-anchor="middle" class="step">退避ポリシー</text>
  <text x="270" y="500" text-anchor="middle" class="small">branch単位LRU : leafごと退避</text>
  <text x="270" y="518" text-anchor="middle" class="small">キャッシュ形状をtree形状に合わせる</text>

  <rect x="520" y="50" width="400" height="490" class="box"/>
  <text x="720" y="72" text-anchor="middle" class="head">キャッシュ考慮 スケジューリング</text>
  <rect x="540" y="90" width="360" height="70" class="cold"/>
  <text x="720" y="112" text-anchor="middle" class="step">prefix多用 トラフィックでFCFSは誤り</text>
  <text x="720" y="130" text-anchor="middle" class="small">到着順でリクエストを処理</text>
  <text x="720" y="146" text-anchor="middle" class="small">再利用前にホットbranchを退避してしまう</text>
  <rect x="540" y="170" width="360" height="80" class="cool"/>
  <text x="720" y="192" text-anchor="middle" class="step">深さ優先ディスパッチ</text>
  <text x="720" y="210" text-anchor="middle" class="small">実行中branchに根を持つなリクエストを優先</text>
  <text x="720" y="226" text-anchor="middle" class="small">hot branchを常駐に保ち、兄弟branchを流す</text>
  <text x="720" y="242" text-anchor="middle" class="small">radix depth-first 走査を近似</text>

  <rect x="540" y="260" width="360" height="120" class="dsk"/>
  <text x="720" y="282" text-anchor="middle" class="step">数値 (2026)</text>
  <text x="720" y="302" text-anchor="middle" class="small">Llama 3.1 8B H100 ShareGPT 1K :</text>
  <text x="720" y="318" text-anchor="middle" class="small">SGLang ~16,200 tok/s vs vLLM ~12,500 (+29%)</text>
  <text x="720" y="336" text-anchor="middle" class="small">prefix多用 RAG : 最大 6.4x</text>
  <text x="720" y="352" text-anchor="middle" class="small">音声クローニング : 86.4% prefixキャッシュhit率</text>
  <text x="720" y="368" text-anchor="middle" class="small">本番 : 50-99% テンプレート規律次第</text>

  <rect x="540" y="390" width="360" height="140" class="hot"/>
  <text x="720" y="412" text-anchor="middle" class="step">注意点 — プロンプト順序</text>
  <text x="720" y="432" text-anchor="middle" class="small">[system, ツール, context] ≠ [system, context, ツール]</text>
  <text x="720" y="450" text-anchor="middle" class="small">treeは2つの別経路として見る</text>
  <text x="720" y="466" text-anchor="middle" class="small">6.4xが消え、vLLM スループットへ戻る</text>
  <text x="720" y="488" text-anchor="middle" class="step">エンジニアのレバー : テンプレートを固定</text>
  <text x="720" y="506" text-anchor="middle" class="small">不変部分を先頭 (system, ツール, schemas)</text>
  <text x="720" y="520" text-anchor="middle" class="small">ユーザー入力を末尾; 実例では1変更で7%→74%</text>
</svg>
