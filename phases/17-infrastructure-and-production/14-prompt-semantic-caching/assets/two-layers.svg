<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .l1 { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .l2 { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .bad { fill: #ffe1e1; stroke: #b71c1c; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">2層キャッシュ — L1はLLMをスキップ、L2はKVを再利用</text>

  <rect x="40" y="50" width="420" height="220" class="l1"/>
  <text x="250" y="72" text-anchor="middle" class="head">L1 — 意味 (アプリ層)</text>
  <text x="250" y="94" text-anchor="middle" class="step">プロンプトを埋め込み → 類似キャッシュを探す</text>
  <text x="60" y="118" class="small">ツール: GPTCache, Redis Vec, Portkey, Helicone</text>
  <text x="60" y="136" class="small">しきい値: cosine ≥ 0.95 (開始), 調整</text>
  <text x="60" y="154" class="small">本番のhit率:</text>
  <text x="60" y="172" class="small">  自由形式チャット: 10-15%</text>
  <text x="60" y="190" class="small">  構造化FAQ: 40-70%</text>
  <text x="60" y="208" class="small">  コード質問: 20-30%</text>
  <text x="60" y="226" class="small">  音声エージェント反復: 50-80%</text>
  <text x="250" y="254" text-anchor="middle" class="caption">ベンダーの"95% 精度" = 照合 正しさでありhit rateではない</text>

  <rect x="500" y="50" width="420" height="220" class="l2"/>
  <text x="710" y="72" text-anchor="middle" class="head">L2 — プロバイダ prefix cache</text>
  <text x="710" y="94" text-anchor="middle" class="step">repeated prefixのattention KVを再利用</text>
  <text x="520" y="118" class="small">Anthropic: explicit cache_統制 マーカー</text>
  <text x="520" y="136" class="small">  cache read $0.30/M vs $3.00/M (10x)</text>
  <text x="520" y="154" class="small">  write 上乗せ: 1.25x (5-min TTL) or 2x (1-hr TTL)</text>
  <text x="520" y="172" class="small">OpenAI: 自動, プロンプト &gt; 1024 トークン</text>
  <text x="520" y="190" class="small">  cached 入力 ~10x 安価; ~50% typical hit</text>
  <text x="520" y="208" class="small">Gemini: explicit context caching API</text>
  <text x="520" y="226" class="small">自社運用: Phase 17 · 06 RadixAttention</text>
  <text x="710" y="254" text-anchor="middle" class="caption">ProjectDiscovery: プロンプト 再構成でhit rate 7% → 74%</text>

  <rect x="40" y="290" width="880" height="110" class="bad"/>
  <text x="480" y="312" text-anchor="middle" class="head">hit rateを崩すアンチパターン</text>
  <text x="60" y="338" class="step">· 並列化ペナルティ</text>
  <text x="60" y="356" class="small">  初回cache write前の10 parallel 呼び出し = 10 writes, 0 reads → 5-10x 請求</text>
  <text x="60" y="374" class="step">· 動的 content in prefix</text>
  <text x="60" y="392" class="small">  現在時刻, リクエスト ID, ランダム例: 全リクエストが一意 → 0 hits</text>

  <rect x="40" y="420" width="880" height="80" class="box"/>
  <text x="480" y="442" text-anchor="middle" class="head">夜間用スタック</text>
  <text x="480" y="464" text-anchor="middle" class="step">Batch API (50% off) + cached 入力 (10x on 入力) → ~10% of 同期・非キャッシュ コスト</text>
  <text x="480" y="484" text-anchor="middle" class="caption">24-hour レイテンシを許せるものは両方スタックする</text>
</svg>
