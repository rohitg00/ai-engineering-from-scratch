<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .gw { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .feat { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .scale { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">AI ゲートウェイ - 7機能、2026年の4主要候補</text>

  <rect x="40" y="50" width="280" height="220" class="feat"/>
  <text x="180" y="72" text-anchor="middle" class="head">中核機能</text>
  <text x="60" y="96" class="step">· プロバイダ ルーティング</text>
  <text x="60" y="116" class="step">· フォールバック連鎖</text>
  <text x="60" y="136" class="step">· リトライ (バックオフ)</text>
  <text x="60" y="156" class="step">· レート制限 (テナント別)</text>
  <text x="60" y="176" class="step">· シークレット参照</text>
  <text x="60" y="196" class="step">· 可観測性 (OTel)</text>
  <text x="60" y="216" class="step">· ガードレール (PII, jailbreak)</text>
  <text x="180" y="250" text-anchor="middle" class="caption">企業向け スケールでは7つ全て必須</text>

  <rect x="340" y="50" width="280" height="220" class="gw"/>
  <text x="480" y="72" text-anchor="middle" class="head">2026 ゲートウェイ</text>
  <rect x="360" y="90" width="240" height="35" class="box"/>
  <text x="480" y="112" text-anchor="middle" class="step">LiteLLM — MIT, Python</text>
  <rect x="360" y="132" width="240" height="35" class="box"/>
  <text x="480" y="154" text-anchor="middle" class="step">Portkey — Apache 2.0, ガードレール</text>
  <rect x="360" y="174" width="240" height="35" class="box"/>
  <text x="480" y="196" text-anchor="middle" class="step">Kong AI Gateway — 企業向け</text>
  <rect x="360" y="216" width="240" height="35" class="box"/>
  <text x="480" y="238" text-anchor="middle" class="step">Cloudflare / Vercel — マネージドエッジ</text>

  <rect x="640" y="50" width="280" height="220" class="scale"/>
  <text x="780" y="72" text-anchor="middle" class="head">スケール + オーバーヘッド (Kong ベンチマーク)</text>
  <text x="660" y="96" class="step">Kong:      ~5 ms オーバーヘッド  (基準)</text>
  <text x="660" y="116" class="step">LiteLLM:  ~10 ms オーバーヘッド  (破綻 &gt;2K RPS)</text>
  <text x="660" y="136" class="step">Portkey:  ~30 ms オーバーヘッド</text>
  <text x="660" y="156" class="step">Cloudflare: ~2 ms  (エッジ)</text>
  <text x="660" y="190" class="small">KongはPortkeyより228% 高速</text>
  <text x="660" y="208" class="small">KongはLiteLLMより859% 高速</text>
  <text x="660" y="226" class="small">同じ12 CPUs上</text>
  <text x="780" y="258" text-anchor="middle" class="caption">開発はLiteLLM、本番スケールはKong</text>

  <rect x="40" y="290" width="440" height="130" class="box"/>
  <text x="260" y="312" text-anchor="middle" class="head">データ所在が自社運用を決める</text>
  <text x="60" y="338" class="step">医療/金融 → 自社運用</text>
  <text x="60" y="356" class="step">  LiteLLM OSS, Portkey OSS, Kong OSS</text>
  <text x="60" y="374" class="step">消費者向け → マネージドエッジ</text>
  <text x="60" y="392" class="step">  Cloudflare AI Gateway, Vercel AI</text>
  <text x="60" y="410" class="caption">Portkey Apache 2.0化 (2026年3月) で中間層が移動</text>

  <rect x="500" y="290" width="420" height="130" class="box"/>
  <text x="710" y="312" text-anchor="middle" class="head">Phase 17 · 13 + 16と組み合わせ</text>
  <text x="520" y="338" class="step">ゲートウェイ (19) + 可観測性 (13) + ルーティング (16)</text>
  <text x="520" y="356" class="step">同じツールで兼ねることが多い:</text>
  <text x="520" y="374" class="step">  Portkey = ゲートウェイ + 可観測性 + ガードレール</text>
  <text x="520" y="392" class="step">  Helicone = ゲートウェイ + 可観測性</text>
  <text x="520" y="410" class="caption">1つ選ぶか、3つをOpenTelemetryでつなぐ</text>

  <rect x="40" y="440" width="880" height="50" class="box"/>
  <text x="480" y="462" text-anchor="middle" class="step">フォールバック計算 - OpenAI 3% × Anthropic 2% = 両方失敗は0.06%</text>
  <text x="480" y="480" text-anchor="middle" class="caption">3 プロバイダ 連鎖なら実効可用性は99.997%</text>
</svg>
