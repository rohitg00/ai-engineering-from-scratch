<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .old { fill: #eeeeee; stroke: #888; stroke-width: 1.2; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">vLLMスケジューラ — 3つの相乗するデフォルト</text>

  <rect x="40" y="50" width="280" height="490" class="box"/>
  <text x="180" y="72" text-anchor="middle" class="head">PagedAttention アロケータ</text>
  <rect x="60" y="90" width="240" height="60" class="cool"/>
  <text x="180" y="112" text-anchor="middle" class="step">KVキャッシュ = 16トークン単位ブロック</text>
  <text x="180" y="130" text-anchor="middle" class="small">シーケンスごとのブロック表;</text>
  <text x="180" y="144" text-anchor="middle" class="small">オンデマンドで割当、EOSで解放</text>
  <rect x="60" y="160" width="240" height="60" class="cool"/>
  <text x="180" y="182" text-anchor="middle" class="step">断片化 &lt; 4%</text>
  <text x="180" y="200" text-anchor="middle" class="small">連続配置の60-80%と比較</text>
  <text x="180" y="214" text-anchor="middle" class="small">使ったトークン分だけ払う</text>
  <rect x="60" y="230" width="240" height="70" class="cold"/>
  <text x="180" y="252" text-anchor="middle" class="step">--gpu-memory-utilization = 0.9</text>
  <text x="180" y="270" text-anchor="middle" class="small">これは調整ノブ (フラグではない)</text>
  <text x="180" y="286" text-anchor="middle" class="small">vLLMが提供するアロケータは</text>
  <text x="180" y="300" text-anchor="middle" class="small">PagedAttentionのみ</text>
  <rect x="60" y="310" width="240" height="100" class="box"/>
  <text x="180" y="332" text-anchor="middle" class="step">論理から物理への対応</text>
  <text x="70" y="352" class="small">seq_A: [tok0..15] → ブロック37</text>
  <text x="70" y="368" class="small">seq_A: [tok16..31] → ブロック12</text>
  <text x="70" y="384" class="small">seq_B: [tok0..15] → ブロック42</text>
  <text x="70" y="400" class="small">... ブロック表 seqに応じて増える</text>
  <text x="180" y="430" text-anchor="middle" class="caption">KVはシーケンスの仮想メモリ</text>

  <rect x="340" y="50" width="280" height="490" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">継続バッチング</text>
  <rect x="360" y="90" width="240" height="50" class="hot"/>
  <text x="480" y="110" text-anchor="middle" class="step">反復単位スケジューリング</text>
  <text x="480" y="126" text-anchor="middle" class="small">各デコード段階で受入 / 解放</text>
  <rect x="360" y="150" width="240" height="80" class="box"/>
  <text x="480" y="170" text-anchor="middle" class="step">ループ</text>
  <text x="370" y="190" class="small">1. 完了seqをRUNNINGから削除</text>
  <text x="370" y="206" class="small">2. KVブロックが空けばWAITINGを受入</text>
  <text x="370" y="222" class="small">3. バッチ全体で1回のforward</text>
  <rect x="360" y="240" width="240" height="70" class="cool"/>
  <text x="480" y="262" text-anchor="middle" class="step">バッチは常に実作業で埋まる</text>
  <text x="480" y="280" text-anchor="middle" class="small">最長seqへのパディングなし</text>
  <text x="480" y="296" text-anchor="middle" class="small">速いseqは抜け、新seqが入る</text>
  <rect x="360" y="320" width="240" height="90" class="cold"/>
  <text x="480" y="342" text-anchor="middle" class="step">V1 スケジューラ (2026)</text>
  <text x="480" y="360" text-anchor="middle" class="small">スケジューラは反復ごとで実行</text>
  <text x="480" y="376" text-anchor="middle" class="small">リクエストごとではない</text>
  <text x="480" y="394" text-anchor="middle" class="small">N-gram投機デコードが</text>
  <text x="480" y="408" text-anchor="middle" class="small">chunked prefill対応経路</text>
  <text x="480" y="430" text-anchor="middle" class="caption">3-4x 単純実装比、 128同時実行</text>

  <rect x="640" y="50" width="280" height="490" class="box"/>
  <text x="780" y="72" text-anchor="middle" class="head">chunked prefill</text>
  <rect x="660" y="90" width="240" height="60" class="hot"/>
  <text x="780" y="112" text-anchor="middle" class="step">prefillを512-tokチャンクへ分割</text>
  <text x="780" y="130" text-anchor="middle" class="small">decodeと交互実行</text>
  <text x="780" y="144" text-anchor="middle" class="small">平均でなくTTFTテールを守る</text>
  <rect x="660" y="160" width="240" height="70" class="cool"/>
  <text x="780" y="182" text-anchor="middle" class="step">混合負荷下のP99 ITL</text>
  <text x="780" y="200" text-anchor="middle" class="small">chunkingなし: ~50 ms</text>
  <text x="780" y="216" text-anchor="middle" class="small">chunkingあり: ~15 ms</text>
  <rect x="660" y="240" width="240" height="70" class="dsk"/>
  <text x="780" y="262" text-anchor="middle" class="step">注意点 — vLLM v0.18.0</text>
  <text x="780" y="280" text-anchor="middle" class="small">--enable-chunked-prefill</text>
  <text x="780" y="296" text-anchor="middle" class="small">draftモデル投機と非互換</text>
  <rect x="660" y="320" width="240" height="90" class="old"/>
  <text x="780" y="342" text-anchor="middle" class="step">例外</text>
  <text x="780" y="360" text-anchor="middle" class="small">N-gram GPU投機デコード</text>
  <text x="780" y="376" text-anchor="middle" class="small">V1スケジューラで対応</text>
  <text x="780" y="394" text-anchor="middle" class="small">chunked prefill</text>
  <text x="780" y="430" text-anchor="middle" class="caption">フラグを変える前にリリースノートを読む</text>

  <rect x="40" y="470" width="880" height="70" class="box"/>
  <text x="480" y="492" text-anchor="middle" class="step">3つを同時有効 — Llama 3.3 70B FP8, H100 SXM5, 128同時実行</text>
  <text x="480" y="512" text-anchor="middle" class="small">スループット 2,200-2,400 tok/s  ·  デフォルトvLLM比25%  ·  単純PyTorch比3-4x  ·  &lt; 4% 断片化</text>
  <text x="480" y="530" text-anchor="middle" class="caption">各デフォルトは残り2つを前提にしている</text>
</svg>
