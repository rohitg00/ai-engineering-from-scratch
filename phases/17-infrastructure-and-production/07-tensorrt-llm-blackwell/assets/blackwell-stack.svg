<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">Blackwell + TRT-LLM スタック — 7x コスト 差の由来</text>

  <rect x="40" y="50" width="440" height="470" class="box"/>
  <text x="260" y="72" text-anchor="middle" class="head">Blackwell上の精度構成</text>
  <rect x="60" y="90" width="400" height="60" class="cool"/>
  <text x="260" y="112" text-anchor="middle" class="step">重み : NVFP4 (4-bit microscaling)</text>
  <text x="260" y="130" text-anchor="middle" class="small">decoded tokenあたりバイトはFP8の半分</text>
  <text x="260" y="144" text-anchor="middle" class="small">モデル プロバイダがday-0 FP4 重みを提供</text>
  <rect x="60" y="160" width="400" height="60" class="hot"/>
  <text x="260" y="182" text-anchor="middle" class="step">KV cache : FP8 (重要なまま)</text>
  <text x="260" y="200" text-anchor="middle" class="small">FP4 KVはattention テールを潰す</text>
  <text x="260" y="214" text-anchor="middle" class="small">FP8 exponent bitsが動的 rangeを保つ</text>
  <rect x="60" y="230" width="400" height="60" class="cold"/>
  <text x="260" y="252" text-anchor="middle" class="step">活性化 : NVFP4</text>
  <text x="260" y="270" text-anchor="middle" class="small">層内はsmall-range; FP4で耐える</text>
  <text x="260" y="284" text-anchor="middle" class="small">MXFP8 variant利用可 on Tensor Cores</text>
  <rect x="60" y="300" width="400" height="60" class="dsk"/>
  <text x="260" y="322" text-anchor="middle" class="step">attention accumulator : FP32</text>
  <text x="260" y="340" text-anchor="middle" class="small">softmax stabilityには高精度が必要</text>
  <text x="260" y="354" text-anchor="middle" class="small">このtierは交渉不可</text>
  <rect x="60" y="370" width="400" height="140" class="box"/>
  <text x="260" y="392" text-anchor="middle" class="head">品質上の注意</text>
  <text x="260" y="414" text-anchor="middle" class="small">NVFP4 重み 推論系 ワークロード :</text>
  <text x="260" y="430" text-anchor="middle" class="small">数学、思考連鎖、長文脈コード :</text>
  <text x="260" y="446" text-anchor="middle" class="small">ブロック単位calibなしでは品質低下が見える</text>
  <text x="260" y="466" text-anchor="middle" class="small">回復策 : FP8 重み + FP4 活性化</text>
  <text x="260" y="482" text-anchor="middle" class="small">またはH200でFP8のまま維持</text>
  <text x="260" y="502" text-anchor="middle" class="caption">移行前に必ず評価品質を検証</text>

  <rect x="500" y="50" width="420" height="470" class="box"/>
  <text x="710" y="72" text-anchor="middle" class="head">差を積み上げるスタック層</text>

  <rect x="520" y="90" width="380" height="60" class="cool"/>
  <text x="710" y="112" text-anchor="middle" class="step">1 / ハードウェア 帯域</text>
  <text x="710" y="130" text-anchor="middle" class="small">H100 3.35 TB/s vs B200 8.0 TB/s : ~2.4x</text>
  <text x="710" y="144" text-anchor="middle" class="small">decodeはメモリ律速; これが下限</text>

  <rect x="520" y="160" width="380" height="60" class="hot"/>
  <text x="710" y="182" text-anchor="middle" class="step">2 / NVFP4 重み</text>
  <text x="710" y="200" text-anchor="middle" class="small">tokenあたりbytesを半減 : ~2.0x</text>
  <text x="710" y="214" text-anchor="middle" class="small">今重要な重み精度はNVFP4のみ</text>

  <rect x="520" y="230" width="380" height="60" class="cold"/>
  <text x="710" y="252" text-anchor="middle" class="step">3 / MTP draft</text>
  <text x="710" y="270" text-anchor="middle" class="small">multi-token prediction head : 採択 トークンで~1.8x</text>
  <text x="710" y="284" text-anchor="middle" class="small">TRT-LLM ビルドに統合</text>

  <rect x="520" y="300" width="380" height="60" class="dsk"/>
  <text x="710" y="322" text-anchor="middle" class="step">4 / 分離 prefill/decode</text>
  <text x="710" y="340" text-anchor="middle" class="small">Dynamoが別GPU プールを制御 : ~1.6-2.5x</text>
  <text x="710" y="354" text-anchor="middle" class="small">NVLink 5 for KVキャッシュ転送</text>

  <rect x="520" y="370" width="380" height="60" class="box"/>
  <text x="710" y="392" text-anchor="middle" class="step">5 / NVLink 5 all-to-all</text>
  <text x="710" y="410" text-anchor="middle" class="small">MoE expert通信 レイテンシはHopper比3x削減</text>
  <text x="710" y="424" text-anchor="middle" class="small">MoE-heavy モデルは追加倍率を得る</text>

  <rect x="520" y="440" width="380" height="70" class="hot"/>
  <text x="710" y="462" text-anchor="middle" class="step">headline 数値 (2026)</text>
  <text x="710" y="480" text-anchor="middle" class="small">HGX B200 : $0.02/M tok GPT-OSS-120B</text>
  <text x="710" y="496" text-anchor="middle" class="small">GB200 NVL72 + Dynamo : $0.012/M tok</text>
  <text x="710" y="510" text-anchor="middle" class="small">H100 + vLLM : $0.09/M tok</text>
</svg>
