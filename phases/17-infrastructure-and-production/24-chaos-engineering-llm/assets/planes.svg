<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .control { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .target { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .safety { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .obs { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">LLM向けカオスエンジニアリング - 4プレーン + フィードバックループ</text>

  <rect x="40" y="50" width="220" height="180" class="control"/>
  <text x="150" y="72" text-anchor="middle" class="head">制御プレーン</text>
  <text x="150" y="92" text-anchor="middle" class="step">実験スケジューラ</text>
  <text x="60" y="116" class="small">· LitmusChaos ワークフロー</text>
  <text x="60" y="134" class="small">· Chaos Mesh CRDs</text>
  <text x="60" y="152" class="small">· Harness UI</text>
  <text x="60" y="170" class="small">· AWS FIS / Azure Chaos Studio</text>
  <text x="150" y="200" text-anchor="middle" class="caption">スケジュール、パラメータ、頻度</text>

  <rect x="280" y="50" width="220" height="180" class="target"/>
  <text x="390" y="72" text-anchor="middle" class="head">対象プレーン</text>
  <text x="390" y="92" text-anchor="middle" class="step">サービス+インフラ+データ</text>
  <text x="300" y="116" class="small">· Pod、ノード, LB</text>
  <text x="300" y="134" class="small">· データストア, ベクトルDB</text>
  <text x="300" y="152" class="small">· LLM ゲートウェイ</text>
  <text x="300" y="170" class="small">· 上流プロバイダ</text>

  <rect x="520" y="50" width="220" height="180" class="safety"/>
  <text x="630" y="72" text-anchor="middle" class="head">安全プレーン</text>
  <text x="630" y="92" text-anchor="middle" class="step">ガード+中止</text>
  <text x="540" y="116" class="small">· バーンレートゲート (&gt; 2x 予算)</text>
  <text x="540" y="134" class="small">· 影響範囲上限</text>
  <text x="540" y="152" class="small">· 抑制時間帯</text>
  <text x="540" y="170" class="small">· トレース-ID タグ付け</text>
  <text x="540" y="188" class="small">· 緊急停止</text>

  <rect x="760" y="50" width="160" height="180" class="obs"/>
  <text x="840" y="72" text-anchor="middle" class="head">可観測性</text>
  <text x="840" y="92" text-anchor="middle" class="step">トレース+メトリクス</text>
  <text x="780" y="116" class="small">· カオス起因と</text>
  <text x="780" y="134" class="small">  自然故障を</text>
  <text x="780" y="152" class="small">  区別する</text>
  <text x="780" y="170" class="small">· トレース-ID 相関</text>

  <rect x="40" y="260" width="880" height="100" class="box"/>
  <text x="480" y="282" text-anchor="middle" class="head">LLM固有の5実験</text>
  <text x="60" y="308" class="step">1. メモリ過負荷 (KV プリエンプション嵐)</text>
  <text x="60" y="326" class="step">2. ネットワーク障害 (ゲートウェイ ↔ プロバイダを切断)</text>
  <text x="60" y="344" class="step">3. プロバイダ停止 (100% 429)</text>
  <text x="500" y="308" class="step">4. 不正形式プロンプト (トークナイザ爆弾)</text>
  <text x="500" y="326" class="step">5. KV退避嵐 (連鎖re-prefillを強制)</text>

  <rect x="40" y="380" width="880" height="80" class="box"/>
  <text x="480" y="402" text-anchor="middle" class="head">頻度</text>
  <text x="480" y="424" text-anchor="middle" class="step">毎週カナリア + SLOレビュー · 毎月ゲームデー + 事後分析 · 四半期 監査 + 依存マップ</text>
  <text x="480" y="444" text-anchor="middle" class="caption">SLI/SLO + 可観測性 + ロールバック + ランブック + オンコールなしで本番実行しない</text>
</svg>
