<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .pre { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .dec { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .router { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .arrow { stroke: #1a1a1a; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">prefill/decode分離 - NVIDIA Dynamo / llm-d</text>

  <rect x="40" y="60" width="140" height="70" class="router"/>
  <text x="110" y="82" text-anchor="middle" class="head">ルータ</text>
  <text x="110" y="100" text-anchor="middle" class="small">キャッシュ考慮</text>
  <text x="110" y="116" text-anchor="middle" class="small">+ SLAプランナ</text>

  <rect x="240" y="60" width="260" height="120" class="pre"/>
  <text x="370" y="82" text-anchor="middle" class="head">prefill プール - 計算律速</text>
  <text x="370" y="102" text-anchor="middle" class="step">H100 / B200</text>
  <text x="250" y="122" class="small">· matmul中心のforward</text>
  <text x="250" y="138" class="small">· FLOPsが上限</text>
  <text x="250" y="154" class="small">· キュー深さでスケール</text>
  <text x="370" y="174" text-anchor="middle" class="caption">実効 ~2000 TFLOPS FP8</text>

  <rect x="640" y="60" width="260" height="120" class="dec"/>
  <text x="770" y="82" text-anchor="middle" class="head">decode プール - メモリ律速</text>
  <text x="770" y="102" text-anchor="middle" class="step">H200または積極的 量子化</text>
  <text x="650" y="122" class="small">· 1 iterで1 token、全重み参照</text>
  <text x="650" y="138" class="small">· HBM帯域が上限</text>
  <text x="650" y="154" class="small">· KV 利用率でスケール</text>
  <text x="770" y="174" text-anchor="middle" class="caption">~3 TB/s HBM3 上限</text>

  <path class="arrow" d="M180 95 L 235 95"/>
  <text x="210" y="88" text-anchor="middle" class="small">プロンプト</text>
  <path class="arrow" d="M500 95 L 635 95"/>
  <text x="568" y="78" text-anchor="middle" class="step">NIXL</text>
  <text x="568" y="108" text-anchor="middle" class="small">KV transfer</text>
  <text x="568" y="125" text-anchor="middle" class="small">RDMA またはTCP</text>

  <rect x="40" y="210" width="440" height="110" class="box"/>
  <text x="260" y="232" text-anchor="middle" class="head">NVIDIA Dynamo</text>
  <text x="60" y="256" class="small">· vLLM / SGLang / TRT-LLMの上に配置</text>
  <text x="60" y="274" class="small">· Planner Profiler + SLA Plannerで自動構成</text>
  <text x="60" y="292" class="small">· Rust コア、Pythonで拡張</text>
  <text x="60" y="310" class="small">· DeepSeek-R1で30x、GB300 NVL72 MoEで50x</text>

  <rect x="500" y="210" width="420" height="110" class="box"/>
  <text x="710" y="232" text-anchor="middle" class="head">llm-d (Red Hat + AWS)</text>
  <text x="520" y="256" class="small">· roleごとのKubernetes-ネイティブ Services</text>
  <text x="520" y="274" class="small">· KV 局所性用のpackDomain: rack</text>
  <text x="520" y="292" class="small">· role別HPA (queue / KV 利用率)</text>
  <text x="520" y="310" class="small">· 0.5: 階層KV、LoRA ルーティング、UCCL</text>

  <rect x="40" y="340" width="880" height="110" class="box"/>
  <text x="480" y="362" text-anchor="middle" class="head">効く条件</text>
  <text x="480" y="386" text-anchor="middle" class="step">プロンプト &gt; 512 トークン AND 出力 &gt; 200 トークン</text>
  <text x="480" y="404" text-anchor="middle" class="step">MoE serving (DeepSeek-V3など) - expert ルーティングで二重に効く</text>
  <text x="480" y="424" text-anchor="middle" class="step">実例: 同ワークロード/同SLA/追加ハードウェアなしで $2M → $1.2M/年</text>
  <text x="480" y="444" text-anchor="middle" class="caption">短いプロンプトでは転送コストが支配するため、分離しない</text>
</svg>
