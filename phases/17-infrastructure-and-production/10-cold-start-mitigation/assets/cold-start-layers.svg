<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .layer { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .heavy { fill: #ffe1e1; stroke: #b71c1c; stroke-width: 1.5; }
      .light { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">コールドスタート対策 — 70B モデルの5 層</text>

  <rect x="40" y="50" width="880" height="80" class="heavy"/>
  <text x="480" y="72" text-anchor="middle" class="head">素のコールドスタート — 合計 ~328 s (5.5 min)</text>
  <text x="120" y="95" text-anchor="middle" class="step">node 確保</text>
  <text x="120" y="112" text-anchor="middle" class="small">50 s</text>
  <text x="320" y="95" text-anchor="middle" class="step">イメージ取得</text>
  <text x="320" y="112" text-anchor="middle" class="small">180 s</text>
  <text x="520" y="95" text-anchor="middle" class="step">重みをHBMへ</text>
  <text x="520" y="112" text-anchor="middle" class="small">75 s</text>
  <text x="720" y="95" text-anchor="middle" class="step">エンジン init</text>
  <text x="720" y="112" text-anchor="middle" class="small">20 s</text>
  <text x="870" y="95" text-anchor="middle" class="step">初回forward</text>
  <text x="870" y="112" text-anchor="middle" class="small">3 s</text>

  <rect x="40" y="150" width="280" height="110" class="layer"/>
  <text x="180" y="172" text-anchor="middle" class="head">L1 — 事前配置イメージ</text>
  <text x="180" y="192" text-anchor="middle" class="step">Bottlerocket dual volume</text>
  <text x="180" y="210" text-anchor="middle" class="small">image入りデータvolumeをスナップショット</text>
  <text x="180" y="226" text-anchor="middle" class="small">EC2NodeClassがスナップショット参照</text>
  <text x="180" y="244" text-anchor="middle" class="small">180s イメージ取得を削除</text>
  <rect x="340" y="150" width="280" height="110" class="layer"/>
  <text x="480" y="172" text-anchor="middle" class="head">L2 — Model Streamer</text>
  <text x="480" y="192" text-anchor="middle" class="step">Run:ai / ネイティブ vLLM 2026</text>
  <text x="480" y="210" text-anchor="middle" class="small">重みを層-by-層で流す</text>
  <text x="480" y="226" text-anchor="middle" class="small">I/Oとcompute setupを重ねる</text>
  <text x="480" y="244" text-anchor="middle" class="small">重みロード高速化 ~2x</text>
  <rect x="640" y="150" width="280" height="110" class="layer"/>
  <text x="780" y="172" text-anchor="middle" class="head">L3 — GPU スナップショット</text>
  <text x="780" y="192" text-anchor="middle" class="step">Modal checkポイント</text>
  <text x="780" y="210" text-anchor="middle" class="small">ロード後HBM状態をシリアライズ</text>
  <text x="780" y="226" text-anchor="middle" class="small">re開始最大10x 高速</text>
  <text x="780" y="244" text-anchor="middle" class="small">per-GPU-topoログy</text>

  <rect x="40" y="280" width="280" height="110" class="layer"/>
  <text x="180" y="302" text-anchor="middle" class="head">L4 — ウォームプール</text>
  <text x="180" y="322" text-anchor="middle" class="step">min_workers ≥ 1</text>
  <text x="180" y="340" text-anchor="middle" class="small">cold 経路を完全に削除</text>
  <text x="180" y="356" text-anchor="middle" class="small">コスト: 24x7 GPU rental</text>
  <text x="180" y="374" text-anchor="middle" class="small">P99 TTFT &lt; 60sでは必須</text>
  <rect x="340" y="280" width="280" height="110" class="layer"/>
  <text x="480" y="302" text-anchor="middle" class="head">L5 — 階層ロード</text>
  <text x="480" y="322" text-anchor="middle" class="step">ServerlessLLM パターン</text>
  <text x="480" y="340" text-anchor="middle" class="small">NVMe → DRAM → HBM pipeline</text>
  <text x="480" y="356" text-anchor="middle" class="small">レイテンシ 削減 10-200x</text>
  <text x="480" y="374" text-anchor="middle" class="small">本番採用初期</text>
  <rect x="640" y="280" width="280" height="110" class="layer"/>
  <text x="780" y="302" text-anchor="middle" class="head">補足 — ライブマイグレーション</text>
  <text x="780" y="322" text-anchor="middle" class="step">cacheでなくトークンを動かす</text>
  <text x="780" y="340" text-anchor="middle" class="small">入力 (KB) をwarm宛先へ送る</text>
  <text x="780" y="356" text-anchor="middle" class="small">宛先でKVを再計算</text>
  <text x="780" y="374" text-anchor="middle" class="small">分離構成に有効</text>

  <rect x="40" y="410" width="880" height="100" class="light"/>
  <text x="480" y="432" text-anchor="middle" class="head">スタック結果 — L1+L2+L3で~15 s、L4で完全warm</text>
  <text x="480" y="454" text-anchor="middle" class="step">Modal 公開値: 2-4 s  ·  Baseten デフォルト: 5-10 s, 事前warmで1秒未満</text>
  <text x="480" y="476" text-anchor="middle" class="small">正解はSLA形状とwarm-プール 予算で変わる</text>
  <text x="480" y="494" text-anchor="middle" class="caption">最適化前に測定 — データなしで層を足さない</text>
</svg>
