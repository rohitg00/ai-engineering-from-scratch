<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .inter { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .semi { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .batch { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">ワークロード トリアージ — 3 レーン, 1 rule</text>

  <rect x="40" y="50" width="280" height="340" class="inter"/>
  <text x="180" y="72" text-anchor="middle" class="head">対話型</text>
  <text x="180" y="94" text-anchor="middle" class="step">ユーザーが応答を待つ</text>
  <text x="60" y="122" class="small">· TTFTが重要</text>
  <text x="60" y="140" class="small">· プロンプト cache付き同期呼び出し</text>
  <text x="60" y="158" class="small">· バッチ不可</text>
  <text x="60" y="176" class="small">· 例: chat, voice agent, search</text>
  <text x="60" y="220" class="step">100% of 基準 コスト</text>
  <text x="60" y="238" class="small">(キャッシュ節約分を除く)</text>

  <rect x="340" y="50" width="280" height="340" class="semi"/>
  <text x="480" y="72" text-anchor="middle" class="head">semi-対話型</text>
  <text x="480" y="94" text-anchor="middle" class="step">ユーザーが数分後に戻る</text>
  <text x="360" y="122" class="small">· 非同期キュー + syncへのフォールバック</text>
  <text x="360" y="140" class="small">· 許容 P99 ~5-10 min</text>
  <text x="360" y="158" class="small">· 例: 中規模 RAG index,</text>
  <text x="360" y="176" class="small">  "refresh" レポート, 半ライブエージェント</text>
  <text x="360" y="220" class="step">~50% of 基準 コスト</text>
  <text x="360" y="238" class="small">(caching + キュー償却あり)</text>

  <rect x="640" y="50" width="280" height="340" class="batch"/>
  <text x="780" y="72" text-anchor="middle" class="head">バッチ</text>
  <text x="780" y="94" text-anchor="middle" class="step">結果 "翌朝まで"</text>
  <text x="660" y="122" class="small">· 常にバッチ、常にcacheをスタック</text>
  <text x="660" y="140" class="small">· 24h SLA, typical 2-6h P50</text>
  <text x="660" y="158" class="small">· 例: コンテンツパイプライン,</text>
  <text x="660" y="176" class="small">  分類, ラベリング, レポートs</text>
  <text x="660" y="220" class="step">~10% of 基準 コスト</text>
  <text x="660" y="238" class="small">(バッチ 50% off + cached 入力 10x)</text>

  <rect x="40" y="410" width="880" height="60" class="box"/>
  <text x="480" y="432" text-anchor="middle" class="head">ルール</text>
  <text x="480" y="454" text-anchor="middle" class="step">ユーザーが24h レイテンシを許容できるなら、そのワークロードはバッチへ置く</text>
</svg>
