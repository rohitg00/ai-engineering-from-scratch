<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .req { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .router { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .region { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .arrow { stroke: #1a1a1a; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">キャッシュ考慮 マルチリージョン ルーティング — TTFT vs network RTT</text>

  <rect x="40" y="50" width="180" height="70" class="req"/>
  <text x="130" y="75" text-anchor="middle" class="head">incoming リクエスト</text>
  <text x="130" y="92" text-anchor="middle" class="step">起点: us-east-1</text>
  <text x="130" y="108" text-anchor="middle" class="small">prefix_hash = 0xabc</text>

  <rect x="280" y="50" width="400" height="110" class="router"/>
  <text x="480" y="75" text-anchor="middle" class="head">キャッシュ考慮 ルータ (vLLM Router / llm-d)</text>
  <text x="290" y="95" class="step">1. prefixをhash → 0xabc</text>
  <text x="290" y="112" class="step">2. 0xabc保持レプリカsを検索</text>
  <text x="290" y="129" class="step">3. prefill + network RTTを最小化</text>
  <text x="290" y="146" class="small">KVイベント: cache.block_added / cache.block_evicted</text>
  <path class="arrow" d="M220 85 L 275 85"/>
  <path class="arrow" d="M685 85 L 740 85"/>

  <rect x="740" y="50" width="180" height="110" class="router"/>
  <text x="830" y="75" text-anchor="middle" class="head">選択</text>
  <text x="830" y="95" text-anchor="middle" class="step">レプリカ R3 (us-east)</text>
  <text x="830" y="112" text-anchor="middle" class="small">hit=true, ローカル</text>
  <text x="830" y="128" text-anchor="middle" class="step">TTFT ≈ 80 ms</text>
  <text x="830" y="146" text-anchor="middle" class="small">vs ~800 ms cold</text>

  <rect x="40" y="190" width="280" height="130" class="region"/>
  <text x="180" y="212" text-anchor="middle" class="head">us-east-1 (起点)</text>
  <text x="180" y="232" text-anchor="middle" class="step">R1 R2 R3* R4</text>
  <text x="180" y="252" text-anchor="middle" class="small">R3がprefix 0xabcを保持</text>
  <text x="180" y="272" text-anchor="middle" class="small">RTT 0 ms</text>
  <text x="180" y="294" text-anchor="middle" class="caption">ローカル cache hit: 80 ms</text>

  <rect x="340" y="190" width="280" height="130" class="region"/>
  <text x="480" y="212" text-anchor="middle" class="head">us-west-2</text>
  <text x="480" y="232" text-anchor="middle" class="step">R5 R6 R7 R8</text>
  <text x="480" y="252" text-anchor="middle" class="small">0xabcは照合なし</text>
  <text x="480" y="272" text-anchor="middle" class="small">RTT 65 ms</text>
  <text x="480" y="294" text-anchor="middle" class="caption">cold prefill: 800 + 65 ms</text>

  <rect x="640" y="190" width="280" height="130" class="region"/>
  <text x="780" y="212" text-anchor="middle" class="head">eu-west-1</text>
  <text x="780" y="232" text-anchor="middle" class="step">R9 R10 R11 R12</text>
  <text x="780" y="252" text-anchor="middle" class="small">R11がprefix 0xabcを保持</text>
  <text x="780" y="272" text-anchor="middle" class="small">RTT 75 ms</text>
  <text x="780" y="294" text-anchor="middle" class="caption">hit + cross: 80 + 75 ms</text>

  <rect x="40" y="350" width="440" height="140" class="box"/>
  <text x="260" y="372" text-anchor="middle" class="head">ルーティング 目的関数 — GORGO (2026)</text>
  <text x="260" y="394" text-anchor="middle" class="step">最小化: prefill_time + network_RTT</text>
  <text x="60" y="418" class="small">· cache hitは~720 msを節約</text>
  <text x="60" y="436" class="small">· リージョン間はRTT ~65-220 ms</text>
  <text x="60" y="454" class="small">· prefillが支配的ならリージョン間が勝つ</text>
  <text x="60" y="472" class="small">· データ所在境界が両方に優先 — 先に分割</text>

  <rect x="500" y="350" width="420" height="140" class="box"/>
  <text x="710" y="372" text-anchor="middle" class="head">DRマニフェスト — 32% 失敗</text>
  <text x="500" y="394" text-anchor="middle" class="step" style="font-size: 11px;">重みはバックアップ済み、トークン化rは未バックアップ</text>
  <text x="520" y="418" class="small">必須ファイル:</text>
  <text x="520" y="436" class="small">· トークン化r.json / トークン化r.モデル</text>
  <text x="520" y="454" class="small">· 量子化_config.json, AWQ スケールs</text>
  <text x="520" y="472" class="small">· RoPE scaling, chat テンプレート, LoRA adapters</text>
</svg>
