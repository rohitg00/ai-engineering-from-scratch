<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .apple { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .qcom { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .web { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .jet { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">エッジ 推論 — 4 対象、上限は帯域が決める</text>

  <rect x="40" y="50" width="220" height="190" class="apple"/>
  <text x="150" y="72" text-anchor="middle" class="head">Apple Neural Engine</text>
  <text x="150" y="95" text-anchor="middle" class="step">M4 / A18 — 最大 38 TOPS</text>
  <text x="150" y="113" text-anchor="middle" class="small">統合メモリ, コピーなし</text>
  <text x="150" y="131" text-anchor="middle" class="small">Core ML for ネイティブ ANE</text>
  <text x="150" y="149" text-anchor="middle" class="small">MPS via llama.cpp</text>
  <text x="150" y="175" text-anchor="middle" class="step">iPhone 16 ≈ 8 tok/s</text>
  <text x="150" y="193" text-anchor="middle" class="small">60 GB/s DRAM</text>
  <text x="150" y="211" text-anchor="middle" class="small">7B Q4, decode メモリ律速</text>

  <rect x="280" y="50" width="220" height="190" class="qcom"/>
  <text x="390" y="72" text-anchor="middle" class="head">Qualcomm Hexagon</text>
  <text x="390" y="95" text-anchor="middle" class="step">SD X Elite — 最大 45 TOPS</text>
  <text x="390" y="113" text-anchor="middle" class="small">SD 8 Gen 4 フラッグシップAndroid</text>
  <text x="390" y="131" text-anchor="middle" class="small">QNN SDK, AI Hub 変換</text>
  <text x="390" y="149" text-anchor="middle" class="small">Windows ARM copilots</text>
  <text x="390" y="175" text-anchor="middle" class="step">SD 8 Gen 3 ≈ 7 tok/s</text>
  <text x="390" y="193" text-anchor="middle" class="small">77 GB/s DRAM</text>
  <text x="390" y="211" text-anchor="middle" class="small">7B Q4, 中上位で典型</text>

  <rect x="520" y="50" width="220" height="190" class="web"/>
  <text x="630" y="72" text-anchor="middle" class="head">WebGPU + WebLLM</text>
  <text x="630" y="95" text-anchor="middle" class="step">ブラウザ, インストールなし</text>
  <text x="630" y="113" text-anchor="middle" class="small">Chrome Android 121+ / Safari iOS 26</text>
  <text x="630" y="131" text-anchor="middle" class="small">Firefox Androidは追随中</text>
  <text x="630" y="149" text-anchor="middle" class="small">~70-75% モバイルカバー率</text>
  <text x="630" y="175" text-anchor="middle" class="step">M3 Max ≈ 41 tok/s</text>
  <text x="630" y="193" text-anchor="middle" class="small">~70-80% of ネイティブ</text>
  <text x="630" y="211" text-anchor="middle" class="small">OpenAI-compatible JS API</text>

  <rect x="760" y="50" width="160" height="190" class="jet"/>
  <text x="840" y="72" text-anchor="middle" class="head">NVIDIA Jetson</text>
  <text x="840" y="95" text-anchor="middle" class="step">Orin / AGX / Thor</text>
  <text x="840" y="113" text-anchor="middle" class="small">TensorRT Edge-LLM</text>
  <text x="840" y="131" text-anchor="middle" class="small">EAGLE-3 + NVFP4</text>
  <text x="840" y="149" text-anchor="middle" class="small">chunked prefill</text>
  <text x="840" y="175" text-anchor="middle" class="step">AGX ≈ 40 tok/s</text>
  <text x="840" y="193" text-anchor="middle" class="small">gpt-oss-20b vLLM</text>
  <text x="840" y="211" text-anchor="middle" class="small">205 GB/s</text>

  <rect x="40" y="260" width="880" height="110" class="box"/>
  <text x="480" y="282" text-anchor="middle" class="head">帯域が上限を決める — decodeは各tokenで全重みを読む</text>
  <text x="480" y="308" text-anchor="middle" class="step">H100 HBM3: 3350 GB/s  →  Llama 8B Q4 上限 ≈ 710 tok/s (ob処理d 170)</text>
  <text x="480" y="326" text-anchor="middle" class="step">M3 Max 400 GB/s  →  上限 ≈ 85 tok/s (ob処理d 55)</text>
  <text x="480" y="344" text-anchor="middle" class="step">iPhone 16 60 GB/s  →  上限 ≈ 12 tok/s (ob処理d 8)</text>
  <text x="480" y="362" text-anchor="middle" class="caption">computeが効くのは実行時 効率がこの上限を下回る時だけ</text>

  <rect x="40" y="390" width="880" height="100" class="box"/>
  <text x="480" y="412" text-anchor="middle" class="head">目標別量子化 選択</text>
  <text x="480" y="432" text-anchor="middle" class="step">ANE: INT4 重み + FP16 活性化 (Core ML 経路)</text>
  <text x="480" y="450" text-anchor="middle" class="step">Hexagon: QNN INT8/INT4 (AI Hub 変換器)</text>
  <text x="480" y="468" text-anchor="middle" class="step">WebGPU: Q4 GGUF (ブラウザ メモリ 上限 ~3-4 GB)</text>
  <text x="480" y="486" text-anchor="middle" class="step">Jetson Thor: NVFP4 + FP8 KV (Edge-LLM 経路)</text>
</svg>
