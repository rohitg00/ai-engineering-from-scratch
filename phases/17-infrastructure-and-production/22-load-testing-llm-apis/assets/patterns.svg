<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .bad { fill: #ffe1e1; stroke: #b71c1c; stroke-width: 1.5; }
      .tool { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .pattern { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">LLM APIsの負荷テスト - 2つの罠、4 パターン、5 ツール</text>

  <rect x="40" y="50" width="440" height="110" class="bad"/>
  <text x="260" y="72" text-anchor="middle" class="head">GILの罠 (Locust stock)</text>
  <text x="60" y="96" class="small">· クライアントがPython GIL下でトークン化</text>
  <text x="60" y="114" class="small">· リクエスト生成と競合する</text>
  <text x="60" y="132" class="small">· トークン化 backログが報告 ITLを膨らませる</text>
  <text x="260" y="152" text-anchor="middle" class="caption">ボトルネックはサーバではなくクライアント</text>

  <rect x="500" y="50" width="420" height="110" class="bad"/>
  <text x="710" y="72" text-anchor="middle" class="head">プロンプト-一様性 罠</text>
  <text x="520" y="96" class="small">· 1つのプロンプトでループ = prefix cache 100%</text>
  <text x="520" y="114" class="small">· リクエスト 合流が"N 同時実行"を1つとして処理</text>
  <text x="520" y="132" class="small">· スループットは良く見えるが本番で倒れる</text>
  <text x="710" y="152" text-anchor="middle" class="caption">修正: LLMPerf --平均 + --stddev 入力 トークン</text>

  <rect x="40" y="180" width="440" height="160" class="tool"/>
  <text x="260" y="202" text-anchor="middle" class="head">2026 ツール</text>
  <text x="60" y="226" class="step">LLMPerf — Anyscale, Rust tokenizers, streaming</text>
  <text x="60" y="244" class="step">NVIDIA GenAI-Perf — Triton-backed 参考値</text>
  <text x="60" y="262" class="step">LLM-Locust — Locust + GIL 修正</text>
  <text x="60" y="280" class="step">guidellm — 大規模synthetic</text>
  <text x="60" y="298" class="step">k6 v2026.1.0 + Operator 1.0 GA</text>
  <text x="60" y="316" class="small">  streaming-aware、CRD-ネイティブ、CI ゲート向き</text>

  <rect x="500" y="180" width="420" height="160" class="pattern"/>
  <text x="710" y="202" text-anchor="middle" class="head">4つの負荷パターン</text>
  <text x="520" y="226" class="step">定常 - 30-60分の一定 RPS</text>
  <text x="520" y="244" class="small">  基準 回帰を捕捉</text>
  <text x="520" y="264" class="step">ランプ - 15分で0から目標へ</text>
  <text x="520" y="280" class="small">  容量 限界点 + ウォームアップを捕捉</text>
  <text x="520" y="300" class="step">スパイク - 3-10xの急なバースト</text>
  <text x="520" y="316" class="small">  オートスケール + cold-start 影響を捕捉</text>
  <text x="520" y="328" class="step">ソーク - 4-8h 定常</text>

  <rect x="40" y="360" width="880" height="130" class="box"/>
  <text x="480" y="382" text-anchor="middle" class="head">CI ゲート レシピ</text>
  <text x="480" y="406" text-anchor="middle" class="step">PR上でk6を基準 RPSの30-50 反復で実行</text>
  <text x="480" y="426" text-anchor="middle" class="step">ゲート: P50 / P95 TTFT, 5xx &lt; 5%, TPOT しきい値</text>
  <text x="480" y="446" text-anchor="middle" class="caption">違反したらビルドを落とす - 性能をコンパイルエラーとして扱う</text>
  <text x="480" y="468" text-anchor="middle" class="small">GenAI-Perf ITLはTTFTを除外 · LLMPerfは含める - 同じサーバでもTPOTが違う</text>
</svg>
