<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .node { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .sched { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .app { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .bad { fill: #ffe1e1; stroke: #b71c1c; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">GPUオートスケール — 1つではなく3層</text>

  <rect x="40" y="50" width="280" height="480" class="box"/>
  <text x="180" y="72" text-anchor="middle" class="head">層 1 — ノード確保</text>
  <rect x="60" y="90" width="240" height="70" class="node"/>
  <text x="180" y="112" text-anchor="middle" class="step">Karpenter</text>
  <text x="180" y="130" text-anchor="middle" class="small">待機中Podでノードを確保</text>
  <text x="180" y="146" text-anchor="middle" class="small">45-60s (vs CA 90-120s)</text>
  <rect x="60" y="170" width="240" height="90" class="bad"/>
  <text x="180" y="192" text-anchor="middle" class="step">集約の罠</text>
  <text x="180" y="210" text-anchor="middle" class="small">WhenEmptyOrUnderutilized</text>
  <text x="180" y="226" text-anchor="middle" class="small">実行中GPUジョブを退避</text>
  <text x="180" y="244" text-anchor="middle" class="small">分単位の容量を失う</text>
  <rect x="60" y="270" width="240" height="100" class="node"/>
  <text x="180" y="292" text-anchor="middle" class="step">安全な設定</text>
  <text x="180" y="310" text-anchor="middle" class="small">consolidationPolicy:</text>
  <text x="180" y="326" text-anchor="middle" class="small">WhenEmpty</text>
  <text x="180" y="342" text-anchor="middle" class="small">consolidateAfter: 1h</text>
  <text x="180" y="358" text-anchor="middle" class="small">GPUノードにtaint</text>
  <text x="180" y="400" text-anchor="middle" class="caption">インスタンスタイプを動的に選ぶ</text>

  <rect x="340" y="50" width="280" height="480" class="box"/>
  <text x="480" y="72" text-anchor="middle" class="head">層 2 — ギャングスケジューリング</text>
  <rect x="360" y="90" width="240" height="70" class="sched"/>
  <text x="480" y="112" text-anchor="middle" class="step">KAI Scheduler</text>
  <text x="480" y="130" text-anchor="middle" class="small">kube-スケジューラのセカンダリ</text>
  <text x="480" y="146" text-anchor="middle" class="small">ワークロードに注釈付けしてオプトイン</text>
  <rect x="360" y="170" width="240" height="100" class="sched"/>
  <text x="480" y="192" text-anchor="middle" class="step">ギャングスケジューリング</text>
  <text x="480" y="210" text-anchor="middle" class="small">全体配置かゼロ</text>
  <text x="480" y="226" text-anchor="middle" class="small">7-of-8 アイドル罠を防ぐ</text>
  <text x="480" y="244" text-anchor="middle" class="small">全部収まらなければ全て延期</text>
  <rect x="360" y="280" width="240" height="80" class="sched"/>
  <text x="480" y="302" text-anchor="middle" class="step">トポロジ認識</text>
  <text x="480" y="320" text-anchor="middle" class="small">NVLink / IB / ラック配置</text>
  <text x="480" y="336" text-anchor="middle" class="small">TP-8を1つのNVLink ドメイン内に収める</text>
  <rect x="360" y="370" width="240" height="90" class="sched"/>
  <text x="480" y="392" text-anchor="middle" class="step">階層キュー</text>
  <text x="480" y="410" text-anchor="middle" class="small">複数チームの優先度+クォータ</text>
  <text x="480" y="426" text-anchor="middle" class="small">キューごとのプリエンプション規則</text>
  <text x="480" y="442" text-anchor="middle" class="small">Ray + vLLM 本番スタック統合</text>

  <rect x="640" y="50" width="280" height="480" class="box"/>
  <text x="780" y="72" text-anchor="middle" class="head">層 3 — アプリ信号</text>
  <rect x="660" y="90" width="240" height="80" class="bad"/>
  <text x="780" y="112" text-anchor="middle" class="step">HPAの罠</text>
  <text x="780" y="130" text-anchor="middle" class="small">DCGM_FI_DEV_GPU_UTIL</text>
  <text x="780" y="146" text-anchor="middle" class="small">デューティ比であり負荷ではない</text>
  <text x="780" y="162" text-anchor="middle" class="small">100% = 10または100リクエスト</text>
  <rect x="660" y="180" width="240" height="100" class="app"/>
  <text x="780" y="202" text-anchor="middle" class="step">正しい信号</text>
  <text x="780" y="220" text-anchor="middle" class="small">キュー深さ</text>
  <text x="780" y="236" text-anchor="middle" class="small">KVキャッシュ利用率</text>
  <text x="780" y="252" text-anchor="middle" class="small">レプリカ別P99 TTFT</text>
  <text x="780" y="268" text-anchor="middle" class="small">グッドプット (SLO達成 RPS)</text>
  <rect x="660" y="290" width="240" height="90" class="app"/>
  <text x="780" y="312" text-anchor="middle" class="step">Dynamo Planner</text>
  <text x="780" y="330" text-anchor="middle" class="small">推論信号でスケール</text>
  <text x="780" y="346" text-anchor="middle" class="small">prefill:decode比をレート整合</text>
  <text x="780" y="362" text-anchor="middle" class="small">デューティ比でなくSLOを満たす</text>
  <rect x="660" y="390" width="240" height="90" class="app"/>
  <text x="780" y="412" text-anchor="middle" class="step">llm-d WVA</text>
  <text x="780" y="430" text-anchor="middle" class="small">Workload Variant Autoscaler</text>
  <text x="780" y="446" text-anchor="middle" class="small">prefill/decode分離</text>
  <text x="780" y="462" text-anchor="middle" class="small">ロール別 HPA</text>

  <rect x="40" y="540" width="880" height="30" class="box"/>
  <text x="480" y="558" text-anchor="middle" class="step">3つを組み合わせる — 実GPUクラスタではどれか1つだけでは不十分</text>
</svg>
