<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .soc { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .hipaa { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .gdpr { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .eu { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .emerging { fill: #ffe1e1; stroke: #b71c1c; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">LLM コンプライアンス - 7 フレームワーク、1つのマトリクス</text>

  <rect x="40" y="50" width="220" height="100" class="soc"/>
  <text x="150" y="72" text-anchor="middle" class="head">SOC 2 Type II</text>
  <text x="150" y="92" text-anchor="middle" class="step">B2B SaaS 基準</text>
  <text x="150" y="110" text-anchor="middle" class="small">6-12か月の運用済み統制</text>
  <text x="150" y="128" text-anchor="middle" class="small">Type Iは開始点でありゲートではない</text>

  <rect x="280" y="50" width="220" height="100" class="hipaa"/>
  <text x="390" y="72" text-anchor="middle" class="head">HIPAA</text>
  <text x="390" y="92" text-anchor="middle" class="step">PHIにはBAA必須</text>
  <text x="390" y="110" text-anchor="middle" class="small">Bedrock, Azure, Vertex, OpenAI, Anthropic</text>
  <text x="390" y="128" text-anchor="middle" class="small">すべてBAAを提供</text>

  <rect x="520" y="50" width="220" height="100" class="gdpr"/>
  <text x="630" y="72" text-anchor="middle" class="head">GDPR</text>
  <text x="630" y="92" text-anchor="middle" class="step">リアルタイムPII削除</text>
  <text x="630" y="110" text-anchor="middle" class="small">後処理は防御可能ではない</text>
  <text x="630" y="128" text-anchor="middle" class="small">Clearview AI €30.5M (2024); OpenAI €15M (2024, 取消)</text>

  <rect x="760" y="50" width="160" height="100" class="box"/>
  <text x="840" y="72" text-anchor="middle" class="head">PCI-DSS</text>
  <text x="840" y="92" text-anchor="middle" class="step">決済データ範囲</text>
  <text x="840" y="110" text-anchor="middle" class="small">設定+契約</text>
  <text x="840" y="128" text-anchor="middle" class="small">AI対話層向け</text>

  <rect x="40" y="170" width="340" height="120" class="eu"/>
  <text x="210" y="192" text-anchor="middle" class="head">EU AI Act</text>
  <text x="60" y="216" class="step">· 2024-08-01に発効</text>
  <text x="60" y="234" class="step">· 高リスク規制適用は2026-08-02</text>
  <text x="60" y="252" class="step">· 罰金は最大€35Mまたは全世界売上の7%</text>
  <text x="60" y="270" class="step">· リスク階層: 許容不可 / 高 / 限定 / 最小</text>
  <text x="210" y="285" text-anchor="middle" class="caption">多くのB2B LLM SaaSは限定リスク</text>

  <rect x="400" y="170" width="300" height="120" class="box"/>
  <text x="550" y="192" text-anchor="middle" class="head">Colorado AI Act</text>
  <text x="420" y="216" class="step">· 2026-06-30施行 (延期)</text>
  <text x="420" y="234" class="step">· 影響評価</text>
  <text x="420" y="252" class="step">· AI判断への不服申立権</text>
  <text x="420" y="270" class="step">· Virginiaも信用/雇用で類似</text>

  <rect x="720" y="170" width="200" height="120" class="emerging"/>
  <text x="820" y="192" text-anchor="middle" class="head">ISO 42001</text>
  <text x="820" y="212" text-anchor="middle" class="step">AIガバナンス</text>
  <text x="820" y="230" text-anchor="middle" class="small">リスク管理</text>
  <text x="820" y="248" text-anchor="middle" class="small">透明性</text>
  <text x="820" y="266" text-anchor="middle" class="small">人間の監督</text>
  <text x="820" y="284" text-anchor="middle" class="caption">ISO 27001と組み合わせる</text>

  <rect x="40" y="310" width="880" height="90" class="box"/>
  <text x="480" y="332" text-anchor="middle" class="head">フレームワーク横断対応 - 1つの統制で複数を満たす</text>
  <text x="60" y="358" class="small">アクセスログ: ISO 27001 A.5.15-18 · GDPR Art. 32 · HIPAA §164.312(a) · SOC 2 CC6</text>
  <text x="60" y="376" class="small">通信中暗号化: ISO A.8.24 · GDPR Art. 32 · HIPAA §164.312(e) · PCI Req. 4</text>
  <text x="60" y="394" class="small">監査ログ保持: SOC 2 CC7 · HIPAA §164.312(b) · ISO A.8.15</text>

  <rect x="40" y="410" width="880" height="80" class="box"/>
  <text x="480" y="432" text-anchor="middle" class="head">参照プロファイル - OpenAI 2026</text>
  <text x="480" y="454" text-anchor="middle" class="step">SOC 2 Type 2 · ISO/IEC 27001:2022 · ISO/IEC 27701:2019 · GDPR · CCPA</text>
  <text x="480" y="474" text-anchor="middle" class="step">HIPAA (BAA) · FERPA · PCI-DSS (ChatGPT 決済)</text>
</svg>
