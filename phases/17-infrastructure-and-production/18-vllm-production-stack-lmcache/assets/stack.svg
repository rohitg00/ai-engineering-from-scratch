<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .router { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .engine { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .cache { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .disk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="24" text-anchor="middle" class="title">vLLM 本番スタック + LMCache - エンジン横断KV 再利用</text>

  <rect x="40" y="50" width="880" height="60" class="router"/>
  <text x="480" y="74" text-anchor="middle" class="head">ルータ (キャッシュ考慮)</text>
  <text x="480" y="94" text-anchor="middle" class="small">KVイベントをconsumeし、prefixをhashし、ローカルまたは共有hitのあるエンジンへroute</text>

  <rect x="40" y="130" width="200" height="100" class="engine"/>
  <text x="140" y="152" text-anchor="middle" class="step">vLLM エンジン 1</text>
  <text x="140" y="170" text-anchor="middle" class="small">H100 80GB</text>
  <text x="140" y="188" text-anchor="middle" class="small">Connector API v0.9+</text>
  <text x="140" y="206" text-anchor="middle" class="small">0.11.0 非同期オフロード</text>
  <rect x="260" y="130" width="200" height="100" class="engine"/>
  <text x="360" y="152" text-anchor="middle" class="step">vLLM エンジン 2</text>
  <text x="360" y="170" text-anchor="middle" class="small">H100 80GB</text>
  <rect x="480" y="130" width="200" height="100" class="engine"/>
  <text x="580" y="152" text-anchor="middle" class="step">vLLM エンジン 3</text>
  <text x="580" y="170" text-anchor="middle" class="small">H100 80GB</text>
  <rect x="700" y="130" width="200" height="100" class="engine"/>
  <text x="800" y="152" text-anchor="middle" class="step">vLLM エンジン 4</text>
  <text x="800" y="170" text-anchor="middle" class="small">H100 80GB</text>

  <rect x="40" y="260" width="880" height="100" class="cache"/>
  <text x="480" y="282" text-anchor="middle" class="head">LMCache - クラスタ共有 KV cache</text>
  <text x="480" y="306" text-anchor="middle" class="step">CPU DRAM tier (512 GB+ per socket)</text>
  <text x="480" y="324" text-anchor="middle" class="small">Connector API経由で非同期化; オフロードはユーザー向けではない</text>
  <text x="480" y="344" text-anchor="middle" class="small">効く対象: マルチテナント 共有プロンプト、RAGチャンク 再利用、共有baseのLoRA、preemption復旧</text>

  <rect x="40" y="380" width="880" height="80" class="disk"/>
  <text x="480" y="402" text-anchor="middle" class="head">永続層 - Ceph / S3 / ローカル NVMe</text>
  <text x="480" y="424" text-anchor="middle" class="step">DRAMから退避されたブロック用; 遅いが実質無限</text>
  <text x="480" y="444" text-anchor="middle" class="caption">16x H100 ベンチマーク: KV フットプリントがHBMを超える時に効き、超えない時は基準同等</text>
</svg>
