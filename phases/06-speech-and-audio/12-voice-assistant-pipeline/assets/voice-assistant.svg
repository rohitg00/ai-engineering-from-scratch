<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 10px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">音声アシスタントパイプライン — 7部品、1ターン</text>

  <rect x="20" y="55" width="100" height="90" class="box"/>
  <text x="70" y="78" text-anchor="middle" class="label">1. mic</text>
  <text x="70" y="96" text-anchor="middle" class="content">16 kHz mono</text>
  <text x="70" y="114" text-anchor="middle" class="content">20 ms chunks</text>

  <line x1="122" y1="100" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="142" y="55" width="100" height="90" class="hot"/>
  <text x="192" y="78" text-anchor="middle" class="label">2. VAD</text>
  <text x="192" y="96" text-anchor="middle" class="content">Silero</text>
  <text x="192" y="114" text-anchor="middle" class="content">+ 事前ロール</text>

  <line x1="244" y1="100" x2="262" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="264" y="55" width="100" height="90" class="box"/>
  <text x="314" y="78" text-anchor="middle" class="label">3. STT</text>
  <text x="314" y="96" text-anchor="middle" class="content">Whisper / Parakeet</text>
  <text x="314" y="114" text-anchor="middle" class="content">ストリーミング</text>

  <line x1="366" y1="100" x2="384" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="386" y="55" width="130" height="90" class="box"/>
  <text x="451" y="78" text-anchor="middle" class="label">4. LLM + tools</text>
  <text x="451" y="96" text-anchor="middle" class="content">GPT-4o / Claude</text>
  <text x="451" y="114" text-anchor="middle" class="content">stream + JSON tools</text>

  <line x1="518" y1="100" x2="536" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="538" y="55" width="110" height="90" class="hot"/>
  <text x="593" y="78" text-anchor="middle" class="label">5. TTS</text>
  <text x="593" y="96" text-anchor="middle" class="content">Kokoro / Cartesia</text>
  <text x="593" y="114" text-anchor="middle" class="content">token 20 から stream</text>

  <line x1="650" y1="100" x2="668" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="670" y="55" width="100" height="90" class="box"/>
  <text x="720" y="78" text-anchor="middle" class="label">6. スピーカー</text>
  <text x="720" y="96" text-anchor="middle" class="content">Opus出力</text>
  <text x="720" y="114" text-anchor="middle" class="content">PLC有効</text>

  <line x1="772" y1="100" x2="790" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="792" y="55" width="70" height="90" class="box"/>
  <text x="827" y="78" text-anchor="middle" class="label">7. ユーザー</text>
  <text x="827" y="114" text-anchor="middle" class="content">耳</text>

  <path d="M827,55 Q800,30 100,30 Q60,30 60,55" class="line" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,3" fill="none"/>
  <text x="440" y="24" text-anchor="middle" class="caption" fill="#c0392b">割り込み: ユーザーが話したらVADがTTS + LLMをキャンセルし、(2)から再開</text>

  <rect x="20" y="175" width="840" height="130" class="box"/>
  <text x="440" y="197" text-anchor="middle" class="label">必ず踏む 3 つの failure mode</text>
  <text x="50" y="225" class="content">1. 冒頭語欠け — VAD の発火が遅れ、ユーザーの"hey"が消える。200-400 ms 事前ロール を保持。</text>
  <text x="50" y="245" class="content">2. 割り込み混乱 — 割り込み後も LLM が生成を続ける。VAD → LLMキャンセル を配線。</text>
  <text x="50" y="265" class="content">3. 無音幻覚 — Whisper が無音 予熱 で "Thanks for watching" と言う。必ず VADゲート。</text>
  <text x="50" y="290" class="caption">本番では出荷前に全ターン + 段ごとのP50/P95/P99ヒストグラムをログする。</text>

  <rect x="20" y="315" width="840" height="155" class="hot"/>
  <text x="440" y="337" text-anchor="middle" class="label">2026年参照スタック (目標遅延 + ライセンスで選ぶ)</text>
  <text x="50" y="363" class="content">LiveKit + Deepgram + GPT-4o + Cartesia        350-500 ms   業界標準</text>
  <text x="50" y="381" class="content">Pipecat + Whisper-stream + GPT-4o + Kokoro    500-800 ms   DIYオープンソース</text>
  <text x="50" y="399" class="content">Moshi (全二重・単一モデル)              200-300 ms   異なるアーキテクチャ — lesson 15</text>
  <text x="50" y="417" class="content">Vapi / Retell (managed)                        300-500 ms   fastest to ship</text>
  <text x="50" y="435" class="content">whisper.cpp + llama.cpp + Kokoro-ONNX          offline      edge / privacy</text>
  <text x="50" y="460" class="caption">常時待機の消費者機器にはウェイクワードゲート (Porcupine) を追加。生音声は30日超保持しない。</text>
</svg>
