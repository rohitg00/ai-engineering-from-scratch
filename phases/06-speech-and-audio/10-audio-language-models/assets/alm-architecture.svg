<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">音声言語モデル — 3部品テンプレート (2026)</text>

  <rect x="30" y="55" width="180" height="100" class="box"/>
  <text x="120" y="78" text-anchor="middle" class="label">1. 音声エンコーダ</text>
  <text x="120" y="96" text-anchor="middle" class="content">Whisper / BEATs / CLAP</text>
  <text x="120" y="114" text-anchor="middle" class="content">→ (T, d_audio)</text>
  <text x="120" y="138" text-anchor="middle" class="caption">第1段では凍結</text>

  <line x1="212" y1="105" x2="233" y2="105" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="235" y="55" width="180" height="100" class="hot"/>
  <text x="325" y="78" text-anchor="middle" class="label">2. projector</text>
  <text x="325" y="96" text-anchor="middle" class="content">1-3 linear layers</text>
  <text x="325" y="114" text-anchor="middle" class="content">d_audio → d_llm</text>
  <text x="325" y="138" text-anchor="middle" class="caption">最初に学習</text>

  <line x1="417" y1="105" x2="438" y2="105" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="440" y="55" width="180" height="100" class="box"/>
  <text x="530" y="78" text-anchor="middle" class="label">3. LLMデコーダ</text>
  <text x="530" y="96" text-anchor="middle" class="content">Llama / Qwen / Gemma</text>
  <text x="530" y="114" text-anchor="middle" class="content">テキスト + 音声トークン</text>
  <text x="530" y="138" text-anchor="middle" class="caption">第2段でLoRA微調整</text>

  <line x1="622" y1="105" x2="643" y2="105" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="645" y="55" width="200" height="100" class="box"/>
  <text x="745" y="78" text-anchor="middle" class="label">4. テキストまたは音声</text>
  <text x="745" y="96" text-anchor="middle" class="content">Qwen2.5-Omni: both</text>
  <text x="745" y="114" text-anchor="middle" class="content">GPT-4o Audio: 両方</text>
  <text x="745" y="138" text-anchor="middle" class="caption">音声デコーダは任意</text>

  <rect x="30" y="175" width="815" height="100" class="box"/>
  <text x="437" y="195" text-anchor="middle" class="label">学習レシピ</text>
  <text x="60" y="220" class="content">第1段 · エンコーダ + LLMを凍結。ASR/キャプション対で投影器を学習</text>
  <text x="60" y="238" class="content">第2段 · エンコーダ + LLMにLoRA。音声QA/指示追従データ</text>
  <text x="60" y="256" class="content">第3段 · (任意) 音声入出力用の音声デコーダを追加</text>

  <rect x="30" y="295" width="815" height="130" class="hot"/>
  <text x="437" y="315" text-anchor="middle" class="label">MMAU-Pro 2026 — 複数音声以外ではオープン重みが追いついた</text>
  <text x="60" y="342" class="content">Gemini 2.5 Pro     ~60% 全体   73.4% 音声   51.9% 音   64.9% 音楽   ~22% 複数</text>
  <text x="60" y="360" class="content">GPT-4o Audio       52.5%           —              —             —             26.5% 複数</text>
  <text x="60" y="378" class="content">Qwen2.5-Omni-7B    52.2%           57.4% 音声   47.6% 音   61.5% 音楽   ~20% 複数</text>
  <text x="60" y="396" class="content">Audio Flamingo 3  ~54%             — (音楽特化、AF-CLAP経由)</text>
  <text x="60" y="414" class="caption">4択のランダム確率 = 25% — 複数音声は全モデルで本当に壊れている</text>
</svg>
