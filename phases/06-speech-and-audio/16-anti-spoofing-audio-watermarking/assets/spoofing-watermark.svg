<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">3つの防御層 — 検出 + 透かし + 来歴</text>

  <rect x="20" y="55" width="270" height="170" class="box"/>
  <text x="155" y="78" text-anchor="middle" class="label">A. なりすまし検出</text>
  <text x="155" y="96" text-anchor="middle" class="tag">ASVspoof 5 · AASIST · RawNet2</text>
  <text x="35" y="124" class="content">入力音声  →  分類器</text>
  <text x="35" y="142" class="content">出力: "実音声" または "合成"</text>
  <text x="35" y="162" class="content">EER 0.42%（ASVspoof 2019 LA）</text>
  <text x="35" y="180" class="content">EER 7.23%（ASVspoof 5・実環境）</text>
  <text x="35" y="208" class="caption">非協力的な攻撃者に対応</text>

  <rect x="305" y="55" width="270" height="170" class="hot"/>
  <text x="440" y="78" text-anchor="middle" class="label">B. 音声透かし</text>
  <text x="440" y="96" text-anchor="middle" class="tag">AudioSeal · WaveVerify</text>
  <text x="320" y="124" class="content">生成器が信号を埋め込む</text>
  <text x="320" y="142" class="content">検出器がペイロードを抽出</text>
  <text x="320" y="162" class="content">クリップごとに16-bitペイロード</text>
  <text x="320" y="180" class="content">MP3・EQ・ノイズに耐える</text>
  <text x="320" y="208" class="caption">攻撃前ビット精度 &gt; 99%</text>

  <rect x="590" y="55" width="270" height="170" class="box"/>
  <text x="725" y="78" text-anchor="middle" class="label">C. 来歴マニフェスト</text>
  <text x="725" y="96" text-anchor="middle" class="tag">C2PA · CAI</text>
  <text x="605" y="124" class="content">署名付きJSONマニフェスト</text>
  <text x="605" y="142" class="content">作成者 · ツール · タイムスタンプ</text>
  <text x="605" y="162" class="content">暗号ハッシュ</text>
  <text x="605" y="180" class="content">別経路で検証可能</text>
  <text x="605" y="208" class="caption">再エンコードで回避可 → 透かしと併用</text>

  <rect x="20" y="245" width="840" height="95" class="box"/>
  <text x="440" y="267" text-anchor="middle" class="label">各防御の弱点 — 3つすべてが必要な理由</text>
  <text x="40" y="294" class="content">検出:      OODで劣化; 学習時の生成器に過適合しやすい</text>
  <text x="40" y="312" class="content">透かし:    ピッチ変更で2026年透かしは壊れる (ビット精度 &lt; 60%)</text>
  <text x="40" y="330" class="content">来歴:      再エンコードで簡単に剥がせる → 単独では不十分</text>

  <rect x="20" y="350" width="840" height="105" class="hot"/>
  <text x="440" y="372" text-anchor="middle" class="label">2026年音声生成デプロイの本番チェックリスト</text>
  <text x="40" y="398" class="content">1. すべての生成にAudioSealを埋め込む (検出器はCIに同梱)</text>
  <text x="40" y="416" class="content">2. モデルID + ユーザーID + タイムスタンプつきマニフェストをC2PA署名</text>
  <text x="40" y="434" class="content">3. 着信通話音声にAASIST / RawNet2検出器を実行 (詐欺, リプレイ)</text>
  <text x="40" y="452" class="content">4. 監査ログ + 30日保持 + 同意記録 + レート制限 + 緊急停止</text>
</svg>
