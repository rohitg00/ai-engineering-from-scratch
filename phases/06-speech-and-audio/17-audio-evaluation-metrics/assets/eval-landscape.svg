<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">音声評価 — タスクごとに指標、指標ごとにリーダーボード</text>

  <rect x="20" y="50" width="200" height="200" class="box"/>
  <text x="120" y="72" text-anchor="middle" class="label">ASR</text>
  <text x="30" y="96" class="content">主要:  WER (正規化)</text>
  <text x="30" y="114" class="content">       声調言語は CER</text>
  <text x="30" y="132" class="content">速度:  RTFx</text>
  <text x="30" y="150" class="content">遅延:  初回トークン ms</text>
  <text x="30" y="174" class="tag">Open ASRリーダーボード</text>
  <text x="30" y="192" class="caption">Parakeet 6.05% 平均WER</text>
  <text x="30" y="210" class="caption">Whisper-v3-turbo 1.58% LS</text>
  <text x="30" y="228" class="caption">Canary-Qwen 5.63% 平均</text>

  <rect x="235" y="50" width="200" height="200" class="hot"/>
  <text x="335" y="72" text-anchor="middle" class="label">TTS</text>
  <text x="245" y="96" class="content">主要:  MOS / UTMOS</text>
  <text x="245" y="114" class="content">       SECS (複製)</text>
  <text x="245" y="132" class="content">往復:  出力上のASR-WER</text>
  <text x="245" y="150" class="content">遅延:  TTFA ms</text>
  <text x="245" y="174" class="tag">TTS Arena · Artificial Analysis</text>
  <text x="245" y="192" class="caption">Inworld TTS-1.5 ELO 1236</text>
  <text x="245" y="210" class="caption">Kokoro-82M ELO 1059</text>
  <text x="245" y="228" class="caption">ElevenLabs v3 ELO 1179</text>

  <rect x="450" y="50" width="200" height="200" class="box"/>
  <text x="550" y="72" text-anchor="middle" class="label">話者 + ダイアリゼーション</text>
  <text x="460" y="96" class="content">主要:  EER</text>
  <text x="460" y="114" class="content">          minDCF</text>
  <text x="460" y="132" class="content">分離:  DER / JER</text>
  <text x="460" y="150" class="content">重複:  区間別F1</text>
  <text x="460" y="174" class="tag">VoxCeleb1-O / VoxSRC</text>
  <text x="460" y="192" class="caption">ECAPA 0.87% EER</text>
  <text x="460" y="210" class="caption">3D-Speaker 0.50% EER</text>
  <text x="460" y="228" class="caption">pyannote Precision-2 &lt; 0.40%</text>

  <rect x="665" y="50" width="195" height="200" class="box"/>
  <text x="762" y="72" text-anchor="middle" class="label">音声分類</text>
  <text x="675" y="96" class="content">単一: top-1, top-5</text>
  <text x="675" y="114" class="content">複数: mAP</text>
  <text x="675" y="132" class="content">不均衡: macro F1</text>
  <text x="675" y="150" class="content">        クラス別再現率</text>
  <text x="675" y="174" class="tag">HEAR · AudioSet · ESC-50</text>
  <text x="675" y="192" class="caption">BEATs-iter3 AudioSet 0.548</text>
  <text x="675" y="210" class="caption">Audio-MAE Speech Cmd 99.0%</text>
  <text x="675" y="228" class="caption">BEATs ESC-50 97.0%</text>

  <rect x="20" y="265" width="410" height="220" class="box"/>
  <text x="225" y="287" text-anchor="middle" class="label">音楽生成</text>
  <text x="30" y="313" class="content">主要: FAD (Fréchet Audio Distance)</text>
  <text x="30" y="331" class="content">      CLAP (テキスト音声整合)</text>
  <text x="30" y="349" class="content">消費者: ブラインドMOS / ELO</text>
  <text x="30" y="375" class="tag">Suno v5 ELO 1293 (品質首位)</text>
  <text x="30" y="395" class="caption">Udio v4 — 制作用ツール + ステム</text>
  <text x="30" y="413" class="caption">MusicGen-large on MusicCaps ~4.5 FAD</text>
  <text x="30" y="441" class="content">FAD は常に人手MOSパネルと併用</text>
  <text x="30" y="459" class="content">オープン: ACE-Step XL / YuE / Stable Audio Open</text>

  <rect x="450" y="265" width="410" height="220" class="hot"/>
  <text x="655" y="287" text-anchor="middle" class="label">音声言語 + ストリーミング</text>
  <text x="460" y="313" class="content">LALM推論: MMAU-Pro (1800 Q)</text>
  <text x="460" y="331" class="content">長時間音声: LongAudioBench</text>
  <text x="460" y="349" class="content">キャプション: FENSE / SPICE / CIDEr</text>
  <text x="460" y="375" class="tag">Gemini 2.5 Pro ~60% MMAU-Pro 全体</text>
  <text x="460" y="395" class="caption">GPT-4o Audio 52.5% — Qwen2.5-Omni 52.2%</text>
  <text x="460" y="413" class="caption">複数音声サブセット: 全モデル~22% (ランダム近辺)</text>
  <text x="460" y="441" class="content">ストリーミングS2S: 遅延 P50/P95 + WER</text>
  <text x="460" y="459" class="content">Moshi 200 ms L4 · GPT-4o Realtime ~300 ms</text>
</svg>
