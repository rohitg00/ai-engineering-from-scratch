<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">ニューラル音声コーデック — RVQの4変種と意味/音響分離</text>

  <rect x="20" y="55" width="200" height="150" class="box"/>
  <text x="120" y="78" text-anchor="middle" class="label">EnCodec (Meta, 2022)</text>
  <text x="120" y="96" text-anchor="middle" class="tag">音響RVQベースライン</text>
  <text x="30" y="120" class="content">wav  →  conv+transformer+conv</text>
  <text x="30" y="138" class="content"> →  RVQ (4-32コードブック)</text>
  <text x="30" y="156" class="content"> →  デコーダ  →  wav</text>
  <text x="30" y="178" class="caption">75 Hz · 24 kHz · MusicGen で使用</text>
  <text x="30" y="196" class="caption">PESQ 3.2 @ 6 kbps</text>

  <rect x="235" y="55" width="200" height="150" class="box"/>
  <text x="335" y="78" text-anchor="middle" class="label">DAC (Descript, 2023)</text>
  <text x="335" y="96" text-anchor="middle" class="tag">再構成品質重視</text>
  <text x="245" y="120" class="content">EnCodec +</text>
  <text x="245" y="138" class="content"> L2正規化コードブック</text>
  <text x="245" y="156" class="content"> periodic activations</text>
  <text x="245" y="174" class="content"> improved losses</text>
  <text x="245" y="196" class="caption">44.1 kHz full-band · PESQ 3.5 @ 6 kbps</text>

  <rect x="450" y="55" width="200" height="150" class="box"/>
  <text x="550" y="78" text-anchor="middle" class="label">SNAC (Siuzdak 2024)</text>
  <text x="550" y="96" text-anchor="middle" class="tag">複数-scale RVQ</text>
  <text x="460" y="120" class="content">coarse code @ 12 Hz</text>
  <text x="460" y="138" class="content">medium @ 25 Hz</text>
  <text x="460" y="156" class="content">fine @ 50 Hz</text>
  <text x="460" y="178" class="caption">階層型 → AR-LM と相性がよい</text>
  <text x="460" y="196" class="caption">Orpheus-3B で使用</text>

  <rect x="665" y="55" width="200" height="150" class="hot"/>
  <text x="765" y="78" text-anchor="middle" class="label">Mimi (Kyutai 2024)</text>
  <text x="765" y="96" text-anchor="middle" class="tag">意味 + 音響分離</text>
  <text x="675" y="120" class="content">コードブック0 — WavLM蒸留</text>
  <text x="675" y="138" class="content">            (意味)</text>
  <text x="675" y="156" class="content">コードブック1-7 — 音響</text>
  <text x="675" y="178" class="caption">12.5 Hz · 4.4 kbps · Moshi の基盤</text>
  <text x="675" y="196" class="caption">Sesame CSM で使用</text>

  <rect x="20" y="225" width="845" height="100" class="box"/>
  <text x="440" y="247" text-anchor="middle" class="label">音声上の言語モデリングで重要な理由</text>
  <text x="50" y="274" class="content">10秒音声 × 12.5 Hz × 8コードブック = 1000トークン → Transformer文脈に収まる</text>
  <text x="50" y="294" class="content">分解: LMはまず意味コードブック0 (テキスト整合)、次に音響コードブック1-7を予測</text>
  <text x="50" y="314" class="content">結果: ゼロショット声質複製 (意味 = 内容, 音響 = 参照条件)</text>

  <rect x="20" y="335" width="845" height="115" class="hot"/>
  <text x="440" y="356" text-anchor="middle" class="label">問題に合わせて選ぶ</text>
  <text x="50" y="382" class="content">音楽生成          →  EnCodec-24k   · MusicGen, AudioLDM</text>
  <text x="50" y="400" class="content">最高忠実度        →  DAC-44.1k     · 音声復元、編集</text>
  <text x="50" y="418" class="content">音声 上の AR LM     →  SNAC or Mimi  · TTS, codec LM</text>
  <text x="50" y="436" class="content">全二重ストリーミング →  Mimiのみ     · Moshi, Sesame CSM</text>
</svg>
