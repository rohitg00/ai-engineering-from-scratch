<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="28" text-anchor="middle" class="title">分解 → 話者を差し替え → 再合成 (透かし付き)</text>

  <rect x="40" y="60" width="180" height="70" class="box"/>
  <text x="130" y="82" text-anchor="middle" class="label">対象参照（5秒）</text>
  <text x="130" y="105" text-anchor="middle" class="content">alice_5s.wav</text>
  <text x="130" y="121" text-anchor="middle" class="caption">ドライ、近接マイク、単一話者</text>

  <line x1="225" y1="95" x2="248" y2="95" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="252" y="60" width="180" height="70" class="hot"/>
  <text x="342" y="82" text-anchor="middle" class="label">話者エンコーダ</text>
  <text x="342" y="105" text-anchor="middle" class="content">ECAPA / WavLM-SV</text>
  <text x="342" y="121" text-anchor="middle" class="caption">192-d embedding</text>

  <line x1="437" y1="95" x2="460" y2="95" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="464" y="60" width="180" height="70" class="box"/>
  <text x="554" y="82" text-anchor="middle" class="label">音声複製TTS</text>
  <text x="554" y="105" text-anchor="middle" class="content">F5 / XTTS / VALL-E 2</text>
  <text x="554" y="121" text-anchor="middle" class="caption">テキスト + スピーカー_emb → mel</text>

  <line x1="649" y1="95" x2="672" y2="95" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="676" y="60" width="170" height="70" class="hot"/>
  <text x="761" y="82" text-anchor="middle" class="label">透かし</text>
  <text x="761" y="105" text-anchor="middle" class="content">SilentCipher</text>
  <text x="761" y="121" text-anchor="middle" class="caption">約 32 bits、不可聴</text>

  <rect x="252" y="155" width="180" height="40" class="box"/>
  <text x="342" y="180" text-anchor="middle" class="content">テキスト: "牛乳をリストへ追加"</text>
  <line x1="342" y1="155" x2="342" y2="135" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="230" width="180" height="70" class="box"/>
  <text x="130" y="252" text-anchor="middle" class="label">元音声</text>
  <text x="130" y="275" text-anchor="middle" class="content">bob が "turn off" と言う</text>
  <text x="130" y="291" text-anchor="middle" class="caption">任意話者、任意テキスト</text>

  <line x1="225" y1="265" x2="248" y2="265" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="252" y="230" width="180" height="70" class="hot"/>
  <text x="342" y="252" text-anchor="middle" class="label">内容抽出</text>
  <text x="342" y="275" text-anchor="middle" class="content">ASR PPG / WavLMフレーム</text>
  <text x="342" y="291" text-anchor="middle" class="caption">話者不変の表現</text>

  <line x1="437" y1="265" x2="460" y2="265" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="464" y="230" width="180" height="70" class="box"/>
  <text x="554" y="252" text-anchor="middle" class="label">再合成器</text>
  <text x="554" y="275" text-anchor="middle" class="content">KNN-VC / Diff-HierVC</text>
  <text x="554" y="291" text-anchor="middle" class="caption">content + alice_emb → wav</text>

  <line x1="649" y1="265" x2="672" y2="265" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="676" y="230" width="170" height="70" class="hot"/>
  <text x="761" y="252" text-anchor="middle" class="label">出力</text>
  <text x="761" y="275" text-anchor="middle" class="content">alice が "turn off" と言う</text>
  <text x="761" y="291" text-anchor="middle" class="caption">content は保持</text>

  <rect x="40" y="330" width="800" height="130" class="hot"/>
  <text x="440" y="354" text-anchor="middle" class="label">legal and ethical stack (2026年は必須)</text>
  <text x="60"  y="382" class="content">同意ゲート</text>    <text x="230" y="382" class="caption">推論前に署名記録 + 話者ハッシュ照合</text>
  <text x="60"  y="402" class="content">透かし</text>       <text x="230" y="402" class="caption">SilentCipher or PerTh; 約 32-bit payload、MP3 robust</text>
  <text x="60"  y="422" class="content">検出器ペア</text>   <text x="230" y="422" class="caption">AASIST / RawNet2 — 生成器と一緒に出荷</text>
  <text x="60"  y="442" class="content">監査ログ</text>       <text x="230" y="442" class="caption">全合成リクエストの改ざん検知記録</text>
</svg>
