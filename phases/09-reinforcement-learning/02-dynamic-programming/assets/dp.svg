<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">2つのDPアルゴリズム、1つの固定点</text>

  <rect x="40" y="60" width="380" height="370" class="box"/>
  <text x="230" y="85" text-anchor="middle" class="label">方策反復</text>
  <text x="230" y="102" text-anchor="middle" class="caption">(評価、改善)の外側ループ</text>

  <rect x="70" y="125" width="320" height="50" class="hot"/>
  <text x="230" y="146" text-anchor="middle" class="content">1. 評価: 収束までV^pi</text>
  <text x="230" y="162" text-anchor="middle" class="content">V(s) &lt;- sum pi(a) sum P (r + g V(s'))</text>

  <line x1="230" y1="180" x2="230" y2="198" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="203" width="320" height="50" class="hot"/>
  <text x="230" y="224" text-anchor="middle" class="content">2. 改善: pi(s) &lt;- argmax_a Q(s,a)</text>
  <text x="230" y="240" text-anchor="middle" class="content">現在のVに対してgreedy</text>

  <line x1="230" y1="258" x2="230" y2="278" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="70" y="283" width="320" height="40" class="box"/>
  <text x="230" y="308" text-anchor="middle" class="content">3. piが変わらなければ停止</text>

  <text x="230" y="355" text-anchor="middle" class="caption">外側反復は少ない (5-20)</text>
  <text x="230" y="375" text-anchor="middle" class="caption">内側評価は高コスト</text>
  <text x="230" y="400" text-anchor="middle" class="caption">保証: Vは単調改善</text>

  <rect x="480" y="60" width="380" height="370" class="box"/>
  <text x="670" y="85" text-anchor="middle" class="label">価値反復</text>
  <text x="670" y="102" text-anchor="middle" class="caption">1つのループ、Bellman最適性backup</text>

  <rect x="510" y="125" width="320" height="60" class="hot"/>
  <text x="670" y="148" text-anchor="middle" class="content">V(s) &lt;- max_a sum P (r + g V(s'))</text>
  <text x="670" y="168" text-anchor="middle" class="content">各sweepで全状態に適用</text>

  <line x1="670" y1="192" x2="670" y2="212" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="217" width="320" height="50" class="hot"/>
  <text x="670" y="238" text-anchor="middle" class="content">max_s |dV(s)| &lt; epsで停止</text>
  <text x="670" y="254" text-anchor="middle" class="content">sup-normで係数gの縮小写像</text>

  <line x1="670" y1="272" x2="670" y2="292" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="297" width="320" height="40" class="box"/>
  <text x="670" y="322" text-anchor="middle" class="content">V*からgreedy piを抽出</text>

  <text x="670" y="355" text-anchor="middle" class="caption">sweepは多め (しばしば100+)</text>
  <text x="670" y="375" text-anchor="middle" class="caption">各sweepはO(|S| * |A|)</text>
  <text x="670" y="400" text-anchor="middle" class="caption">convergence: ||T V - V*|| &lt;= g^k ||V_0 - V*||</text>

  <text x="450" y="450" text-anchor="middle" class="caption">どちらもV*へ到達 — 経路は違っても固定点は同じ (generalized policy iteration)</text>
</svg>
