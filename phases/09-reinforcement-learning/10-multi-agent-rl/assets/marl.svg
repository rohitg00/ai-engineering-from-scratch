<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e8f1fb; stroke: #2471a3; stroke-width: 1.5; }
      .label { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 12px; fill: #333; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">4つのMARL体制、同じ環境形状</text>

  <rect x="40" y="60" width="200" height="170" class="box"/>
  <text x="140" y="88" text-anchor="middle" class="label">independent PPO / Q</text>
  <text x="60" y="115" class="content">各agentが自分の</text>
  <text x="60" y="135" class="content">policyとcriticを持つ</text>
  <text x="60" y="160" class="content">他者をenvとして扱う</text>
  <text x="140" y="195" text-anchor="middle" class="caption">単純、協調信号なし</text>
  <text x="140" y="215" text-anchor="middle" class="caption">密結合で失敗</text>

  <rect x="260" y="60" width="200" height="170" class="hot"/>
  <text x="360" y="88" text-anchor="middle" class="label">CTDE (MAPPO/QMIX)</text>
  <text x="280" y="115" class="content">分散actor:</text>
  <text x="280" y="133" class="content">  pi_i(a_i | o_i)</text>
  <text x="280" y="158" class="content">集中critic:</text>
  <text x="280" y="176" class="content">  Q(s, a_1, .., a_n)</text>
  <text x="360" y="210" text-anchor="middle" class="caption">2026年の協調default</text>

  <rect x="480" y="60" width="200" height="170" class="cool"/>
  <text x="580" y="88" text-anchor="middle" class="label">self-play</text>
  <text x="500" y="115" class="content">単一agent、2つの役割</text>
  <text x="500" y="135" class="content">相手 = 過去snapshot</text>
  <text x="500" y="160" class="content">対称gradient</text>
  <text x="580" y="195" text-anchor="middle" class="caption">zero-sum games</text>
  <text x="580" y="215" text-anchor="middle" class="caption">AlphaGo / AlphaZero</text>

  <rect x="700" y="60" width="160" height="170" class="box"/>
  <text x="780" y="88" text-anchor="middle" class="label">league play</text>
  <text x="715" y="115" class="content">過去 + 現在</text>
  <text x="715" y="133" class="content">policyの</text>
  <text x="715" y="153" class="content">populationから</text>
  <text x="715" y="171" class="content">相手をsample</text>
  <text x="780" y="210" text-anchor="middle" class="caption">AlphaStar</text>

  <rect x="40" y="260" width="820" height="150" class="box"/>
  <text x="450" y="285" text-anchor="middle" class="label">中核の難しさ</text>
  <text x="60" y="315" class="content">agent iから見ると、環境にpi_{-i}が含まれる</text>
  <text x="60" y="335" class="content">pi_{-i}が学習すると、遷移P(s' | s, a_i)は非定常になる</text>
  <text x="60" y="355" class="content">Markov性が壊れ、tabular収束証明は使えない</text>
  <text x="60" y="378" class="caption">CTDEはcriticを全joint actionで条件付け、self-playは構造で補う</text>

  <text x="450" y="445" text-anchor="middle" class="caption">communication、language、MCTSを足すとStarCraft II / Dota 2 / multi-agent LLM systemsになる</text>
</svg>
