<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">AlphaEvolve — 生成器、評価器、アーカイブ</text>

  <rect x="40" y="50" width="800" height="420" class="box"/>

  <!-- Generator box -->
  <rect x="80" y="100" width="220" height="120" class="cool"/>
  <text x="190" y="124" text-anchor="middle" class="label">LLM 生成器</text>
  <text x="190" y="146" text-anchor="middle" class="content">Gemini Flash (多数)</text>
  <text x="190" y="162" text-anchor="middle" class="content">Gemini Pro (難例)</text>
  <text x="190" y="184" text-anchor="middle" class="small">プロンプト = 親 +</text>
  <text x="190" y="200" text-anchor="middle" class="small">上位変種 + タスク + 評価信号</text>

  <!-- Archive box (MAP-elites) -->
  <rect x="330" y="100" width="220" height="260" class="cold"/>
  <text x="440" y="124" text-anchor="middle" class="label">プログラムアーカイブ</text>
  <text x="440" y="142" text-anchor="middle" class="small">MAP-elites グリッド / 島</text>

  <!-- Archive cells grid illustration -->
  <g stroke="#2c5ea9" stroke-width="1" fill="#ffffff">
    <rect x="345" y="158" width="60" height="44"/>
    <rect x="405" y="158" width="60" height="44"/>
    <rect x="465" y="158" width="60" height="44"/>
    <rect x="345" y="202" width="60" height="44"/>
    <rect x="405" y="202" width="60" height="44"/>
    <rect x="465" y="202" width="60" height="44"/>
    <rect x="345" y="246" width="60" height="44"/>
    <rect x="405" y="246" width="60" height="44"/>
    <rect x="465" y="246" width="60" height="44"/>
  </g>
  <g class="small">
    <text x="375" y="182" text-anchor="middle">92.1</text>
    <text x="435" y="182" text-anchor="middle">89.3</text>
    <text x="495" y="182" text-anchor="middle">94.0</text>
    <text x="375" y="226" text-anchor="middle">85.8</text>
    <text x="435" y="226" text-anchor="middle">91.7</text>
    <text x="495" y="226" text-anchor="middle">88.4</text>
    <text x="375" y="270" text-anchor="middle">78.6</text>
    <text x="435" y="270" text-anchor="middle">82.2</text>
    <text x="495" y="270" text-anchor="middle">87.0</text>
  </g>
  <text x="440" y="312" text-anchor="middle" class="small">セルキー = 特徴記述子</text>
  <text x="440" y="326" text-anchor="middle" class="small">(深さ, 複雑度, フットプリント, ...)</text>
  <text x="440" y="342" text-anchor="middle" class="small">各セルが最良を保持</text>

  <!-- Evaluator box -->
  <rect x="580" y="100" width="220" height="120" class="hot"/>
  <text x="690" y="124" text-anchor="middle" class="label">評価器</text>
  <text x="690" y="146" text-anchor="middle" class="content">正しさ + ベンチマーク</text>
  <text x="690" y="164" text-anchor="middle" class="content">決定的で高速</text>
  <text x="690" y="186" text-anchor="middle" class="small">評価時にホールドアウト</text>
  <text x="690" y="202" text-anchor="middle" class="small">入力を生成</text>

  <!-- Arrows -->
  <path d="M300 160 L330 160" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="152" class="small">変種</text>
  <path d="M550 180 L580 180" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="172" class="small">変種</text>
  <path d="M690 220 Q 690 280 550 280" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="620" y="248" class="small">スコア</text>
  <path d="M345 160 Q 220 100 190 100" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="260" y="82" class="small">親サンプル</text>

  <!-- Wins box -->
  <rect x="80" y="370" width="720" height="84" class="box"/>
  <text x="100" y="392" class="label">実証された成果 (DeepMind, 2025年6月)</text>
  <text x="100" y="412" class="content">- 4x4複素行列積を48乗算 (Strassen 1969の上限49)</text>
  <text x="100" y="428" class="content">- Google Borgスケジューリングヒューリスティック、本番で約0.7%計算回収</text>
  <text x="100" y="444" class="content">- FlashAttentionカーネル32.5%高速化 · Gemini訓練スループット向上</text>

  <text x="440" y="496" text-anchor="middle" class="caption">報酬ハックを抑えるのは評価器の厳密さだけ。評価器が弱点でない領域を選ぶ。</text>
</svg>
