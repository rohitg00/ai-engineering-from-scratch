<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .warn { fill: #fde0b4; stroke: #b5651d; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">チェックポイントのライフサイクル: 冪等性 + 前提条件 + 検証 + ロールバック</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Approved action -->
  <rect x="60" y="80" width="160" height="60" class="cool"/>
  <text x="140" y="104" text-anchor="middle" class="label">承認済みアクション</text>
  <text x="140" y="122" text-anchor="middle" class="small">冪等性キー k</text>

  <!-- Preconditions -->
  <rect x="240" y="80" width="160" height="60" class="cold"/>
  <text x="320" y="104" text-anchor="middle" class="label">前提条件チェック</text>
  <text x="320" y="122" text-anchor="middle" class="small">状態はまだ一貫?</text>

  <!-- Mark-as-done-first -->
  <rect x="420" y="80" width="180" height="60" class="warn"/>
  <text x="510" y="104" text-anchor="middle" class="label">先に完了マーク</text>
  <text x="510" y="122" text-anchor="middle" class="small">実行前に committed を永続化</text>

  <!-- Execute -->
  <rect x="620" y="80" width="180" height="60" class="hot"/>
  <text x="710" y="104" text-anchor="middle" class="label">副作用を実行</text>
  <text x="710" y="122" text-anchor="middle" class="small">ツール呼び出し / DB書込 / 送信</text>

  <path d="M220 110 L240 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M400 110 L420 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600 110 L620 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Verify -->
  <rect x="60" y="180" width="160" height="60" class="cool"/>
  <text x="140" y="204" text-anchor="middle" class="label">実行後検証</text>
  <text x="140" y="222" text-anchor="middle" class="small">対象リソースを再読込</text>

  <rect x="240" y="180" width="160" height="60" class="cool"/>
  <text x="320" y="204" text-anchor="middle" class="label">検証成功</text>
  <text x="320" y="222" text-anchor="middle" class="small">完了</text>

  <rect x="420" y="180" width="180" height="60" class="hot"/>
  <text x="510" y="204" text-anchor="middle" class="label">検証失敗</text>
  <text x="510" y="222" text-anchor="middle" class="small">既知の悪い状態を検出</text>

  <rect x="620" y="180" width="180" height="60" class="hot"/>
  <text x="710" y="204" text-anchor="middle" class="label">ロールバック発火</text>
  <text x="710" y="222" text-anchor="middle" class="small">in-band / 補償 / 警告</text>

  <path d="M220 210 L240 210" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600 210 L620 210" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Double-execute hazard -->
  <rect x="60" y="270" width="760" height="100" class="hot"/>
  <text x="440" y="294" text-anchor="middle" class="label">鋭い失敗: クラッシュ後リトライで二重実行</text>
  <text x="80" y="316" class="content">1. commit開始 · 2. 実行成功 · 3. committed永続化前にクラッシュ</text>
  <text x="80" y="332" class="content">4. 再開時に「承認済み未コミット」と見る · 5. 再実行 · 6. 副作用が2回発火</text>
  <text x="80" y="352" class="content">緩和: 実行前に committed を永続化する（mark-as-done-firstパターン）</text>

  <!-- Article 14 -->
  <rect x="60" y="400" width="760" height="90" class="cold"/>
  <text x="440" y="424" text-anchor="middle" class="label">EU AI Act Article 14 — 運用上の読み方</text>
  <text x="80" y="446" class="content">チェックポイントは照会可能（ログだけでなく監査者アクセス）</text>
  <text x="80" y="462" class="content">ロールバックは訓練済み（文書上の意図ではなくE2Eテスト）</text>
  <text x="80" y="478" class="content">監査証跡はデプロイを越えて残る（PostgreSQL/Durable Objects、メモリ不可）</text>
</svg>
