<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">STaR ループ：近道推論が紛れ込む</text>

  <!-- Left: the loop -->
  <rect x="40" y="56" width="380" height="480" class="box"/>
  <text x="230" y="80" text-anchor="middle" class="label">STaR ループ</text>

  <rect x="60" y="100" width="340" height="56" class="cool"/>
  <text x="230" y="124" text-anchor="middle" class="content">1. (根拠, 答え) をサンプル</text>
  <text x="230" y="140" text-anchor="middle" class="small">ベースモデル, T &gt; 0</text>

  <path d="M230 160 L230 180" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="186" width="340" height="56" class="hot"/>
  <text x="230" y="210" text-anchor="middle" class="content">2. answer == label だけ保持</text>
  <text x="230" y="226" text-anchor="middle" class="small">誤った根拠は丸ごと破棄</text>

  <path d="M230 246 L230 266" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="272" width="340" height="56" class="cool"/>
  <text x="230" y="296" text-anchor="middle" class="content">3. 保持した根拠でSFT</text>
  <text x="230" y="312" text-anchor="middle" class="small">教師強制: (問題, 根拠, 答え)</text>

  <path d="M230 332 L230 352" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="358" width="340" height="56" class="cold"/>
  <text x="230" y="382" text-anchor="middle" class="content">4. 失敗を後付け説明</text>
  <text x="230" y="398" text-anchor="middle" class="small">答えを注入し根拠を再質問</text>

  <path d="M60 386 Q 20 386 20 140 Q 20 100 60 128" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="28" y="260" class="small">反復</text>

  <rect x="60" y="438" width="340" height="80" class="box"/>
  <text x="230" y="458" text-anchor="middle" class="label">ループが強化するもの</text>
  <text x="230" y="478" text-anchor="middle" class="content">正しい根拠・正しい答え</text>
  <text x="230" y="494" text-anchor="middle" class="content">近道の根拠・正しい答え</text>
  <text x="230" y="510" text-anchor="middle" class="small">両方保持。フィルタは区別不能。</text>

  <!-- Right: three variants -->
  <rect x="450" y="56" width="410" height="480" class="box"/>
  <text x="655" y="80" text-anchor="middle" class="label">3つの系譜、3つの信号</text>

  <rect x="470" y="100" width="372" height="106" class="cool"/>
  <text x="480" y="122" class="label">STaR (Zelikman 2022)</text>
  <text x="480" y="142" class="content">生成器に「正解なら保持」フィルタ。</text>
  <text x="480" y="158" class="content">SFTを反復。</text>
  <text x="480" y="174" class="content">GPT-J + STaR ≈ 30倍大の微調整モデル</text>
  <text x="480" y="190" class="content">GSM8K上（新規人手ラベルなし）。</text>

  <rect x="470" y="212" width="372" height="110" class="cold"/>
  <text x="480" y="234" class="label">V-STaR (Hosseini 2024)</text>
  <text x="480" y="254" class="content">正解と不正解の根拠で</text>
  <text x="480" y="270" class="content">検証器をDPO訓練（STaRの廃棄分）。</text>
  <text x="480" y="286" class="content">推論: N件サンプルし検証器トップを選ぶ。</text>
  <text x="480" y="302" class="content">従来の自己改善比 +4〜+17 pp。</text>

  <rect x="470" y="328" width="372" height="110" class="hot"/>
  <text x="480" y="350" class="label">Quiet-STaR (Zelikman 2024)</text>
  <text x="480" y="370" class="content">トークンごとの内部根拠。</text>
  <text x="480" y="386" class="content">思考終端トークン + 混合ヘッド。</text>
  <text x="480" y="402" class="content">Mistral 7B GSM8K 5.9% -&gt; 10.9%</text>
  <text x="480" y="418" class="content">タスク専用微調整なし。</text>

  <rect x="470" y="444" width="372" height="84" class="box"/>
  <text x="480" y="466" class="label">共通の弱点</text>
  <text x="480" y="486" class="content">3系統とも答え条件付き勾配を使う。</text>
  <text x="480" y="502" class="content">近道推論でもラベルに届く。</text>
  <text x="480" y="518" class="content">対策: 過程報酬モデル + OOD評価。</text>
</svg>
