<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">スキャフォールドはベースモデル以上にスコアを動かす</text>

  <rect x="40" y="50" width="800" height="440" class="box"/>

  <!-- Base model -->
  <rect x="80" y="80" width="160" height="70" class="cool"/>
  <text x="160" y="104" text-anchor="middle" class="label">ベースモデル</text>
  <text x="160" y="124" text-anchor="middle" class="small">Claude Sonnet 4.5</text>
  <text x="160" y="140" text-anchor="middle" class="small">（重み固定）</text>

  <!-- Two scaffolds -->
  <rect x="290" y="80" width="160" height="70" class="hot"/>
  <text x="370" y="104" text-anchor="middle" class="label">SWE-agent v1</text>
  <text x="370" y="124" text-anchor="middle" class="small">ACIコマンド集合</text>
  <text x="370" y="140" text-anchor="middle" class="small">JSONツール呼出し</text>

  <rect x="500" y="80" width="160" height="70" class="cold"/>
  <text x="580" y="104" text-anchor="middle" class="label">Cline autonomous</text>
  <text x="580" y="124" text-anchor="middle" class="small">VS Code + ポリシー</text>
  <text x="580" y="140" text-anchor="middle" class="small">検証ループ</text>

  <rect x="700" y="80" width="140" height="70" class="box"/>
  <text x="770" y="104" text-anchor="middle" class="label">SWE-bench Verified</text>
  <text x="770" y="124" text-anchor="middle" class="small">500件の選別タスク</text>
  <text x="770" y="140" text-anchor="middle" class="small">（同じタスク）</text>

  <path d="M240 115 L290 115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M240 115 Q265 200 290 115" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M450 115 L500 115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M660 115 L700 115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Score delta -->
  <rect x="80" y="180" width="580" height="80" class="box"/>
  <text x="100" y="202" class="label">スコア差</text>
  <text x="100" y="226" class="content">同じモデル: SWE-agent v1  43.2%    |    Cline autonomous  59.8%</text>
  <text x="100" y="244" class="content">スキャフォールドだけで +16.6 ポイント。（OpenHands, Epoch AI 2026）</text>

  <!-- CodeAct vs JSON -->
  <rect x="80" y="290" width="360" height="160" class="hot"/>
  <text x="260" y="312" text-anchor="middle" class="label">CodeAct scaffold（OpenHands）</text>
  <text x="100" y="334" class="content">+ 合成可能: 1アクションで多ファイル編集</text>
  <text x="100" y="350" class="content">+ アクション内例外を捕捉</text>
  <text x="100" y="366" class="content">- アクション単位の影響範囲が大きい</text>
  <text x="100" y="382" class="content">- 強化sandbox（Docker）が必要</text>
  <text x="100" y="402" class="content">使う場面: エージェントが隔離コンテナ内にあり</text>
  <text x="100" y="418" class="content">          合成性が監査コストに見合う</text>
  <text x="100" y="434" class="small">arXiv:2407.16741 · MITライセンス · 最も活発なオープンプラットフォーム</text>

  <rect x="460" y="290" width="360" height="160" class="cold"/>
  <text x="640" y="312" text-anchor="middle" class="label">JSON tool-call scaffold</text>
  <text x="480" y="334" class="content">+ 全アクションが検証器を通る</text>
  <text x="480" y="350" class="content">+ ターンごとの監査が容易</text>
  <text x="480" y="366" class="content">- 1ターン1アクション。同じタスクでターン増</text>
  <text x="480" y="382" class="content">- 合成性はオーケストレータ側にある</text>
  <text x="480" y="402" class="content">使う場面: プロバイダが実行器を制御</text>
  <text x="480" y="418" class="content">         (Claude Managed Agents, OpenAI Assistants)</text>
  <text x="480" y="434" class="small">マネージドサービスで主流。安全性を構造で作る</text>
</svg>
