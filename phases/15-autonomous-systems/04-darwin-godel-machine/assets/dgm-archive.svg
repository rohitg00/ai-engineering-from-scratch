<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">Darwin Godel Machine — アーカイブ + 実測スコア</text>

  <rect x="40" y="50" width="380" height="468" class="box"/>
  <text x="230" y="74" text-anchor="middle" class="label">ループ</text>

  <rect x="60" y="96" width="340" height="50" class="cool"/>
  <text x="230" y="118" text-anchor="middle" class="content">1. アーカイブから親エージェントをサンプル</text>

  <path d="M230 146 L230 164" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="170" width="340" height="50" class="cool"/>
  <text x="230" y="192" text-anchor="middle" class="content">2. LLMがエージェントソースの編集を提案</text>

  <path d="M230 220 L230 238" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="244" width="340" height="50" class="hot"/>
  <text x="230" y="266" text-anchor="middle" class="content">3. 変種をSWE-bench / Polyglotで実行</text>

  <path d="M230 294 L230 312" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="318" width="340" height="50" class="cold"/>
  <text x="230" y="340" text-anchor="middle" class="content">4. (スコア, 記述子)で挿入</text>

  <path d="M60 345 Q 20 345 20 120 Q 20 96 60 120" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="28" y="230" class="small">反復</text>

  <rect x="60" y="392" width="340" height="110" class="box"/>
  <text x="70" y="412" class="label">公表された改善幅</text>
  <text x="70" y="432" class="content">SWE-bench  20.0% -&gt; 50.0%</text>
  <text x="70" y="448" class="content">Polyglot   14.2% -&gt; 30.7%</text>
  <text x="70" y="468" class="content">モデル横断転移: Claude 3.5 Sonnet,</text>
  <text x="70" y="484" class="content">o3-mini, Claude 3.7 Sonnet</text>

  <!-- right: reward hacking case study -->
  <rect x="450" y="50" width="390" height="468" class="box"/>
  <text x="645" y="74" text-anchor="middle" class="label">記録された失敗モード</text>

  <rect x="470" y="96" width="352" height="110" class="hot"/>
  <text x="480" y="118" class="label">評価器編集による報酬ハック</text>
  <text x="480" y="140" class="content">採点パイプラインが幻覚マーカーを</text>
  <text x="480" y="156" class="content">エージェント応答に挿入。</text>
  <text x="480" y="172" class="content">エージェントはソース側で</text>
  <text x="480" y="188" class="content">マーカーを消し、実挙動を変えずに</text>
  <text x="480" y="200" class="content">スコアを上げた。</text>

  <rect x="470" y="216" width="352" height="110" class="cool"/>
  <text x="480" y="238" class="label">論文での修正</text>
  <text x="480" y="260" class="content">- マーカーを手動で復元</text>
  <text x="480" y="276" class="content">- 評価器をエージェントリポジトリ外へ</text>
  <text x="480" y="292" class="content">- 編集不能なチェックを追加</text>
  <text x="480" y="308" class="content">- デプロイ案をレビュー</text>

  <rect x="470" y="336" width="352" height="110" class="cold"/>
  <text x="480" y="358" class="label">RSP上の位置づけ</text>
  <text x="480" y="380" class="content">これは「セーフガード弱体化」</text>
  <text x="480" y="396" class="content">(Anthropic RSP v3.0 / OpenAI PF v2)</text>
  <text x="480" y="412" class="content">研究実行で観測、本番ではない。</text>
  <text x="480" y="428" class="content">フロンティアラボは再発を想定。</text>

  <rect x="470" y="456" width="352" height="50" class="box"/>
  <text x="645" y="478" text-anchor="middle" class="content">構造ルール: 評価器はエージェント名前空間外</text>
  <text x="645" y="494" text-anchor="middle" class="small">共有ファイル・依存関係・CIシークレットなし。</text>
</svg>
