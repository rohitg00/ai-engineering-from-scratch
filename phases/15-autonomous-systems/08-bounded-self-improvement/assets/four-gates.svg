<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">限定的自己改善の4つの基本要素</text>

  <rect x="40" y="50" width="800" height="440" class="box"/>

  <!-- Proposed edit -->
  <rect x="80" y="80" width="140" height="60" class="cool"/>
  <text x="150" y="108" text-anchor="middle" class="label">提案編集</text>
  <text x="150" y="126" text-anchor="middle" class="small">自己改善ループから</text>

  <!-- Four gate boxes -->
  <rect x="260" y="80" width="140" height="60" class="hot"/>
  <text x="330" y="102" text-anchor="middle" class="label">1. 不変条件</text>
  <text x="330" y="120" text-anchor="middle" class="small">モジュールハッシュ,</text>
  <text x="330" y="134" text-anchor="middle" class="small">ツールマニフェスト</text>

  <rect x="420" y="80" width="140" height="60" class="cold"/>
  <text x="490" y="102" text-anchor="middle" class="label">2. 整合性アンカー</text>
  <text x="490" y="120" text-anchor="middle" class="small">憲法ハッシュ</text>
  <text x="490" y="134" text-anchor="middle" class="small">読取専用で固定</text>

  <rect x="580" y="80" width="140" height="60" class="dsk"/>
  <text x="650" y="102" text-anchor="middle" class="label">3. 多目的</text>
  <text x="650" y="120" text-anchor="middle" class="small">性能 + 安全 +</text>
  <text x="650" y="134" text-anchor="middle" class="small">公平性 + 堅牢性</text>

  <rect x="740" y="80" width="90" height="60" class="cool"/>
  <text x="785" y="102" text-anchor="middle" class="label">4. 回帰</text>
  <text x="785" y="120" text-anchor="middle" class="small">軸ごと</text>
  <text x="785" y="134" text-anchor="middle" class="small">履歴確認</text>

  <!-- Arrows left-to-right -->
  <path d="M220 110 L260 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M400 110 L420 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 110 L580 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M720 110 L740 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- What each catches -->
  <rect x="260" y="170" width="140" height="90" class="box"/>
  <text x="330" y="190" text-anchor="middle" class="label">検知</text>
  <text x="330" y="210" text-anchor="middle" class="small">持込ツール</text>
  <text x="330" y="225" text-anchor="middle" class="small">未許可API</text>
  <text x="330" y="240" text-anchor="middle" class="small">評価器編集</text>
  <text x="330" y="255" text-anchor="middle" class="small">(DGM事例)</text>

  <rect x="420" y="170" width="140" height="90" class="box"/>
  <text x="490" y="190" text-anchor="middle" class="label">検知</text>
  <text x="490" y="210" text-anchor="middle" class="small">目的ドリフト</text>
  <text x="490" y="225" text-anchor="middle" class="small">再解釈</text>
  <text x="490" y="240" text-anchor="middle" class="small">憲法文の</text>
  <text x="490" y="255" text-anchor="middle" class="small">変更</text>

  <rect x="580" y="170" width="140" height="90" class="box"/>
  <text x="650" y="190" text-anchor="middle" class="label">検知</text>
  <text x="650" y="210" text-anchor="middle" class="small">単一軸</text>
  <text x="650" y="225" text-anchor="middle" class="small">最適化</text>
  <text x="650" y="240" text-anchor="middle" class="small">安全低下と</text>
  <text x="650" y="255" text-anchor="middle" class="small">性能上昇</text>

  <rect x="740" y="170" width="90" height="90" class="box"/>
  <text x="785" y="190" text-anchor="middle" class="label">検知</text>
  <text x="785" y="210" text-anchor="middle" class="small">静かな</text>
  <text x="785" y="225" text-anchor="middle" class="small">能力低下が</text>
  <text x="785" y="240" text-anchor="middle" class="small">移動平均に</text>
  <text x="785" y="255" text-anchor="middle" class="small">吸収</text>

  <!-- Information-theoretic limit box -->
  <rect x="80" y="290" width="740" height="78" class="hot"/>
  <text x="100" y="312" class="label">情報理論的な上限</text>
  <text x="100" y="332" class="content">Kolmogorov複雑性は、自身の後継について証明できる範囲を縛る。</text>
  <text x="100" y="350" class="content">Lobの定理: システムは証明なしに「すべき」として行動しうる。</text>
  <text x="100" y="365" class="content">これらは緩和策であり、安全の証明ではない。</text>

  <!-- Accept/reject -->
  <rect x="80" y="388" width="360" height="80" class="cool"/>
  <text x="260" y="412" text-anchor="middle" class="label">4ゲートすべて合格時だけ編集反映</text>
  <text x="260" y="432" text-anchor="middle" class="content">どれか失敗 -&gt; 編集却下</text>
  <text x="260" y="450" text-anchor="middle" class="small">境界例は回帰ゲート + 人間レビュー</text>

  <rect x="460" y="388" width="360" height="80" class="hot"/>
  <text x="640" y="412" text-anchor="middle" class="label">本番の現実 (RSI Workshop 2026)</text>
  <text x="640" y="432" text-anchor="middle" class="content">ラボは部分実装が多く、フルスタックは稀</text>
  <text x="640" y="450" text-anchor="middle" class="small">Meta HyperAgents, SAHOO (Mar 2026) = 部分例</text>
</svg>
