<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">永続実行: リプレイはワークフローを再実行し、記録済みアクティビティはスキップする</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Attempt 1 -->
  <text x="60" y="80" class="label">試行1 — LLM呼出し後にクラッシュ</text>

  <rect x="60" y="96" width="150" height="50" class="cool"/>
  <text x="135" y="118" text-anchor="middle" class="label">文書取得</text>
  <text x="135" y="136" text-anchor="middle" class="small">実行、doneを記録</text>

  <rect x="230" y="96" width="150" height="50" class="cool"/>
  <text x="305" y="118" text-anchor="middle" class="label">LLM呼出し</text>
  <text x="305" y="136" text-anchor="middle" class="small">実行、doneを記録</text>

  <rect x="400" y="96" width="150" height="50" class="hot"/>
  <text x="475" y="118" text-anchor="middle" class="label">クラッシュ</text>
  <text x="475" y="136" text-anchor="middle" class="small">レポート書込は未実行</text>

  <!-- Event log -->
  <rect x="60" y="170" width="490" height="74" class="cold"/>
  <text x="80" y="192" class="label">イベントログ（永続）</text>
  <text x="80" y="212" class="content">[文書取得 開始, 文書取得 完了 (結果=X),</text>
  <text x="80" y="228" class="content"> LLM呼出し 開始, LLM呼出し 完了 (結果=Y)]</text>

  <!-- Attempt 2 -->
  <text x="60" y="276" class="label">試行2 — リプレイ</text>

  <rect x="60" y="292" width="150" height="50" class="cold"/>
  <text x="135" y="314" text-anchor="middle" class="label">文書取得</text>
  <text x="135" y="332" text-anchor="middle" class="small">ログからリプレイ</text>

  <rect x="230" y="292" width="150" height="50" class="cold"/>
  <text x="305" y="314" text-anchor="middle" class="label">LLM呼出し</text>
  <text x="305" y="332" text-anchor="middle" class="small">ログからリプレイ</text>

  <rect x="400" y="292" width="150" height="50" class="cool"/>
  <text x="475" y="314" text-anchor="middle" class="label">レポート書込</text>
  <text x="475" y="332" text-anchor="middle" class="small">実行、doneを記録</text>

  <rect x="570" y="292" width="150" height="50" class="box"/>
  <text x="645" y="314" text-anchor="middle" class="label">レポートを返す</text>
  <text x="645" y="332" text-anchor="middle" class="small">完了</text>

  <path d="M210 317 L230 317" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M380 317 L400 317" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M550 317 L570 317" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Why determinism -->
  <rect x="60" y="370" width="760" height="120" class="hot"/>
  <text x="440" y="394" text-anchor="middle" class="label">リプレイを機能させる条件</text>
  <text x="80" y="416" class="content">1. ワークフローコードは決定的（壁時計なし、乱数なし、隠れI/Oなし）。</text>
  <text x="80" y="432" class="content">2. 全アクティビティを引数 + 結果付きで記録し、リプレイはログを再読込する。</text>
  <text x="80" y="448" class="content">3. バックエンドがクラッシュ後も残る（PostgreSQL / Durable Objects。本番SQLite不可）。</text>
  <text x="80" y="464" class="content">4. HITL停止はワークフロー信号であり、ポーリングループではない。</text>
  <text x="80" y="480" class="content">LLM呼出しはアクティビティ形状に合う。非決定的、高価、失敗しうる。</text>
</svg>
