<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">提案 → 提示 → コミット → 検証（4つすべて必須）</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Phases -->
  <rect x="60" y="80" width="170" height="90" class="cool"/>
  <text x="145" y="104" text-anchor="middle" class="label">1. 提案</text>
  <text x="76" y="126" class="small">意図 + 系譜 +</text>
  <text x="76" y="142" class="small">権限 + 影響範囲 +</text>
  <text x="76" y="158" class="small">ロールバック + 冪等性</text>

  <rect x="250" y="80" width="170" height="90" class="cold"/>
  <text x="335" y="104" text-anchor="middle" class="label">2. 提示</text>
  <text x="266" y="126" class="small">永続ストア</text>
  <text x="266" y="142" class="small">(PostgreSQL, Redis,</text>
  <text x="266" y="158" class="small">Durable Object)</text>

  <rect x="440" y="80" width="170" height="90" class="cool"/>
  <text x="525" y="104" text-anchor="middle" class="label">3. コミット</text>
  <text x="456" y="126" class="small">チャレンジ応答</text>
  <text x="456" y="142" class="small">チェックリスト、明示承認</text>
  <text x="456" y="158" class="small">冪等な再実行</text>

  <rect x="630" y="80" width="170" height="90" class="cool"/>
  <text x="715" y="104" text-anchor="middle" class="label">4. 検証</text>
  <text x="646" y="126" class="small">対象を再読込</text>
  <text x="646" y="142" class="small">副作用を確認</text>
  <text x="646" y="158" class="small">不一致なら警告</text>

  <path d="M230 125 L250 125" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M420 125 L440 125" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M610 125 L630 125" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rubber stamp vs checklist -->
  <rect x="60" y="200" width="360" height="140" class="hot"/>
  <text x="240" y="224" text-anchor="middle" class="label">形式承認（監査に落ちる）</text>
  <text x="76" y="248" class="content">「承認?」ボタンが1つだけ</text>
  <text x="76" y="264" class="content">構造化メタデータが提示されない</text>
  <text x="76" y="280" class="content">レビュアーが1秒未満でクリック</text>
  <text x="76" y="296" class="content">承認が何も予測しない</text>
  <text x="76" y="320" class="small">EU AI Act Article 14 は明確:</text>
  <text x="76" y="334" class="small">有効な人間監督は形式承認を除外する。</text>

  <rect x="460" y="200" width="360" height="140" class="cool"/>
  <text x="640" y="224" text-anchor="middle" class="label">チャレンジ応答（通る）</text>
  <text x="476" y="248" class="content">[ ] 何に触れるか理解した</text>
  <text x="476" y="264" class="content">[ ] 影響範囲を確認した</text>
  <text x="476" y="280" class="content">[ ] ロールバック計画がある</text>
  <text x="476" y="296" class="content">3つすべてで承認が有効化</text>
  <text x="476" y="320" class="small">AnthropicとMSのコンプライアンス文書に記載。</text>
  <text x="476" y="334" class="small">高リスクシステムではEU AI Act Article 14が要求。</text>

  <!-- Idempotency detail -->
  <rect x="60" y="370" width="760" height="120" class="cold"/>
  <text x="440" y="394" text-anchor="middle" class="label">冪等性キー = hash(thread_id, action, payload)</text>
  <text x="80" y="416" class="content">propose(P) + propose(P) -> 同じレコード（重複なし）</text>
  <text x="80" y="432" class="content">commit(k) + commit(k) -> 1回だけ実行、以後のcommitは無操作</text>
  <text x="80" y="448" class="content">一時失敗後のリトライ: Stripe/AWS型の冪等性をエージェント承認にも再利用</text>
  <text x="80" y="468" class="content">キー内のwall-clockはログ時刻であり、冪等性キーではない</text>
  <text x="80" y="484" class="small">LangGraph interrupt() · MS RequestInfoEvent · Cloudflare waitForApproval() — 同じ形、違う名前</text>
</svg>
