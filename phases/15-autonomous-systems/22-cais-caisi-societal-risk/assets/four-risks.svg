<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .warn { fill: #fde0b4; stroke: #b5651d; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">CAISの4リスクフレームワーク + 実務者が動かせるレバー</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Quadrants -->
  <rect x="60" y="80" width="370" height="140" class="hot"/>
  <text x="245" y="104" text-anchor="middle" class="label">1. 悪用</text>
  <text x="76" y="128" class="content">悪意ある主体がAIを害に使う</text>
  <text x="76" y="146" class="small">生物兵器合成 · 偽情報 · サイバー攻撃</text>
  <text x="76" y="170" class="content">緩和策:</text>
  <text x="76" y="186" class="small">• ハードコード禁止（L17）· Llama Guard（L18）</text>
  <text x="76" y="202" class="small">• ツール許可リスト（L10, L11）</text>

  <rect x="450" y="80" width="370" height="140" class="warn"/>
  <text x="635" y="104" text-anchor="middle" class="label">2. AI競争</text>
  <text x="466" y="128" class="content">競争圧力が安全を上書きする</text>
  <text x="466" y="146" class="small">研究所 · 企業 · 国家</text>
  <text x="466" y="170" class="content">緩和策:</text>
  <text x="466" y="186" class="small">• Risk Report付きスケーリングポリシー（L19, L20）</text>
  <text x="466" y="202" class="small">• 外部評価（L21）</text>

  <rect x="60" y="240" width="370" height="140" class="cool"/>
  <text x="245" y="264" text-anchor="middle" class="label">3. 組織リスク（実務者が動かせる）</text>
  <text x="76" y="288" class="content">研究所内部の力学</text>
  <text x="76" y="306" class="small">安全文化 · 監査 · 防御 · 情報セキュリティ</text>
  <text x="76" y="330" class="content">緩和策:</text>
  <text x="76" y="346" class="small">• キャリア不利益のないエスカレーション経路</text>
  <text x="76" y="362" class="small">• 独立監査と多層防御</text>

  <rect x="450" y="240" width="370" height="140" class="cold"/>
  <text x="635" y="264" text-anchor="middle" class="label">4. ローグAI</text>
  <text x="466" y="288" class="content">能力あるAIが不整合な目標を追う</text>
  <text x="466" y="306" class="small">自律ホライズンとともに拡大（L1, L21）</text>
  <text x="466" y="330" class="content">緩和策:</text>
  <text x="466" y="346" class="small">• キルスイッチ + カナリア（L14）</text>
  <text x="466" y="362" class="small">• propose-then-commit（L15）· チェックポイント（L16）</text>

  <!-- Bottom strip: CAIS / CAISI / SB-53 -->
  <rect x="60" y="400" width="760" height="90" class="box"/>
  <text x="440" y="424" text-anchor="middle" class="label">知っておくべき3つの主体</text>
  <text x="80" y="446" class="content">CAIS  （非営利、サンフランシスコ、2022） — 4リスクフレームワーク、2023年絶滅声明</text>
  <text x="80" y="462" class="content">CAISI （NISTセンター、米国政府） — 任意協定、非機密の能力評価</text>
  <text x="80" y="478" class="content">California SB-53 — 署名されれば米国初の州レベル壊滅的リスク規制</text>
</svg>
