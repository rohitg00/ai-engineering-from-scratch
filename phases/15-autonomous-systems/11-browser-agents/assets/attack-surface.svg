<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">間接プロンプトインジェクション: 攻撃面と防御層</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Untrusted content sources -->
  <rect x="60" y="80" width="200" height="120" class="hot"/>
  <text x="160" y="102" text-anchor="middle" class="label">信頼外コンテンツ</text>
  <text x="76" y="128" class="small">• 任意の第三者ページ</text>
  <text x="76" y="144" class="small">• ユーザー生成投稿</text>
  <text x="76" y="160" class="small">• 検索エンジンsnippet</text>
  <text x="76" y="176" class="small">• URL fragment / query</text>
  <text x="76" y="192" class="small">• 過去のmemory entry</text>

  <!-- エージェント -->
  <rect x="320" y="80" width="240" height="120" class="cool"/>
  <text x="440" y="102" text-anchor="middle" class="label">ブラウザエージェント</text>
  <text x="336" y="128" class="small">読む・考える・実行ループ</text>
  <text x="336" y="144" class="small">タスク別ツール許可リスト</text>
  <text x="336" y="160" class="small">範囲限定の資格情報のみ</text>
  <text x="336" y="176" class="small">セッション隔離ワークスペース</text>
  <text x="336" y="192" class="small">監査用ログを保持</text>

  <!-- Consequential sinks -->
  <rect x="620" y="80" width="200" height="120" class="cold"/>
  <text x="720" y="102" text-anchor="middle" class="label">結果を伴う出力先</text>
  <text x="636" y="128" class="small">• フォーム送信</text>
  <text x="636" y="144" class="small">• バックエンドツール呼出し</text>
  <text x="636" y="160" class="small">• メモリ書込み</text>
  <text x="636" y="176" class="small">• ファイルダウンロード</text>
  <text x="636" y="192" class="small">• 資格情報の使用</text>

  <path d="M260 140 L320 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560 140 L620 140" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Defense layers -->
  <text x="60" y="230" class="label">防御層</text>

  <rect x="60" y="240" width="240" height="100" class="cool"/>
  <text x="180" y="262" text-anchor="middle" class="label">1. コンテンツsanitizer</text>
  <text x="76" y="284" class="small">既知の悪性パターンを除去</text>
  <text x="76" y="300" class="small">"ignore previous", "post to"</text>
  <text x="76" y="316" class="small">可視テキスト注入を捕捉</text>
  <text x="76" y="332" class="small">URLフラグメントペイロードは見逃す</text>

  <rect x="320" y="240" width="240" height="100" class="cold"/>
  <text x="440" y="262" text-anchor="middle" class="label">2. R/W境界</text>
  <text x="336" y="284" class="small">読取自由、書込には</text>
  <text x="336" y="300" class="small">新しい承認が必要</text>
  <text x="336" y="316" class="small">content_origin = out-of-trust</text>
  <text x="336" y="332" class="small">フラグメント注入も捕捉</text>

  <rect x="580" y="240" width="240" height="100" class="hot"/>
  <text x="700" y="262" text-anchor="middle" class="label">3. ツール許可リスト + HITL</text>
  <text x="596" y="284" class="small">タスク別ツール許可リスト</text>
  <text x="596" y="300" class="small">不可逆書込はHITL</text>
  <text x="596" y="316" class="small">propose-then-commit (L15)</text>
  <text x="596" y="332" class="small">メモリ上のカナリアトークン (L14)</text>

  <!-- Attack corpus -->
  <rect x="60" y="360" width="760" height="130" class="hot"/>
  <text x="440" y="384" text-anchor="middle" class="label">文書化された2025-2026年の攻撃</text>
  <text x="80" y="406" class="content">Tainted Memories（Atlas CSRF, 2025）— 攻撃ページが指示をエージェントメモリへ結びつける</text>
  <text x="80" y="422" class="content">HashJack（Cato Networks, 2026）— ペイロードをURLフラグメント/クエリ文字列へ隠す</text>
  <text x="80" y="438" class="content">Perplexity Comet hijacks（2026）— 1クリックボタンに後続payloadが乗る</text>
  <text x="80" y="458" class="content">OpenAI preparedness head（2025）: 間接PIは「完全patch可能なbugではない」</text>
  <text x="80" y="478" class="small">多層防御: サニタイザ + R/W境界 + 許可リスト + HITL + カナリア。単一層では不十分</text>
</svg>
