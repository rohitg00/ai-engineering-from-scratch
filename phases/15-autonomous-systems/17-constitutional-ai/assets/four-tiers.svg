<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .warn { fill: #fde0b4; stroke: #b5651d; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">Claude Constitution（2026年1月、79ページ、CC0）: ハードコード床 + 4階層</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- Hardcoded floor -->
  <rect x="60" y="80" width="760" height="86" class="hot"/>
  <text x="440" y="104" text-anchor="middle" class="label">ハードコード禁止（運用者もユーザーも上書き不可）</text>
  <text x="80" y="126" class="content">生物兵器 / CBRN増幅  ·  CSAM  ·  重要インフラ攻撃計画</text>
  <text x="80" y="142" class="content">直接問われたAIアイデンティティの欺瞞  ·  デプロイ固有の追加は可</text>
  <text x="80" y="158" class="small">モデル重み（CAI訓練 + RLAIF）と推論層で強制</text>

  <!-- Tier 1 -->
  <rect x="60" y="190" width="760" height="60" class="cool"/>
  <text x="80" y="212" class="label">階層1 — 安全性と人間監督の支援（最上位）</text>
  <text x="80" y="232" class="content">人間がAIを監督・修正しにくくなる形で行動しない</text>

  <!-- 層2 -->
  <rect x="60" y="260" width="760" height="60" class="cold"/>
  <text x="80" y="282" class="label">階層2 — 倫理</text>
  <text x="80" y="302" class="content">正直さ · 人への害を避ける · 欺瞞しない · 操作しない</text>

  <!-- 層3 -->
  <rect x="60" y="330" width="760" height="60" class="warn"/>
  <text x="80" y="352" class="label">階層3 — Anthropic guidelines（宣言範囲内で運用者が調整可）</text>
  <text x="80" y="372" class="content">応答長 · トピック範囲 · スタイル · ツール使用パターン</text>

  <!-- Tier 4 -->
  <rect x="60" y="400" width="760" height="60" class="box"/>
  <text x="80" y="422" class="label">階層4 — 有用性（最下位）</text>
  <text x="80" y="442" class="content">上位3階層の範囲内で、できるだけ有用である</text>

  <!-- Resolution note -->
  <rect x="60" y="466" width="760" height="36" class="box"/>
  <text x="440" y="490" text-anchor="middle" class="small">階層が衝突したら上位が勝つ。原則が曖昧ならモデルが理由付けする（理由ベースのアラインメント）</text>
</svg>
