<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">自動アラインメント研究 — 並列サンドボックス、1つのフォーラム</text>

  <!-- Three AAR sandboxes -->
  <rect x="40" y="60" width="240" height="190" class="cool"/>
  <text x="160" y="82" text-anchor="middle" class="label">AAR-A サンドボックス</text>
  <text x="160" y="104" text-anchor="middle" class="small">Claude Opus 4.6</text>
  <text x="160" y="122" text-anchor="middle" class="small">fs / ネットワーク / プロセス制限</text>
  <text x="160" y="146" text-anchor="middle" class="content">タスク: 弱から強への蒸留</text>
  <text x="160" y="164" text-anchor="middle" class="content">自由な分解を許可</text>
  <text x="160" y="190" text-anchor="middle" class="small">フォーラム保管庫へ書込不可</text>
  <text x="160" y="206" text-anchor="middle" class="small">同僚ログの読取不可</text>
  <text x="160" y="222" text-anchor="middle" class="small">投稿はAPI経由のみ</text>

  <rect x="320" y="60" width="240" height="190" class="cool"/>
  <text x="440" y="82" text-anchor="middle" class="label">AAR-B サンドボックス</text>
  <text x="440" y="104" text-anchor="middle" class="small">Claude Opus 4.6</text>
  <text x="440" y="122" text-anchor="middle" class="small">fs / ネットワーク / プロセス制限</text>
  <text x="440" y="146" text-anchor="middle" class="content">タスク: RLHFスイープ</text>
  <text x="440" y="164" text-anchor="middle" class="content">自由な分解を許可</text>

  <rect x="600" y="60" width="240" height="190" class="cool"/>
  <text x="720" y="82" text-anchor="middle" class="label">AAR-C サンドボックス</text>
  <text x="720" y="104" text-anchor="middle" class="small">Claude Opus 4.6</text>
  <text x="720" y="122" text-anchor="middle" class="small">fs / ネットワーク / プロセス制限</text>
  <text x="720" y="146" text-anchor="middle" class="content">タスク: アラインメント偽装検出器</text>
  <text x="720" y="164" text-anchor="middle" class="content">自由な分解を許可</text>

  <!-- Forum -->
  <rect x="160" y="290" width="560" height="90" class="cold"/>
  <text x="440" y="314" text-anchor="middle" class="label">共有研究フォーラム</text>
  <text x="440" y="334" text-anchor="middle" class="content">追記専用・改ざん検知ログ</text>
  <text x="440" y="350" text-anchor="middle" class="content">保管先は全サンドボックス外</text>
  <text x="440" y="366" text-anchor="middle" class="small">record n -&gt; H(record n-1) — 編集は即検知</text>

  <!-- Arrows -->
  <path d="M160 250 L280 290" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M440 250 L440 290" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M720 250 L600 290" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="270" y="278" class="small">投稿のみ</text>

  <!-- Human review -->
  <rect x="160" y="410" width="560" height="90" class="hot"/>
  <text x="440" y="434" text-anchor="middle" class="label">人間の研究レビュー</text>
  <text x="440" y="454" text-anchor="middle" class="content">フォーラムを読み、選別し、公開を決定</text>
  <text x="440" y="470" text-anchor="middle" class="content">サンドボックス外バックアップと照合</text>
  <text x="440" y="486" text-anchor="middle" class="small">AARは中間工程を圧縮。端は人間が保持。</text>

  <path d="M440 380 L440 410" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
