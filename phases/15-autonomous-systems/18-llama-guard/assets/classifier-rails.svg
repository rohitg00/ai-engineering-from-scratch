<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .warn { fill: #fde0b4; stroke: #b5651d; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .content { font-size: 11px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #333; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">入力レール + モデル + 出力レール + 対話レール</text>

  <rect x="40" y="50" width="800" height="460" class="box"/>

  <!-- User turn -->
  <rect x="60" y="80" width="130" height="60" class="cool"/>
  <text x="125" y="104" text-anchor="middle" class="label">ユーザー発話</text>
  <text x="125" y="122" text-anchor="middle" class="small">テキスト / 画像</text>

  <!-- Normalize -->
  <rect x="210" y="80" width="130" height="60" class="warn"/>
  <text x="275" y="104" text-anchor="middle" class="label">正規化</text>
  <text x="275" y="122" text-anchor="middle" class="small">NFKC + homoglyph</text>

  <!-- Input rail -->
  <rect x="360" y="80" width="130" height="60" class="cold"/>
  <text x="425" y="104" text-anchor="middle" class="label">入力レール</text>
  <text x="425" y="122" text-anchor="middle" class="small">Llama Guard 4</text>

  <!-- Model -->
  <rect x="510" y="80" width="130" height="60" class="cool"/>
  <text x="575" y="104" text-anchor="middle" class="label">主モデル</text>
  <text x="575" y="122" text-anchor="middle" class="small">（Lesson 17の重み）</text>

  <!-- Output rail -->
  <rect x="660" y="80" width="160" height="60" class="cold"/>
  <text x="740" y="104" text-anchor="middle" class="label">出力レール</text>
  <text x="740" y="122" text-anchor="middle" class="small">Llama Guard / regex</text>

  <path d="M190 110 L210 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340 110 L360 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M490 110 L510 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M640 110 L660 110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dialog rail -->
  <rect x="60" y="160" width="760" height="50" class="warn"/>
  <text x="440" y="184" text-anchor="middle" class="label">対話レール（Colang）: ターン横断制約 — 例: 聞き方を変えても医療診断は扱わない</text>

  <!-- Taxonomy -->
  <rect x="60" y="230" width="760" height="100" class="cool"/>
  <text x="440" y="254" text-anchor="middle" class="label">分類体系（Llama Guard 4 S1-S14）</text>
  <text x="80" y="276" class="content">S1 暴力犯罪 · S2 非暴力犯罪 · S3 性犯罪 · S4 児童搾取</text>
  <text x="80" y="292" class="content">S5 名誉毀損 · S6 専門助言 · S7 プライバシー · S8 IP · S9 無差別兵器</text>
  <text x="80" y="308" class="content">S10 ヘイト · S11 自傷 · S12 性的内容 · S13 選挙 · S14 コードインタープリタ悪用</text>

  <!-- Attack corpus -->
  <rect x="60" y="350" width="760" height="140" class="hot"/>
  <text x="440" y="374" text-anchor="middle" class="label">文書化された回避 — Huang et al. arXiv:2504.11168（2025）</text>
  <text x="80" y="398" class="content">Emoji Smuggling: 6つのガードシステムで100% ASR</text>
  <text x="80" y="414" class="content">NeMo Guard Detect: adversarial jailbreak setで72.54% ASR</text>
  <text x="80" y="430" class="content">Homoglyph置換: Latin "p" を Cyrillic "р" に。分類器が見逃す</text>
  <text x="80" y="446" class="content">意味的言い換え: 同じ意図、新しい語彙。fine-tuneだけでは網羅不能</text>
  <text x="80" y="466" class="content">緩和: 正規化 + 分類器 + 憲法（L17）+ 実行時制御（L10/13/14）</text>
  <text x="80" y="482" class="small">分類器は一層であり、解決策ではない</text>
</svg>
