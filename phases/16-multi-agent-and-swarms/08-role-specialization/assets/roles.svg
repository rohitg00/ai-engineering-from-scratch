<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .edge { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    </style>
  </defs>
  <text x="450" y="28" text-anchor="middle" class="title">Role specialization — 計画ner, executor, critic, 検証器</text>

  <rect x="40" y="60" width="170" height="100" class="cool"/>
  <text x="125" y="82" text-anchor="middle" class="head">計画者</text>
  <text x="125" y="104" text-anchor="middle" class="small">goalを読む</text>
  <text x="125" y="120" text-anchor="middle" class="small">specを作る</text>
  <text x="125" y="138" text-anchor="middle" class="small">(signature, tests, I/O)</text>
  <text x="125" y="154" text-anchor="middle" class="small">MetaGPT: PM + Architect</text>

  <line x1="210" y1="110" x2="250" y2="110" class="edge" marker-end="url(#arrow)"/>

  <rect x="250" y="60" width="170" height="100" class="hot"/>
  <text x="335" y="82" text-anchor="middle" class="head">実行者</text>
  <text x="335" y="104" text-anchor="middle" class="small">one stepを読む</text>
  <text x="335" y="120" text-anchor="middle" class="small">artifactを作る</text>
  <text x="335" y="138" text-anchor="middle" class="small">本物 toolsを持つ</text>
  <text x="335" y="154" text-anchor="middle" class="small">ChatDev: 不明なら質問</text>

  <line x1="420" y1="110" x2="460" y2="110" class="edge" marker-end="url(#arrow)"/>

  <rect x="460" y="60" width="170" height="100" class="dsk"/>
  <text x="545" y="82" text-anchor="middle" class="head">批評者</text>
  <text x="545" y="104" text-anchor="middle" class="small">主観レビュー</text>
  <text x="545" y="120" text-anchor="middle" class="small">taste issuesを拾う</text>
  <text x="545" y="138" text-anchor="middle" class="small">plausible proseに騙される</text>
  <text x="545" y="154" text-anchor="middle" class="small">(LLM-based)</text>

  <line x1="630" y1="110" x2="670" y2="110" class="edge" marker-end="url(#arrow)"/>

  <rect x="670" y="60" width="200" height="100" class="cold"/>
  <text x="770" y="82" text-anchor="middle" class="head">検証者</text>
  <text x="770" y="104" text-anchor="middle" class="small">決定的チェック</text>
  <text x="770" y="120" text-anchor="middle" class="small">テスト、型、スキーマ</text>
  <text x="770" y="138" text-anchor="middle" class="small">騙されない</text>
  <text x="770" y="154" text-anchor="middle" class="small">（コード、LLMではない）</text>

  <line x1="335" y1="160" x2="335" y2="200" class="edge"/>
  <path d="M 335 200 Q 300 220 265 200" class="edge" fill="none" stroke-dasharray="3 3"/>
  <text x="295" y="195" class="small">対話による幻覚低減 (ChatDev)</text>

  <rect x="40" y="240" width="830" height="110" class="box"/>
  <text x="450" y="262" text-anchor="middle" class="head">検証器が支柱になる理由</text>
  <text x="450" y="284" text-anchor="middle" class="small">MAST分類 (Cemri et al. 2025): 1642件のマルチエージェント失敗の21.3%は検証ギャップ</text>
  <text x="450" y="304" text-anchor="middle" class="small">PwC 2025: CrewAIの構造化検証ループで精度 10% -> 70% (7× gain)</text>
  <text x="450" y="324" text-anchor="middle" class="small">アンチパターン: 全roleが"looks good to me"と言うLLM — classic MAST 失敗</text>
  <text x="450" y="342" text-anchor="middle" class="small">critic (subjective) と検証器 (決定的)を必ずpairにする; 捕まえるbugが違う</text>

  <rect x="40" y="370" width="830" height="110" class="box"/>
  <text x="450" y="392" text-anchor="middle" class="head">MetaGPTのSOPパターン</text>
  <text x="450" y="412" text-anchor="middle" class="small">Code = SOP(チーム): PM、アーキテクト、プロジェクト管理、エンジニア、QA</text>
  <text x="450" y="430" text-anchor="middle" class="small">各役割に厳格な入出力スキーマ · パイプラインが決定的になる</text>
  <text x="450" y="450" text-anchor="middle" class="small">CrewAI エージェント(role, goal, backstory) はmodern ergonomic surface</text>
  <text x="450" y="470" text-anchor="middle" class="small">LangGraphは役割を特化プロンプト付きグラフノードとして表現</text>
</svg>
