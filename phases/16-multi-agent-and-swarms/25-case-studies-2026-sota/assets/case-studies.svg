<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">2026年の3代表ケーススタディ — 近い参照例を選ぶ</text>

  <rect x="40" y="60" width="280" height="230" class="cool"/>
  <text x="180" y="84" text-anchor="middle" class="head">Anthropic Research</text>
  <text x="180" y="104" text-anchor="middle" class="step">監督者 + ワーカー</text>
  <text x="180" y="134" text-anchor="middle" class="small">Opus 4が計画 + 統合</text>
  <text x="180" y="152" text-anchor="middle" class="small">Sonnet 4サブエージェントが調査</text>
  <text x="180" y="172" text-anchor="middle" class="small">サブエージェントごとに新規コンテキスト</text>
  <text x="180" y="200" text-anchor="middle" class="step">単一Opus 4比 +90.2%</text>
  <text x="180" y="220" text-anchor="middle" class="small">クエリあたり15倍トークン</text>
  <text x="180" y="238" text-anchor="middle" class="small">レインボーデプロイ必須</text>
  <text x="180" y="268" text-anchor="middle" class="caption">用途: 調査、知識タスク</text>

  <rect x="340" y="60" width="280" height="230" class="cold"/>
  <text x="480" y="84" text-anchor="middle" class="head">MetaGPT / ChatDev</text>
  <text x="480" y="104" text-anchor="middle" class="step">SOP役割分解</text>
  <text x="480" y="134" text-anchor="middle" class="small">PM · Architect · 実装者 · QA</text>
  <text x="480" y="152" text-anchor="middle" class="small">Code = SOP(チーム)</text>
  <text x="480" y="172" text-anchor="middle" class="small">構造化成果物の引き継ぎ</text>
  <text x="480" y="200" text-anchor="middle" class="step">対話型</text>
  <text x="480" y="218" text-anchor="middle" class="step">幻覚低減</text>
  <text x="480" y="238" text-anchor="middle" class="small">MacNet: DAGで1000+エージェント</text>
  <text x="480" y="268" text-anchor="middle" class="caption">用途: エンジニアリング業務</text>

  <rect x="640" y="60" width="280" height="230" class="hot"/>
  <text x="780" y="84" text-anchor="middle" class="head">OpenClaw / Moltbook</text>
  <text x="780" y="104" text-anchor="middle" class="step">人口規模の基盤</text>
  <text x="780" y="134" text-anchor="middle" class="small">Clawdbot Nov 2025 → 247k ⭐</text>
  <text x="780" y="152" text-anchor="middle" class="small">Moltbook 230万エージェント</text>
  <text x="780" y="172" text-anchor="middle" class="small">Metaが2026年3月に買収</text>
  <text x="780" y="200" text-anchor="middle" class="step">創発的経済</text>
  <text x="780" y="218" text-anchor="middle" class="step">規模拡大時のプロンプト注入</text>
  <text x="780" y="238" text-anchor="middle" class="small">州レベル規制への対応</text>
  <text x="780" y="268" text-anchor="middle" class="caption">用途: ソーシャル/ネットワーク製品</text>

  <rect x="40" y="310" width="880" height="190" class="box"/>
  <text x="480" y="334" text-anchor="middle" class="head">フレームワーク概況 — 2026年4月</text>

  <text x="60" y="368" class="step">LangGraph</text>
  <text x="260" y="368" class="small">本番の有力候補 · グラフ + チェックポイント + HITL</text>

  <text x="60" y="394" class="step">CrewAI</text>
  <text x="260" y="394" class="small">本番の有力候補 · 役割ベースチーム（逐次/階層）</text>

  <text x="60" y="420" class="step">OpenAI Agents SDK</text>
  <text x="260" y="420" class="small">本番向け · Swarm後継 · ツール戻り値引き継ぎ</text>

  <text x="60" y="446" class="step">Microsoft Agent Framework</text>
  <text x="260" y="446" class="small">2026年2月RC · オーケストレーションパターン · AutoGen統合</text>

  <text x="60" y="472" class="step">Google ADK · Anthropic SDK</text>
  <text x="260" y="472" class="small">本番向け · それぞれA2Aネイティブ/研究ネイティブ</text>

  <text x="60" y="496" class="caption">全てMCPを出荷。多くはA2Aも出荷 — プロトコル互換はもはや差別化要因ではない</text>
</svg>
