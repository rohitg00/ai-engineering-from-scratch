<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">4つの基本要素 — 2026年のマルチエージェント基盤はこの形に収まる</text>

  <rect x="40" y="60" width="220" height="180" class="cool"/>
  <text x="150" y="82" text-anchor="middle" class="head">エージェント</text>
  <text x="150" y="108" text-anchor="middle" class="step">システムプロンプト + ツール</text>
  <text x="150" y="128" text-anchor="middle" class="small">状態なし関数</text>
  <text x="150" y="146" text-anchor="middle" class="small">(prompt, tools, model) の関数</text>
  <text x="150" y="174" text-anchor="middle" class="small">AutoGen: Conversableエージェント</text>
  <text x="150" y="190" text-anchor="middle" class="small">CrewAI: 役割 + 目標 + 背景</text>
  <text x="150" y="206" text-anchor="middle" class="small">LangGraph: ノード関数</text>
  <text x="150" y="222" text-anchor="middle" class="small">Swarm: エージェント(instructions, tools)</text>

  <rect x="280" y="60" width="220" height="180" class="hot"/>
  <text x="390" y="82" text-anchor="middle" class="head">引き継ぎ</text>
  <text x="390" y="108" text-anchor="middle" class="step">制御の移譲</text>
  <text x="390" y="128" text-anchor="middle" class="small">3つの実装:</text>
  <text x="390" y="148" text-anchor="middle" class="small">1 関数戻り値 (Swarm)</text>
  <text x="390" y="166" text-anchor="middle" class="small">2 グラフ辺 (LangGraph)</text>
  <text x="390" y="184" text-anchor="middle" class="small">3 発話者選択 (AutoGen)</text>
  <text x="390" y="210" text-anchor="middle" class="caption">常に: (元, 先, 任意ペイロード)</text>

  <rect x="520" y="60" width="220" height="180" class="cold"/>
  <text x="630" y="82" text-anchor="middle" class="head">共有状態</text>
  <text x="630" y="108" text-anchor="middle" class="step">唯一状態を持つもの</text>
  <text x="630" y="128" text-anchor="middle" class="small">メッセージプール</text>
  <text x="630" y="146" text-anchor="middle" class="small">黒板</text>
  <text x="630" y="164" text-anchor="middle" class="small">StateGraph reducer</text>
  <text x="630" y="182" text-anchor="middle" class="small">MCP共有コンテキスト</text>
  <text x="630" y="210" text-anchor="middle" class="caption">メモリ汚染はここで起きる</text>

  <rect x="760" y="60" width="180" height="180" class="dsk"/>
  <text x="850" y="82" text-anchor="middle" class="head">オーケストレータ</text>
  <text x="850" y="108" text-anchor="middle" class="step">次に誰が話すか</text>
  <text x="850" y="128" text-anchor="middle" class="small">静的グラフ</text>
  <text x="850" y="146" text-anchor="middle" class="small">LLM選択</text>
  <text x="850" y="164" text-anchor="middle" class="small">引き継ぎ駆動</text>
  <text x="850" y="182" text-anchor="middle" class="small">キュー駆動</text>
  <text x="850" y="210" text-anchor="middle" class="caption">他3つの上にあるスケジューラ</text>

  <rect x="40" y="280" width="900" height="210" class="box"/>
  <text x="490" y="304" text-anchor="middle" class="head">2026年フレームワークを4軸へ対応付け</text>

  <text x="60" y="336" class="step">OpenAI Swarm / Agents SDK</text>
  <text x="340" y="336" class="small">エージェント = エージェント(指示, ツール)</text>
  <text x="340" y="352" class="small">handoff = ツールがエージェントを返す · 共有状態は呼び出し元へ · orchestration = LLMの引き継ぎ呼出し</text>

  <text x="60" y="376" class="step">AutoGen v0.4 / AG2</text>
  <text x="340" y="376" class="small">エージェント = ConversableAgent</text>
  <text x="340" y="392" class="small">handoff = speaker selection · shared state = メッセージプール · orchestrator = selector fn (LLM or round-robin)</text>

  <text x="60" y="416" class="step">CrewAI</text>
  <text x="340" y="416" class="small">エージェント = 役割 + 目標 + 背景</text>
  <text x="340" y="432" class="small">handoff = 逐次/階層プロセス · 共有状態 = タスク出力 · オーケストレーション = 管理LLM</text>

  <text x="60" y="456" class="step">LangGraph</text>
  <text x="340" y="456" class="small">エージェント = ノード関数</text>
  <text x="340" y="472" class="small">handoff = グラフ辺 · 共有状態 = StateGraph reducer · オーケストレーション = 決定的グラフ</text>
</svg>
