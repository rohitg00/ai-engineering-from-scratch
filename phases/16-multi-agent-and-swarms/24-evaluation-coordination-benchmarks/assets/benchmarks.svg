<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">2025-2026年マルチエージェントベンチマークと測定対象</text>

  <rect x="40" y="60" width="880" height="220" class="box"/>
  <text x="480" y="84" text-anchor="middle" class="head">5つの代表ベンチマーク</text>

  <rect x="60" y="110" width="170" height="150" class="cool"/>
  <text x="145" y="134" text-anchor="middle" class="step">MultiAgentBench</text>
  <text x="145" y="152" text-anchor="middle" class="step">(MARBLE)</text>
  <text x="145" y="174" text-anchor="middle" class="small">トポロジ:</text>
  <text x="145" y="190" text-anchor="middle" class="small">星/鎖/木/グラフ</text>
  <text x="145" y="212" text-anchor="middle" class="small">研究ではグラフが勝つ</text>
  <text x="145" y="230" text-anchor="middle" class="small">約4超で協調税</text>
  <text x="145" y="252" text-anchor="middle" class="caption">ACL 2025</text>

  <rect x="240" y="110" width="170" height="150" class="hot"/>
  <text x="325" y="134" text-anchor="middle" class="step">COMMA</text>
  <text x="325" y="174" text-anchor="middle" class="small">マルチモーダル、</text>
  <text x="325" y="190" text-anchor="middle" class="small">非対称情報</text>
  <text x="325" y="212" text-anchor="middle" class="small">GPT-4oもランダム超えに苦戦</text>
  <text x="325" y="230" text-anchor="middle" class="small">苦戦する</text>
  <text x="325" y="252" text-anchor="middle" class="caption">否定結果シグナル</text>

  <rect x="420" y="110" width="170" height="150" class="cold"/>
  <text x="505" y="134" text-anchor="middle" class="step">MedAgentBoard</text>
  <text x="505" y="174" text-anchor="middle" class="small">4つの医療タスク</text>
  <text x="505" y="190" text-anchor="middle" class="small">単一LLMがしばしば</text>
  <text x="505" y="212" text-anchor="middle" class="small">マルチエージェントに並ぶ</text>
  <text x="505" y="230" text-anchor="middle" class="small">過剰設計チェック</text>
  <text x="505" y="252" text-anchor="middle" class="caption">ドメイン負荷テスト</text>

  <rect x="600" y="110" width="170" height="150" class="cool"/>
  <text x="685" y="134" text-anchor="middle" class="step">AgentArch</text>
  <text x="685" y="174" text-anchor="middle" class="small">ツール + メモリ +</text>
  <text x="685" y="190" text-anchor="middle" class="small">オーケストレーション</text>
  <text x="685" y="212" text-anchor="middle" class="small">層別価値</text>
  <text x="685" y="230" text-anchor="middle" class="small">帰属</text>
  <text x="685" y="252" text-anchor="middle" class="caption">企業向けスタック</text>

  <rect x="780" y="110" width="140" height="150" class="hot"/>
  <text x="850" y="134" text-anchor="middle" class="step">SWE-bench Pro</text>
  <text x="850" y="174" text-anchor="middle" class="small">1865問</text>
  <text x="850" y="190" text-anchor="middle" class="small">~23% vs 70%+ on</text>
  <text x="850" y="212" text-anchor="middle" class="small">Verified</text>
  <text x="850" y="230" text-anchor="middle" class="small">汚染</text>
  <text x="850" y="252" text-anchor="middle" class="caption">2026年ゲート試験</text>

  <rect x="40" y="290" width="880" height="210" class="box"/>
  <text x="480" y="314" text-anchor="middle" class="head">ベンチマーク主張は懐疑的に読む</text>

  <text x="60" y="346" class="step">[1]</text>
  <text x="120" y="346" class="small">どのベンチマーク + 分割か。Verified vs Proはフロンティアモデルで40ポイント差</text>

  <text x="60" y="372" class="step">[2]</text>
  <text x="120" y="372" class="small">汚染: ベンチマークは訓練後カットオフか?</text>

  <text x="60" y="398" class="step">[3]</text>
  <text x="120" y="398" class="small">基準線: 単一LLM比、ランダム比、既存マルチエージェント比</text>

  <text x="60" y="424" class="step">[4]</text>
  <text x="120" y="424" class="small">統計的有意性: N試行、CI、p値</text>

  <text x="60" y="450" class="step">[5]</text>
  <text x="120" y="450" class="small">タスク多様性: 1タスクか多数か — 汎化が重要</text>

  <text x="60" y="476" class="step">[6]</text>
  <text x="120" y="476" class="small">コスト開示: トークン + 実時間 — 10%向上に20倍コストは事業判断</text>
</svg>
