<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">心の理論の次数と協調の錯覚</text>

  <rect x="40" y="60" width="280" height="200" class="hot"/>
  <text x="180" y="84" text-anchor="middle" class="head">0次</text>
  <text x="180" y="108" text-anchor="middle" class="step">他者モデルなし</text>
  <text x="180" y="138" text-anchor="middle" class="small">エージェントは自身の観察だけで行動</text>
  <text x="180" y="156" text-anchor="middle" class="small">他エージェントと衝突</text>
  <text x="180" y="174" text-anchor="middle" class="small">共有リソースで努力が重複</text>
  <text x="180" y="206" text-anchor="middle" class="caption">実測: 試行あたり衝突約0.96</text>
  <text x="180" y="224" text-anchor="middle" class="caption">（3エージェント、3箱、ToMなし）</text>

  <rect x="340" y="60" width="280" height="200" class="cool"/>
  <text x="480" y="84" text-anchor="middle" class="head">1次</text>
  <text x="480" y="108" text-anchor="middle" class="step">"A believes X"</text>
  <text x="480" y="138" text-anchor="middle" class="small">エージェントが互いの信念を追跡</text>
  <text x="480" y="156" text-anchor="middle" class="small">モデル化した信念から行動予測</text>
  <text x="480" y="174" text-anchor="middle" class="small">冗長性回避 + 必要性予測</text>
  <text x="480" y="206" text-anchor="middle" class="caption">実測: 試行あたり衝突約0.00</text>
  <text x="480" y="224" text-anchor="middle" class="caption">（選好プライムあり）</text>

  <rect x="640" y="60" width="280" height="200" class="cold"/>
  <text x="780" y="84" text-anchor="middle" class="head">2次</text>
  <text x="780" y="108" text-anchor="middle" class="step">"A believes B believes X"</text>
  <text x="780" y="138" text-anchor="middle" class="small">再帰的信念モデリング</text>
  <text x="780" y="156" text-anchor="middle" class="small">協力ゲームで創発</text>
  <text x="780" y="174" text-anchor="middle" class="small">長期ホライズンでは劣化</text>
  <text x="780" y="206" text-anchor="middle" class="caption">Li et al. 2023 文脈失敗モード:</text>
  <text x="780" y="224" text-anchor="middle" class="caption">ターンを跨ぐと同一性-信念の結合が落ちる</text>

  <rect x="40" y="290" width="880" height="200" class="box"/>
  <text x="480" y="314" text-anchor="middle" class="head">coordination illusion (Riedl 2025, arXiv:2510.05174)</text>
  <text x="70" y="346" class="step">主張</text>
  <text x="140" y="346" class="small">「エージェントは創発的に協調する」</text>
  <text x="70" y="372" class="step">失敗</text>
  <text x="140" y="372" class="small">協調はプロンプトで装飾されたもの; システムプロンプトから"work together"を外すと効果消失</text>
  <text x="70" y="398" class="step">監査</text>
  <text x="140" y="398" class="small">統制条件、統計検定、補完性指標、容量チェックを要求</text>
  <text x="70" y="424" class="step">本物</text>
  <text x="140" y="424" class="small">同一性に紐づく差別化 + 目標志向の補完性 + 高次シナジー</text>
  <text x="70" y="450" class="step">だけ</text>
  <text x="140" y="450" class="small">Riedlの集団実験ではToMプロンプト条件だけが3つ全てを偶然超えで生成</text>
  <text x="70" y="476" class="caption">大規模モデルはToMプロンプトなしでも一部coordinationを示すが、effectは小さい</text>
</svg>
