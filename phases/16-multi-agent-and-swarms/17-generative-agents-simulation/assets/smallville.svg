<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">Generative Agents — Park et al. 2023の3要素</text>

  <rect x="40" y="60" width="280" height="220" class="cool"/>
  <text x="180" y="84" text-anchor="middle" class="head">記憶ストリーム</text>
  <text x="180" y="108" text-anchor="middle" class="step">追記専用ログ</text>
  <text x="60" y="136" class="small">[t=0]  観察 :: Isabellaを見た</text>
  <text x="60" y="154" class="small">[t=1]  観察 :: パーティーに招待された</text>
  <text x="60" y="172" class="small">[t=2]  内省  :: パーティーは楽しい</text>
  <text x="60" y="190" class="small">[t=3]  計画        :: 5pmに参加</text>
  <text x="60" y="208" class="small">[t=4]  行動      :: カフェへ向かう</text>
  <text x="180" y="240" text-anchor="middle" class="caption">検索: 新しさ + 重要度 + 関連度</text>
  <text x="180" y="258" text-anchor="middle" class="caption">上位k件がプロンプトへ入る</text>

  <rect x="340" y="60" width="280" height="220" class="cold"/>
  <text x="480" y="84" text-anchor="middle" class="head">内省</text>
  <text x="480" y="108" text-anchor="middle" class="step">高次信念</text>
  <text x="480" y="136" text-anchor="middle" class="small">定期トリガー:</text>
  <text x="480" y="154" text-anchor="middle" class="small">未処理重要度 &gt; しきい値</text>
  <text x="480" y="180" text-anchor="middle" class="small">プロンプト:「最近の記憶から、</text>
  <text x="480" y="196" text-anchor="middle" class="small">高次の洞察は何か?」</text>
  <text x="480" y="222" text-anchor="middle" class="small">出力: 新しい内省エントリ</text>
  <text x="480" y="240" text-anchor="middle" class="small">ストリームへ再投入</text>
  <text x="480" y="258" text-anchor="middle" class="caption">内省なし: 信念形成なし</text>

  <rect x="640" y="60" width="280" height="220" class="box"/>
  <text x="780" y="84" text-anchor="middle" class="head">計画</text>
  <text x="780" y="108" text-anchor="middle" class="step">日 / 時 / 行動</text>
  <text x="780" y="136" text-anchor="middle" class="small">日: 仕事へ行く、夕食</text>
  <text x="780" y="156" text-anchor="middle" class="small">時: 9時カフェ、12時昼食...</text>
  <text x="780" y="176" text-anchor="middle" class="small">行動: カフェへ歩く、コーヒー注文</text>
  <text x="780" y="206" text-anchor="middle" class="small">修正トリガー:</text>
  <text x="780" y="222" text-anchor="middle" class="small">観察が計画に矛盾</text>
  <text x="780" y="240" text-anchor="middle" class="small">影響セグメントだけ再計画</text>
  <text x="780" y="258" text-anchor="middle" class="caption">計画なし: 反応的ノイズ</text>

  <rect x="40" y="310" width="880" height="200" class="hot"/>
  <text x="480" y="334" text-anchor="middle" class="head">emergent behavior — Valentine's Day パーティー</text>

  <text x="70" y="362" class="step">tick 0</text>
  <text x="140" y="362" class="small">エージェント0 (Isabella) に種: "cafeで5pmにパーティーを主催"</text>

  <text x="70" y="382" class="step">tick 0-2</text>
  <text x="140" y="382" class="small">Isabellaが近隣者を招待; 各招待がストリーム内の観察になる</text>

  <text x="70" y="402" class="step">tick 1-3</text>
  <text x="140" y="402" class="small">招待された近隣者がreflect -&gt; belief "パーティーに招待された" -&gt; 参加計画</text>

  <text x="70" y="422" class="step">tick 2-4</text>
  <text x="140" y="422" class="small">招待者が他の近隣者へ伝える; 2次拡散</text>

  <text x="70" y="442" class="step">tick 5</text>
  <text x="140" y="442" class="small">3要素が収束: 3-5 エージェントが時間どおりカフェに到着</text>

  <text x="70" y="470" class="caption">単一の種 + 3要素 = オーケストレータなしの協調到着</text>
  <text x="70" y="490" class="caption">記録された失敗: 空間規範（閉店、1人用トイレ）</text>
</svg>
