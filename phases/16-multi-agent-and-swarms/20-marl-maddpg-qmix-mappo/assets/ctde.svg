<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">CTDEと3つのMARL基準線</text>

  <rect x="40" y="60" width="440" height="200" class="cold"/>
  <text x="260" y="84" text-anchor="middle" class="head">訓練時 — 集中型</text>

  <rect x="70" y="110" width="360" height="100" class="box"/>
  <text x="250" y="134" text-anchor="middle" class="step">批評器 / 混合器 / 価値</text>
  <text x="250" y="158" text-anchor="middle" class="small">全エージェントの観察 + 行動を見る</text>
  <text x="250" y="176" text-anchor="middle" class="small">各アクター更新の定常ターゲット</text>
  <text x="250" y="196" text-anchor="middle" class="small">複数学習器設定の非定常性に対処</text>

  <text x="260" y="234" text-anchor="middle" class="caption">MADDPG critic · QMIX mixer · MAPPO centralized V</text>

  <rect x="500" y="60" width="420" height="200" class="cool"/>
  <text x="710" y="84" text-anchor="middle" class="head">展開時 — 分散型</text>

  <rect x="530" y="110" width="110" height="100" class="box"/>
  <text x="585" y="140" text-anchor="middle" class="step">アクター0</text>
  <text x="585" y="160" text-anchor="middle" class="small">o_0のみ見る</text>
  <text x="585" y="180" text-anchor="middle" class="small">局所行動</text>

  <rect x="655" y="110" width="110" height="100" class="box"/>
  <text x="710" y="140" text-anchor="middle" class="step">アクター1</text>
  <text x="710" y="160" text-anchor="middle" class="small">o_1のみ見る</text>
  <text x="710" y="180" text-anchor="middle" class="small">局所行動</text>

  <rect x="780" y="110" width="110" height="100" class="box"/>
  <text x="835" y="140" text-anchor="middle" class="step">アクターN</text>
  <text x="835" y="160" text-anchor="middle" class="small">o_Nのみ見る</text>
  <text x="835" y="180" text-anchor="middle" class="small">局所行動</text>

  <text x="710" y="234" text-anchor="middle" class="caption">実行時に批評器なし。局所方策呼出しのみ</text>

  <rect x="40" y="290" width="880" height="200" class="box"/>
  <text x="480" y="314" text-anchor="middle" class="head">3つの基準線、3つの特化</text>

  <text x="60" y="348" class="step">MADDPG (2017)</text>
  <text x="260" y="348" class="small">エージェント別批評器 · 連続行動 · 協力/競争混在 · 約10エージェントへ拡張</text>

  <text x="60" y="378" class="step">QMIX (2018)</text>
  <text x="260" y="378" class="small">価値分解 · 単調混合器 · 協力 · 離散 · SMACで優勢</text>

  <text x="60" y="408" class="step">MAPPO (2022)</text>
  <text x="260" y="408" class="small">集中V付きPPO · 最小調整 · 協力 · ベンチマーク横断で堅牢</text>

  <text x="60" y="438" class="step">本番メモ</text>
  <text x="260" y="438" class="small">MAPPOから開始; 混在設定はMADDPG、疎な協力はQMIXへ</text>

  <text x="60" y="468" class="caption">LLMエージェントシステムでは: CTDEは設計パターン。エンドツーエンド訓練は任意。</text>
</svg>
