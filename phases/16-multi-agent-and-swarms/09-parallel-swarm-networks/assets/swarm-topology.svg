<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .edge { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    </style>
  </defs>
  <text x="450" y="28" text-anchor="middle" class="title">Swarm / parallel / networked architecture — orchestratorなし</text>

  <rect x="180" y="70" width="540" height="60" class="cold"/>
  <text x="450" y="90" text-anchor="middle" class="head">shared queue (productionではdurable event bus)</text>
  <text x="450" y="110" text-anchor="middle" class="small">T1 (slow) · T2 (fast) · T3 (slow) · T4 (fast) · T5 (fast) · ...</text>

  <line x1="250" y1="130" x2="180" y2="170" class="edge" marker-end="url(#arrow)"/>
  <line x1="350" y1="130" x2="340" y2="170" class="edge" marker-end="url(#arrow)"/>
  <line x1="550" y1="130" x2="560" y2="170" class="edge" marker-end="url(#arrow)"/>
  <line x1="650" y1="130" x2="720" y2="170" class="edge" marker-end="url(#arrow)"/>

  <rect x="100" y="170" width="150" height="90" class="cool"/>
  <text x="175" y="192" text-anchor="middle" class="head">ワーカーA</text>
  <text x="175" y="212" text-anchor="middle" class="small">タスクを取得</text>
  <text x="175" y="228" text-anchor="middle" class="small">処理</text>
  <text x="175" y="244" text-anchor="middle" class="small">resultを書く</text>

  <rect x="280" y="170" width="150" height="90" class="cool"/>
  <text x="355" y="192" text-anchor="middle" class="head">ワーカーB</text>
  <text x="355" y="212" text-anchor="middle" class="small">タスクを取得</text>
  <text x="355" y="228" text-anchor="middle" class="small">処理</text>
  <text x="355" y="244" text-anchor="middle" class="small">resultを書く</text>

  <rect x="470" y="170" width="150" height="90" class="cool"/>
  <text x="545" y="192" text-anchor="middle" class="head">ワーカーC</text>
  <text x="545" y="212" text-anchor="middle" class="small">タスクを取得</text>
  <text x="545" y="228" text-anchor="middle" class="small">処理</text>
  <text x="545" y="244" text-anchor="middle" class="small">resultを書く</text>

  <rect x="650" y="170" width="150" height="90" class="cool"/>
  <text x="725" y="192" text-anchor="middle" class="head">ワーカーD</text>
  <text x="725" y="212" text-anchor="middle" class="small">タスクを取得</text>
  <text x="725" y="228" text-anchor="middle" class="small">処理</text>
  <text x="725" y="244" text-anchor="middle" class="small">resultを書く</text>

  <line x1="175" y1="260" x2="350" y2="320" class="edge"/>
  <line x1="355" y1="260" x2="400" y2="320" class="edge"/>
  <line x1="545" y1="260" x2="500" y2="320" class="edge"/>
  <line x1="725" y1="260" x2="550" y2="320" class="edge"/>

  <rect x="300" y="320" width="300" height="50" class="hot"/>
  <text x="450" y="340" text-anchor="middle" class="head">結果プール</text>
  <text x="450" y="358" text-anchor="middle" class="small">冪等、永続、タスク別トレースID</text>

  <rect x="60" y="400" width="780" height="100" class="box"/>
  <text x="450" y="422" text-anchor="middle" class="head">トレードオフ</text>
  <text x="450" y="442" text-anchor="middle" class="small">✓ 可変時間の負荷分散 · ✓ 数千規模へ拡張 · ✓ 永続キューで耐障害</text>
  <text x="450" y="460" text-anchor="middle" class="small">✗ central traceなし · ✗ ordered workflowsは壊れる · ✗ debugにはper-task IDsが必要</text>
  <text x="450" y="478" text-anchor="middle" class="small">失敗モード: 飢餓(エージングキュー)、偏り(ワーカー特化)、背圧(有界キュー)</text>
</svg>
