<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">LLMエージェント向けBFT — 3攻撃、3集約器</text>

  <rect x="40" y="60" width="880" height="200" class="box"/>
  <text x="480" y="84" text-anchor="middle" class="head">LLMエージェント特有の3攻撃</text>

  <rect x="60" y="100" width="270" height="140" class="hot"/>
  <text x="195" y="122" text-anchor="middle" class="head">ビザンチン嘘</text>
  <text x="195" y="146" text-anchor="middle" class="step">1エージェントが誤出力を</text>
  <text x="195" y="164" text-anchor="middle" class="step">高信頼度で出す</text>
  <text x="195" y="188" text-anchor="middle" class="small">f &lt; n/3なら古典BFTで対処</text>
  <text x="195" y="212" text-anchor="middle" class="caption">緩和策: 多数決</text>

  <rect x="340" y="100" width="270" height="140" class="hot"/>
  <text x="475" y="122" text-anchor="middle" class="head">迎合的同調</text>
  <text x="475" y="146" text-anchor="middle" class="step">エージェントが先に話した相手を</text>
  <text x="475" y="164" text-anchor="middle" class="step">低信頼度でコピー</text>
  <text x="475" y="188" text-anchor="middle" class="small">古典BFTでは検出できない</text>
  <text x="475" y="212" text-anchor="middle" class="caption">緩和策: 信頼度重み付け (CP-WBFT)</text>

  <rect x="620" y="100" width="280" height="140" class="hot"/>
  <text x="760" y="122" text-anchor="middle" class="head">単一文化（相関エラー）</text>
  <text x="760" y="146" text-anchor="middle" class="step">3エージェントがベースモデルを共有</text>
  <text x="760" y="164" text-anchor="middle" class="step">同じ幻覚を出す</text>
  <text x="760" y="188" text-anchor="middle" class="small">全員正直に見え、古典BFTは失敗</text>
  <text x="760" y="212" text-anchor="middle" class="caption">緩和策: モデル多様性 + 検証器</text>

  <rect x="40" y="290" width="880" height="210" class="cool"/>
  <text x="480" y="314" text-anchor="middle" class="head">2025-2026年の集約器バリエーション</text>

  <rect x="60" y="330" width="270" height="150" class="cold"/>
  <text x="195" y="352" text-anchor="middle" class="head">CP-WBFT</text>
  <text x="195" y="372" text-anchor="middle" class="step">信頼度プローブ重み付け</text>
  <text x="195" y="392" text-anchor="middle" class="small">w(cluster) = sum(c_i)</text>
  <text x="195" y="410" text-anchor="middle" class="small">w/合計 &gt; しきい値なら勝者</text>
  <text x="195" y="432" text-anchor="middle" class="caption">arXiv:2511.10400</text>
  <text x="195" y="452" text-anchor="middle" class="small">完全グラフ上でBFT +85.71%</text>

  <rect x="340" y="330" width="270" height="150" class="cold"/>
  <text x="475" y="352" text-anchor="middle" class="head">DecentLLMs</text>
  <text x="475" y="372" text-anchor="middle" class="step">リーダーなし、幾何中央値</text>
  <text x="475" y="392" text-anchor="middle" class="small">ワーカーが並列に提案</text>
  <text x="475" y="410" text-anchor="middle" class="small">評価エージェントが採点</text>
  <text x="475" y="432" text-anchor="middle" class="caption">arXiv:2507.14928</text>
  <text x="475" y="452" text-anchor="middle" class="small">f &lt; n/2で堅牢</text>

  <rect x="620" y="330" width="280" height="150" class="cold"/>
  <text x="760" y="352" text-anchor="middle" class="head">WBFT + 階層クラスタリング</text>
  <text x="760" y="372" text-anchor="middle" class="step">中核 + 周辺に分割</text>
  <text x="760" y="392" text-anchor="middle" class="small">重み = 品質 * 信頼(履歴)</text>
  <text x="760" y="410" text-anchor="middle" class="small">先に中核合意、周辺が追従</text>
  <text x="760" y="432" text-anchor="middle" class="caption">arXiv:2505.05103</text>
  <text x="760" y="452" text-anchor="middle" class="small">合意レイテンシを制限</text>
</svg>
