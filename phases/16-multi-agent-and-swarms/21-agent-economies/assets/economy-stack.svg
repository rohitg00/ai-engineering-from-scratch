<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
    </style>
  </defs>
  <text x="480" y="28" text-anchor="middle" class="title">5層エージェント経済スタックと中核機構</text>

  <rect x="40" y="60" width="420" height="220" class="box"/>
  <text x="250" y="84" text-anchor="middle" class="head">5層スタック</text>

  <rect x="70" y="100" width="360" height="34" class="cool"/>
  <text x="250" y="122" text-anchor="middle" class="step">5. Governance — エージェント型DAO</text>

  <rect x="70" y="140" width="360" height="34" class="cold"/>
  <text x="250" y="162" text-anchor="middle" class="step">4. 決済 — ERC-4337 アカウント抽象化</text>

  <rect x="70" y="180" width="360" height="34" class="dsk"/>
  <text x="250" y="202" text-anchor="middle" class="step">3. 認知 — LLM + RAG + MCP</text>

  <rect x="70" y="220" width="360" height="34" class="hot"/>
  <text x="250" y="242" text-anchor="middle" class="step">2. アイデンティティ — W3C DIDs + 評判</text>

  <rect x="70" y="260" width="360" height="34" class="box"/>
  <text x="250" y="278" text-anchor="middle" class="step">1. DePIN — Bittensor · Akash · Render</text>

  <rect x="500" y="60" width="420" height="220" class="cool"/>
  <text x="710" y="84" text-anchor="middle" class="head">本番ネットワーク（2026年4月）</text>

  <text x="530" y="114" class="step">Bittensor (TAO)</text>
  <text x="530" y="132" class="small">サブネットがタスク特化モデルへ報酬。ステーク加重採点</text>

  <text x="530" y="160" class="step">Fetch.ai / ASI</text>
  <text x="530" y="178" class="small">ASI-1 Mini LLM。エージェント間支払いにFETトークン</text>

  <text x="530" y="206" class="step">Gonka</text>
  <text x="530" y="224" class="small">Transformer作業証明。検証可能な推論タスク</text>

  <text x="530" y="252" class="step">LaMAS (AAMAS 2025)</text>
  <text x="530" y="270" class="small">Shapley帰属付き分散マルチエージェントシステム</text>

  <rect x="40" y="310" width="880" height="190" class="box"/>
  <text x="480" y="334" text-anchor="middle" class="head">3つの中核機構</text>

  <text x="60" y="366" class="step">Shapley帰属</text>
  <text x="230" y="366" class="small">公平な貢献配分。N&gt;6エージェントではN順列をサンプル</text>
  <text x="230" y="384" class="small">公理: 効率性、対称性、線形性、ゼロ寄与</text>

  <text x="60" y="414" class="step">第二価格オークション</text>
  <text x="230" y="414" class="small">単調集約下で正直申告 (Google Research)</text>
  <text x="230" y="432" class="small">勝者はbidで選択; second-highestを支払う</text>

  <text x="60" y="462" class="step">評判資本</text>
  <text x="230" y="462" class="small">指数減衰付きDID紐づけスコア。検証失敗でスラッシュ</text>
  <text x="230" y="480" class="small">読むのは安い（ルーティング）。偽造は高い（時間をかけた蓄積）</text>
</svg>
