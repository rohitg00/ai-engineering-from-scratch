<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .cool { fill: #e6f4ea; stroke: #2e7d32; stroke-width: 1.5; }
      .cold { fill: #dfe9ff; stroke: #2c5ea9; stroke-width: 1.5; }
      .dsk { fill: #e9e6ff; stroke: #5a4fcf; stroke-width: 1.5; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a1a; }
      .head { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .step { font-size: 12px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #222; }
      .small { font-size: 10px; font-family: 'Hiragino Sans', 'Yu Gothic', 'Menlo', monospace; fill: #555; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .edge { stroke: #1a1a1a; stroke-width: 1.2; fill: none; }
    </style>
  </defs>
  <text x="450" y="28" text-anchor="middle" class="title">Group chat — shared プール + speaker selector (AutoGen / AG2)</text>

  <rect x="220" y="60" width="460" height="80" class="cold"/>
  <text x="450" y="82" text-anchor="middle" class="head">shared メッセージプール</text>
  <text x="450" y="104" text-anchor="middle" class="small">m1 [実装]: 初期コード ... | m2 [レビュー]: バグ検出 ... | m3 [実装]: 修正 ... | m4 [レビュー]: 承認</text>
  <text x="450" y="122" text-anchor="middle" class="small">すべてのエージェントがすべてのメッセージを読む</text>

  <rect x="40" y="180" width="140" height="80" class="hot"/>
  <text x="110" y="202" text-anchor="middle" class="head">実装者</text>
  <text x="110" y="222" text-anchor="middle" class="small">codeを書く</text>
  <text x="110" y="240" text-anchor="middle" class="small">reviewで修正</text>

  <rect x="220" y="180" width="140" height="80" class="cool"/>
  <text x="290" y="202" text-anchor="middle" class="head">レビュアー</text>
  <text x="290" y="222" text-anchor="middle" class="small">codeを批評</text>
  <text x="290" y="240" text-anchor="middle" class="small">approved / rejectedを返す</text>

  <rect x="400" y="180" width="140" height="80" class="dsk"/>
  <text x="470" y="202" text-anchor="middle" class="head">管理者</text>
  <text x="470" y="222" text-anchor="middle" class="small">terminationを進める</text>
  <text x="470" y="240" text-anchor="middle" class="small">TERMINATEを出す</text>

  <rect x="580" y="180" width="260" height="80" class="box"/>
  <text x="710" y="202" text-anchor="middle" class="head">選択器</text>
  <text x="710" y="222" text-anchor="middle" class="small">ラウンドロビン（固定順）</text>
  <text x="710" y="240" text-anchor="middle" class="small">LLM選択 (context-aware)</text>
  <text x="710" y="256" text-anchor="middle" class="small">カスタム（規則ベース退避）</text>

  <line x1="110" y1="180" x2="350" y2="140" class="edge" marker-end="url(#arrow)"/>
  <line x1="290" y1="180" x2="440" y2="140" class="edge" marker-end="url(#arrow)"/>
  <line x1="470" y1="180" x2="520" y2="140" class="edge" marker-end="url(#arrow)"/>

  <line x1="450" y1="140" x2="580" y2="200" class="edge" marker-end="url(#arrow)"/>
  <text x="555" y="168" class="small">selectorがプールを読む</text>

  <path d="M 710 260 Q 710 320 470 300" class="edge" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="580" y="300" class="small">選択器の返値: 次の発話者 = 管理者</text>

  <rect x="40" y="340" width="380" height="150" class="box"/>
  <text x="230" y="362" text-anchor="middle" class="head">group chatが合う場合</text>
  <text x="230" y="384" text-anchor="middle" class="small">創発的会話、役割混在</text>
  <text x="230" y="402" text-anchor="middle" class="small">探索的な問題解決</text>
  <text x="230" y="420" text-anchor="middle" class="small">すべてのhandoff事前配線が間違いな場合</text>
  <text x="230" y="440" text-anchor="middle" class="small">"brainstorm meeting" であり "assembly line" ではない</text>
  <text x="230" y="468" text-anchor="middle" class="caption">選択器が明示グラフ辺を置き換える</text>

  <rect x="460" y="340" width="380" height="150" class="box"/>
  <text x="650" y="362" text-anchor="middle" class="head">失敗モード</text>
  <text x="650" y="384" text-anchor="middle" class="small">発話偏り（1エージェントが支配）</text>
  <text x="650" y="402" text-anchor="middle" class="small">sycophancy cascade (声の大きい方へ従う)</text>
  <text x="650" y="420" text-anchor="middle" class="small">context bloat (プールが無制限に増える)</text>
  <text x="650" y="440" text-anchor="middle" class="small">選択器の不整合（LLMの非決定性）</text>
  <text x="650" y="468" text-anchor="middle" class="caption">ラウンドを制限 · バランス追跡 · 表示範囲を限定</text>
</svg>
